<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
.loader {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f0f1a;
  z-index:9999;
}

/* APP */
#app { display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  text-align:center;
  font-weight:bold;
}

.container {
  padding:15px;
  padding-bottom:80px;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  display:flex;
  gap:12px;
}

.logo {
  width:55px;
  height:55px;
  object-fit:contain;
  border-radius:10px;
  background:white;
  padding:5px;
}

.content { flex:1; }

.price { color:#4da3ff; font-weight:bold; }

.field {
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  font-size:13px;
  word-break:break-all;
}

.row {
  display:flex;
  gap:5px;
  margin-top:8px;
}

button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

/* STATUS */
.status {
  margin-top:8px;
  font-size:13px;
  font-weight:bold;
}

.placed { color:orange; }
.delivery { color:#4da3ff; }
.delivered { color:lightgreen; }

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:#1877f2; }
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div id="app">

<div class="header">My Orders</div>
<div class="container" id="orders"></div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html" class="active">Orders</a>
  <a href="profile.html">Profile</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");
const ordersDiv = document.getElementById("orders");

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    loader.innerText = "Redirecting...";
    setTimeout(()=>location.href="auth.html",500);
    return;
  }

  try {
    await loadOrders(user.uid);
    loader.style.display = "none";
    appDiv.style.display = "block";
  } catch(err){
    console.error(err);
    loader.innerText = "Failed to load orders";
  }
});

/* LOAD ALL ORDERS */
async function loadOrders(uid){
  ordersDiv.innerHTML = "";

  /* NORMAL ORDERS */
  const normalQ = query(collection(db,"orders"), where("userId","==",uid));
  const normalSnap = await getDocs(normalQ);

  /* GIFT ORDERS */
  const giftQ = query(collection(db,"giftOrders"), where("userId","==",uid));
  const giftSnap = await getDocs(giftQ);

  if(normalSnap.empty && giftSnap.empty){
    ordersDiv.innerHTML = "<div style='text-align:center;color:gray;margin-top:40px;'>No orders yet 🛒</div>";
    return;
  }

  /* NORMAL ORDERS UI */
  normalSnap.forEach(docSnap=>{
    const o = docSnap.data();

    let date = o.createdAt?.seconds
      ? new Date(o.createdAt.seconds * 1000).toLocaleString()
      : "";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${o.logo || ''}" class="logo">

      <div class="content">
        <div>${o.name}</div>
        <div class="price">₦${o.price}</div>

        <div class="field">Email: ${o.email}</div>
        <div class="field" id="p-${docSnap.id}">Password: •••••</div>

        <div class="row">
          <button onclick="toggle('${docSnap.id}','${o.password}')">Show</button>
          <button onclick="copyLogin('${o.email}','${o.password}')">Copy</button>
        </div>

        <div style="font-size:12px;color:gray">${date}</div>
      </div>
    `;

    ordersDiv.appendChild(div);
  });

  /* GIFT ORDERS UI */
  giftSnap.forEach(docSnap=>{
    const o = docSnap.data();

    let date = o.createdAt?.seconds
      ? new Date(o.createdAt.seconds * 1000).toLocaleString()
      : "";

    let statusClass = "placed";
    let statusText = "🟡 Order Placed";

    if(o.status === "on delivery"){
      statusClass = "delivery";
      statusText = "🔵 On Delivery";
    }

    if(o.status === "delivered"){
      statusClass = "delivered";
      statusText = "🟢 Delivered";
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" class="logo">

      <div class="content">
        <div>🎁 ${o.type}</div>
        <div class="price">₦${o.price}</div>

        <div class="field">To: ${o.details?.house}, ${o.details?.city}</div>
        <div class="field">Phone: ${o.details?.phone}</div>

        ${o.details?.size ? `<div class="field">Size: ${o.details.size}</div>` : ""}

        <div class="status ${statusClass}">${statusText}</div>

        <div style="font-size:12px;color:gray">${date}</div>
      </div>
    `;

    ordersDiv.appendChild(div);
  });
}

/* ACTIONS */
window.toggle = (id, pass)=>{
  const el = document.getElementById("p-"+id);
  el.innerText = el.innerText.includes("•")
    ? "Password: "+pass
    : "Password: •••••";
};

window.copyLogin = (email, pass)=>{
  navigator.clipboard.writeText(`Email: ${email}\nPassword: ${pass}`);
  alert("Copied");
};
</script>

</body>
</html>
