<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
  display:none; /* 🔥 prevents flash */
}

.header {
  padding:15px;
  background:#1c1c2e;
  text-align:center;
  font-weight:bold;
}

.container {
  padding:15px;
  padding-bottom:80px;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  display:flex;
  gap:12px;
}

.logo {
  width:55px;
  height:55px;
  object-fit:contain;
  border-radius:10px;
  background:white;
  padding:5px;
}

.content { flex:1; }

.title { font-size:16px; margin-bottom:5px; }

.price {
  color:violet;
  font-weight:bold;
}

.field {
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  font-size:13px;
  word-break:break-all;
}

.row {
  display:flex;
  gap:5px;
  margin-top:8px;
}

button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.date {
  font-size:12px;
  color:gray;
  margin-top:8px;
}

.empty {
  text-align:center;
  color:gray;
  margin-top:40px;
}

.loader {
  text-align:center;
  margin-top:50px;
  color:gray;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:10px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="header">📦 My Orders</div>

<div class="container" id="orders">
  <div class="loader">Loading orders...</div>
</div>

<div class="nav">
  <a href="index.html">🏠</a>
  <a href="wallet.html">💳</a>
  <a href="orders.html" class="active">📦</a>
  <a href="profile.html">👤</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ordersDiv = document.getElementById("orders");

/* 🔐 AUTH (FIXED - no flicker, no skip) */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.href="auth.html";
    return;
  }

  document.body.style.display = "block";
  loadOrders(user.uid);
});

/* LOAD ORDERS */
async function loadOrders(uid){
  ordersDiv.innerHTML = `<div class="loader">Loading orders...</div>`;

  const q = query(collection(db,"orders"), where("userId","==",uid));
  const snap = await getDocs(q);

  ordersDiv.innerHTML = "";

  if(snap.empty){
    ordersDiv.innerHTML = `<div class="empty">No orders yet 🛒</div>`;
    return;
  }

  snap.forEach(docSnap=>{
    const o = docSnap.data();

    /* 🔥 FIX DATE */
    let date = "";
    if(o.createdAt){
      if(o.createdAt.seconds){
        date = new Date(o.createdAt.seconds * 1000).toLocaleString();
      } else {
        date = new Date(o.createdAt).toLocaleString();
      }
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${o.logo || ''}" class="logo"
        onerror="this.src='https://via.placeholder.com/55?text=No+Logo'">

      <div class="content">
        <div class="title">${o.name || 'Product'}</div>
        <div class="price">₦${o.price || 0}</div>

        <div class="field">Email: ${o.email || ''}</div>

        <div class="field" id="pass-${docSnap.id}">
          Password: ••••••••
        </div>

        <div class="row">
          <button onclick="toggle('${docSnap.id}','${o.password}')">Show</button>
          <button onclick="copyLogin('${o.email}','${o.password}')">Copy</button>
        </div>

        <div class="date">${date}</div>
      </div>
    `;

    ordersDiv.appendChild(div);
  });
}

/* TOGGLE PASSWORD */
window.toggle = (id, pass)=>{
  const el = document.getElementById("pass-"+id);

  if(el.innerText.includes("•••")){
    el.innerText = "Password: " + pass;
  } else {
    el.innerText = "Password: ••••••••";
  }
};

/* COPY LOGIN */
window.copyLogin = (email, pass)=>{
  navigator.clipboard.writeText(`Email: ${email}\nPassword: ${pass}`);
  alert("Copied ✅");
};
</script>

</body>
</html>
