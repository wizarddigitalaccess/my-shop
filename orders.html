<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* 🔥 SAFE LOADER (NOT display:none anymore) */
#app {
  display:none;
}

.loader {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f0f1a;
  color:white;
  font-size:16px;
}

.header {
  padding:15px;
  background:#1c1c2e;
  text-align:center;
  font-weight:bold;
}

.container {
  padding:15px;
  padding-bottom:80px;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  display:flex;
  gap:12px;
}

.logo {
  width:55px;
  height:55px;
  object-fit:contain;
  border-radius:10px;
  background:white;
  padding:5px;
}

.content { flex:1; }

.price { color:violet; font-weight:bold; }

.field {
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  font-size:13px;
  word-break:break-all;
}

.row {
  display:flex;
  gap:5px;
  margin-top:8px;
}

button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:10px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<!-- 🔥 LOADER -->
<div class="loader" id="loader">Loading...</div>

<!-- 🔥 REAL APP -->
<div id="app">

<div class="header">📦 My Orders</div>
<div class="container" id="orders"></div>

<div class="nav">
  <a href="index.html">🏠</a>
  <a href="wallet.html">💳</a>
  <a href="orders.html" class="active">📦</a>
  <a href="profile.html">👤</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");
const ordersDiv = document.getElementById("orders");

/* 🔐 AUTH (SAFE VERSION) */
onAuthStateChanged(auth, async (user)=>{
  try {

    if(!user){
      location.href = "auth.html";
      return;
    }

    loader.style.display = "none";
    appDiv.style.display = "block";

    loadOrders(user.uid);

  } catch(err){
    loader.innerText = "Error loading app";
    console.error(err);
  }
});

/* LOAD ORDERS */
async function loadOrders(uid){
  ordersDiv.innerHTML = "Loading orders...";

  const q = query(collection(db,"orders"), where("userId","==",uid));
  const snap = await getDocs(q);

  if(snap.empty){
    ordersDiv.innerHTML = "No orders yet 🛒";
    return;
  }

  ordersDiv.innerHTML = "";

  snap.forEach(docSnap=>{
    const o = docSnap.data();

    let date = "";
    if(o.createdAt){
      if(o.createdAt.seconds){
        date = new Date(o.createdAt.seconds * 1000).toLocaleString();
      } else {
        date = new Date(o.createdAt).toLocaleString();
      }
    }

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${o.logo || ''}" class="logo"
      onerror="this.src='https://via.placeholder.com/55?text=Logo'">

      <div class="content">
        <div>${o.name}</div>
        <div class="price">₦${o.price}</div>

        <div class="field">Email: ${o.email}</div>
        <div class="field" id="p-${docSnap.id}">Password: •••••</div>

        <div class="row">
          <button onclick="toggle('${docSnap.id}','${o.password}')">Show</button>
          <button onclick="copyLogin('${o.email}','${o.password}')">Copy</button>
        </div>

        <div style="font-size:12px;color:gray">${date}</div>
      </div>
    `;

    ordersDiv.appendChild(div);
  });
}

window.toggle = (id, pass)=>{
  const el = document.getElementById("p-"+id);
  el.innerText = el.innerText.includes("•")
    ? "Password: "+pass
    : "Password: •••••";
};

window.copyLogin = (email, pass)=>{
  navigator.clipboard.writeText(`Email: ${email}\nPassword: ${pass}`);
  alert("Copied");
};
</script>

</body>
</html>
