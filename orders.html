<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
.loader {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f0f1a;
  z-index:9999;
}

#app { display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  text-align:center;
  font-weight:bold;
}

.container {
  padding:15px;
  padding-bottom:80px;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  display:flex;
  gap:12px;
}

.logo {
  width:55px;
  height:55px;
  object-fit:contain;
  border-radius:10px;
  background:white;
  padding:5px;
}

.content { flex:1; }

.price { color:#4da3ff; font-weight:bold; }

.field {
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  font-size:13px;
  word-break:break-word;
}

/* STATUS */
.status {
  margin-top:12px;
  padding:8px;
  border-radius:8px;
  font-size:13px;
  text-align:center;
  font-weight:bold;
  letter-spacing:.5px;
}

.placed { background:#333; color:#ffcc00; }
.processing { background:#5a2d82; color:#d0b3ff; }
.delivery { background:#0a3d91; color:#6ab7ff; }
.delivered { background:#0f5132; color:#4ade80; }
.cancelled { background:#3a0000; color:#ff4d4d; }

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:#1877f2; }
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div id="app">

<div class="header">My Orders</div>
<div class="container" id="orders"></div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html" class="active">Orders</a>
  <a href="profile.html">Profile</a>
</div>

</div>

<script type="module">
import {
  getFirestore,
  collection,
  query,
  where,
  onSnapshot,
  doc,
  deleteDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");
const ordersDiv = document.getElementById("orders");

/* AUTH */
onAuthStateChanged(auth, (user)=>{
  if(!user) return location.href="auth.html";

  loadOrdersLive(user.uid);

  loader.style.display="none";
  appDiv.style.display="block";
});

/* 🔥 LIVE ORDERS */
function loadOrdersLive(uid){

  const normalQ = query(collection(db,"orders"), where("userId","==",uid));
  const giftQ = query(collection(db,"giftOrders"), where("userId","==",uid));

  let normalOrders = [];
  let giftOrders = [];

  onSnapshot(normalQ, snap=>{
    normalOrders = [];
    snap.forEach(d=>{
      const o=d.data();
      o.type="normal";
      normalOrders.push(o);
    });
    render();
  });

  onSnapshot(giftQ, snap=>{
    giftOrders = [];
    snap.forEach(d=>{
      const g=d.data();
      g.type="gift";
      giftOrders.push(g);
    });
    render();
  });

  function render(){
    const allOrders = [...normalOrders, ...giftOrders]
      .sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

    ordersDiv.innerHTML="";

    allOrders.forEach(o=>{
      const div=document.createElement("div");
      div.className="card";

      /* NORMAL */
      if(o.type==="normal"){
        div.innerHTML=`
        <img src="${o.logo || ''}" class="logo">
        <div class="content">
          <b>${o.name}</b>
          <div class="price">₦${o.price}</div>

          <div class="field">Email: ${o.email}</div>
          <div class="field">Password: ${o.password}</div>

          <div class="status delivered">Delivered ✅</div>
        </div>`;
      }

      /* 🔥 GIFT */
      else{
        let statusClass="placed";
        let statusText="Order Placed 🟡";

        if(o.status==="processing"){
          statusClass="processing";
          statusText="Processing 🟣";
        }
        if(o.status==="delivery"){
          statusClass="delivery";
          statusText="On The Way 🚚";
        }
        if(o.status==="delivered"){
          statusClass="delivered";
          statusText="Delivered 🎁";
        }
        if(o.status === "cancelled"){
          statusClass = "cancelled";
          statusText = "Cancelled ❌";
        }

        div.innerHTML=`
        <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" class="logo">

        <div class="content">
          <b>${o.productName || "Gift"}</b>
          <div class="price">₦${o.price}</div>

          <div class="field">
            📍 ${o.receiver?.city || "-"}, ${o.receiver?.country || "-"}
          </div>

          <div class="field">
            📞 ${o.receiver?.phone || "-"}
          </div>

          ${o.receiver?.size ? `<div class="field">Size: ${o.receiver.size}</div>` : ""}

          <div class="status ${statusClass}">${statusText}</div>
        </div>`;
      }

      ordersDiv.appendChild(div);
    });

    if(allOrders.length===0){
      ordersDiv.innerHTML="<div style='text-align:center;color:gray;margin-top:40px;'>No orders yet 🛒</div>";
    }
  }
}

window.deleteOrderLive = async(id)=>{
  try{
    await deleteDoc(doc(db,"giftOrders",id));
  }catch(e){
    console.error(e);
  }
};

window.cancelOrderLive = async(id)=>{
  try{
    await updateDoc(doc(db,"giftOrders",id),{
      status:"cancelled"
    });
  }catch(e){
    console.error(e);
  }
};

</script>

</body>
</html>
