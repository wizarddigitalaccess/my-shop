<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
.loader {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f0f1a;
  z-index:9999;
}

#app { display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  text-align:center;
  font-weight:bold;
}

.container {
  padding:15px;
  padding-bottom:80px;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  display:flex;
  gap:12px;
}

.logo {
  width:55px;
  height:55px;
  object-fit:contain;
  border-radius:10px;
  background:white;
  padding:5px;
}

.content { flex:1; }

.price { color:#4da3ff; font-weight:bold; }

.field {
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-top:8px;
  font-size:13px;
  word-break:break-all;
}

.row {
  display:flex;
  gap:5px;
  margin-top:8px;
}

button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

/* 🔥 STATUS BADGES */
.status {
  margin-top:10px;
  padding:6px;
  border-radius:6px;
  font-size:12px;
  text-align:center;
  font-weight:bold;
}

.placed { background:#444; }
.delivery { background:#1877f2; }
.delivered { background:green; }

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:#1877f2; }
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div id="app">

<div class="header">My Orders</div>
<div class="container" id="orders"></div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html" class="active">Orders</a>
  <a href="profile.html">Profile</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");
const ordersDiv = document.getElementById("orders");

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    return location.href="auth.html";
  }

  await loadOrders(user.uid);

  loader.style.display="none";
  appDiv.style.display="block";
});

/* LOAD ORDERS */
async function loadOrders(uid){
  ordersDiv.innerHTML="";

  /* 🔹 NORMAL ORDERS */
  const normalQ = query(collection(db,"orders"), where("userId","==",uid));
  const normalSnap = await getDocs(normalQ);

  normalSnap.forEach(docSnap=>{
    const o = docSnap.data();

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <img src="${o.logo || ''}" class="logo">

      <div class="content">
        <b>${o.name}</b>
        <div class="price">₦${o.price}</div>

        <div class="field">Email: ${o.email}</div>
        <div class="field">Password: ${o.password}</div>

        <div class="status delivered">Delivered ✅</div>
      </div>
    `;

    ordersDiv.appendChild(div);
  });

  /* 🔥 GIFT ORDERS */
  const giftQ = query(collection(db,"giftOrders"), where("userId","==",uid));
  const giftSnap = await getDocs(giftQ);

  giftSnap.forEach(docSnap=>{
    const g = docSnap.data();

    let statusClass = "placed";
    let statusText = "Order Placed 🟡";

    if(g.status === "on delivery"){
      statusClass = "delivery";
      statusText = "On Delivery 🚚";
    }

    if(g.status === "delivered"){
      statusClass = "delivered";
      statusText = "Delivered 🎁";
    }

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <img src="https://cdn-icons-png.flaticon.com/512/1170/1170678.png" class="logo">

      <div class="content">
        <b>${g.type} Gift</b>
        <div class="price">₦${g.price}</div>

        <div class="field">
          📍 ${g.receiver?.city}, ${g.receiver?.country}
        </div>

        <div class="field">
          📞 ${g.receiver?.phone}
        </div>

        ${g.size ? `<div class="field">Size: ${g.size}</div>` : ""}

        <div class="status ${statusClass}">${statusText}</div>
      </div>
    `;

    ordersDiv.appendChild(div);
  });

  if(ordersDiv.innerHTML === ""){
    ordersDiv.innerHTML = "<div style='text-align:center;color:gray;margin-top:40px;'>No orders yet 🛒</div>";
  }
}
</script>

</body>
</html>
