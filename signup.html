<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1c1c2e;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

.small {
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<div class="small">
Already have an account? <a href="auth.html" style="color:violet;">Login</a>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async function () {
import { sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.signup = function () {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(async (userCredential) => {
      const user = userCredential.user;

      // 🔥 SEND VERIFICATION EMAIL
      await sendEmailVerification(user);

      // SAVE USER
      await setDoc(doc(db, "users", user.uid), {
        name,
        email,
        wallet: 0
      });

      alert("Verification email sent. Check your inbox.");

      window.location.href = "verify.html";
    })
    .catch(err => alert(err.message));
};

    alert("Account created! Check your email to verify before login.");

    window.location.href = "auth.html";

  } catch (err) {
    alert(err.message);
  }
};
</script>

</body>
</html>
