<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ CLEAN SIGNUP FUNCTION
window.signup = async function () {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  if (!name || !email || !password) {
    alert("Fill all fields");
    return;
  }

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // 🔥 SAVE USER
    await setDoc(doc(db, "users", user.uid), {
      name,
      email,
      wallet: 0
    });

    // 📧 SEND VERIFICATION LINK
    await sendEmailVerification(user);

    alert("Verification link sent to your email. Please verify before login.");

    // 🚪 FORCE LOGOUT UNTIL VERIFIED
    await signOut(auth);

    window.location.href = "auth.html";

  } catch (err) {
    alert(err.message);
  }
};
</script>
