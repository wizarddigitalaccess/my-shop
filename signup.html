<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body {
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1c1c2e;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
}

h2 { text-align: center; }

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  font-size:16px;
}

button {
  width: 100%;
  padding: 12px;
  background: purple;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.small {
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input id="nameInput" placeholder="Full Name">
<input id="emailInput" placeholder="Email">
<input id="passwordInput" type="password" placeholder="Password">

<button onclick="signup()">Sign Up</button>

<div class="small">
Already have an account? 
<a href="auth.html" style="color:violet;">Login</a>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  sendEmailVerification 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  setDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 USE YOUR REAL CONFIG HERE */
const firebaseConfig = {
  apiKey: "AIzaSyBt09iUFQdxWHxqLYtMKy_YJ91fK67eMMs",
  authDomain: "wizarddigitalaccess.firebaseapp.com",
  projectId: "wizarddigitalaccess",
  storageBucket: "wizarddigitalaccess.firebasestorage.app",
  messagingSenderId: "836340307615",
  appId: "1:836340307615:web:13a8f1eff9360d5c7e34aa",
  measurementId: "G-MR76QMKXKM"
};
const auth = getAuth(app);
const db = getFirestore(app);

/* SIGNUP */
window.signup = async function () {
  const name = document.getElementById("nameInput").value.trim();
  const email = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value;

  if (!name || !email || !password) {
    return alert("Fill all fields");
  }

  if (password.length < 6) {
    return alert("Password must be at least 6 characters");
  }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    const user = cred.user;

    await setDoc(doc(db, "users", user.uid), {
      name,
      email,
      wallet: 0,
      role: "user", // ✅ correct
      createdAt: new Date()
    });

    await sendEmailVerification(user);

    alert("Account created! Verify your email ✔️");
    location.href = "verify.html";

  } catch (err) {
    console.error(err);
    alert(err.message);
  }
};
</script>

</body>
</html>
