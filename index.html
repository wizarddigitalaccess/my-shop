<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ USE REAL CONFIG (VERY IMPORTANT) */
const app = initializeApp({
  apiKey: "YOUR_REAL_API_KEY",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user = null;
let initialized = false;
let allProducts = [];
let currentCategory = "all";

/* 🔐 SAFE AUTH (NO LOOP, NO BLINK) */
onAuthStateChanged(auth, async (u) => {
  if (!u) {
    // wait a bit before redirect (prevents flicker)
    setTimeout(() => {
      if (!auth.currentUser) {
        location.href = "auth.html";
      }
    }, 800);
    return;
  }

  user = u;

  if (!initialized) {
    initialized = true;
    await init();
  }
});

/* AUTO ICON */
function getIcon(category){
  if(category.includes("facebook")) return "📘";
  if(category.includes("instagram")) return "📸";
  if(category.includes("tiktok")) return "🎵";
  if(category.includes("twitter")) return "🐦";
  return "📦";
}

/* INIT */
async function init(){
  allProducts = [];

  const snap = await getDocs(collection(db,"products"));
  let cats = new Set();

  snap.forEach(d=>{
    const p = d.data();
    p.id = d.id;

    if(p.status === "disabled") return;

    allProducts.push(p);
    cats.add(p.category);
  });

  renderCats([...cats]);
  loadProducts();
}

/* CATEGORIES */
function renderCats(cats){
  const div = document.getElementById("categories");

  div.innerHTML = `<div class="cat active" onclick="setCat('all')">All</div>`;

  cats.forEach(c=>{
    div.innerHTML += `<div class="cat" onclick="setCat('${c}')">${c}</div>`;
  });
}

window.setCat = (c)=>{
  currentCategory = c;
  document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
  event.target.classList.add("active");
  loadProducts();
};

/* LOAD */
window.loadProducts = ()=>{
  const search = document.getElementById("search").value.toLowerCase();
  const div = document.getElementById("products");

  div.innerHTML = "";

  allProducts.forEach(p=>{
    if(currentCategory !== "all" && p.category !== currentCategory) return;
    if(!p.name.toLowerCase().includes(search)) return;

    div.innerHTML += `
    <div class="card">
      <div class="icon">${getIcon(p.category)}</div>
      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>

      <div class="row">
        <button onclick="preview('${p.id}')">Preview</button>
        <button onclick="buy('${p.id}')">Buy</button>
      </div>
    </div>`;
  });
};

/* PREVIEW */
window.preview = async(id)=>{
  const snap = await getDoc(doc(db,"products",id));
  const p = snap.data();

  modal.style.display="flex";
  modalContent.innerHTML=`
    <h3>${p.name}</h3>
    <p>Category: ${p.category}</p>
    <p><a href="${p.link || '#'}" target="_blank">View Product</a></p>
    <button onclick="modal.style.display='none'">Close</button>
  `;
};

/* BUY (STOCK SYSTEM READY) */
window.buy = async(id)=>{
  try {
    const pRef = doc(db,"products",id);
    const pSnap = await getDoc(pRef);
    const p = pSnap.data();

    const uRef = doc(db,"users",user.uid);
    const uSnap = await getDoc(uRef);
    const u = uSnap.data();

    if((u.wallet||0) < p.price){
      return alert("Insufficient balance");
    }

    // deduct wallet
    await updateDoc(uRef,{wallet:u.wallet - p.price});

    // create order
    await addDoc(collection(db,"orders"),{
      userId:user.uid,
      productId:id,
      name:p.name,
      price:p.price,
      createdAt:new Date()
    });

    alert("Purchase successful ✅");
    location.href = "orders.html";

  } catch(err){
    console.error(err);
    alert("Error processing purchase");
  }
};
</script>
