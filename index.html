<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

.menu-item{
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
  background:#1c1c2e;
  cursor:pointer;
  transition:0.2s;
}

.menu-item:hover{
  background:#1877f2;
}

/* LOADER */
#loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  z-index:1000;
  background:#1c1c2e;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.site-logo {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:10px;
}

.title {
  font-weight:bold;
  font-size:16px;
}

/* SEARCH */
.search-row {
  position:sticky;
  top:84px;
  z-index:999;
  display:flex;
  gap:8px;
  padding:10px;
  background:#0f0f1a;
}

.search-row input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

.gift-btn {
  background:#1877f2;
  color:white;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.cat.active { background:#1877f2; }

/* PRODUCTS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
  padding:12px;
  padding-bottom:80px;
}

.card {
  background:#1c1c2e;
  padding:14px;
  border-radius:14px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:220px;
}

.card-top {
  text-align:center;
}

.logo {
  width:48px;
  height:48px;
  object-fit:contain;
  margin-bottom:8px;
}

.card h4 {
  font-size:14px;
  height:36px;
  overflow:hidden;
}

.price {
  color:#d5e4f4;
  font-weight:bold;
}

.row {
  display:flex;
  gap:6px;
}

.row button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:#1877f2; }

</style>
</head>

<body>

<div id="loader">Loading...</div>

<div id="app" style="display:none;">

<div class="header">
  <img id="siteLogo" class="site-logo" src="fallback.png">
  <div class="title">Wizard Digital Access</div>

  <div style="margin-left:auto;font-size:22px;cursor:pointer;" onclick="openMenu()">
    ☰
  </div>
</div>

<div id="sideMenu" style="
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  max-width:320px;
  height:100%;
  background:#0f0f1a;
  z-index:9999;
  transition:0.3s;
  padding:20px;
  overflow-y:auto;
">

  <div style="display:flex;justify-content:space-between;align-items:center;">
    <b>Menu</b>
    <span onclick="closeMenu()" style="cursor:pointer;font-size:20px;">✕</span>
  </div>

  <hr style="border-color:#333;margin:15px 0;">

  <div class="menu-item" onclick="goHome(); closeMenu()">🏠 Dashboard</div>
  <div class="menu-item" onclick="goGift(); closeMenu()">🎁 Send Gifts</div>

  <div class="menu-item" onclick="openTelegram(); closeMenu()">📱 Buy Old USA WhatsApp</div>
  <div class="menu-item" onclick="openTelegram(); closeMenu()">✉️ Buy Emails</div>
  <div class="menu-item" onclick="openTelegram(); closeMenu()">💬 Buy Verified Telegram</div>
  <div class="menu-item" onclick="openTelegram(); closeMenu()">⚡ Buy Normal Telegram</div>

  <div class="menu-item" onclick="goSettings(); closeMenu()">⚙️ Settings</div>

  <div class="menu-item" onclick="goOrders(); closeMenu()">📦 Order History</div>
  <div class="menu-item" onclick="goTransactions(); closeMenu()">💰 Transactions</div>

</div>

<!-- ✅ OVERLAY MUST BE OUTSIDE -->
<div id="menuOverlay" onclick="closeMenu()" style="
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  z-index:9998;
"></div>

<div class="search-row">
  <input id="search" placeholder="Search...">
  <button class="gift-btn" onclick="location.href='gift.html'">
    Send Gifts
  </button>
</div>

<div class="categories" id="categories"></div>
<div class="grid" id="products"></div>

<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html">Profile</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, getDoc, updateDoc, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBt09iUFQdxWHxqLYtMKy_YJ91fK67eMMs",
  authDomain: "wizarddigitalaccess.firebaseapp.com",
  projectId: "wizarddigitalaccess",
  storageBucket: "wizarddigitalaccess.appspot.com",
  messagingSenderId: "836340307615",
  appId: "1:836340307615:web:13a8f1eff9360d5c7e34aa",
  measurementId: "G-MR76QMKXKM"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user, allProducts=[], currentCategory="all";

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");

const searchInput = document.getElementById("search");
const productsDiv = document.getElementById("products");
const categoriesDiv = document.getElementById("categories");

/* AUTH */
onAuthStateChanged(auth, async (u)=>{
  if(!u) return location.replace("auth.html");

  user = u;

  await init();

  loader.style.display="none";
  appDiv.style.display="block";
});

/* INIT */
async function init(){
  await loadCategories();
  await loadProductsData();
  loadProducts();
}

/* CATEGORIES */
async function loadCategories(){
  categoriesDiv.innerHTML="";
  const all=createCat("All","all");
  all.classList.add("active");
  categoriesDiv.appendChild(all);

  const snap = await getDocs(collection(db,"categories"));
  snap.forEach(d=>{
    const c=d.data();
    if(!c.name) return;
    categoriesDiv.appendChild(createCat(c.name,c.name));
  });
}

function createCat(label,value){
  const div=document.createElement("div");
  div.className="cat";
  div.innerText=label;

  div.onclick=()=>{
    currentCategory=value;
    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    loadProducts();
  };

  return div;
}

/* PRODUCTS */
async function loadProductsData(){
  allProducts=[];
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p=d.data();
    if(!p.name) return;

    p.id=d.id;
    const logoMap = {
  "facebook": "https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg",
  "telegram": "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg",
  "whatsapp": "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg",
  "gmail": "https://upload.wikimedia.org/wikipedia/commons/4/4e/Gmail_Icon.png",
  "instagram": "https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png"
};

const name = (p.name || "").toLowerCase();

let matchedLogo = "";

/* STEP 1: CHECK MAP */
for (let key in logoMap) {
  if (name.includes(key)) {
    matchedLogo = logoMap[key];
    break;
  }
}

/* STEP 2: AUTO BRAND LOGO (IMPORTANT) */
if (!matchedLogo) {
  const words = name.replace(/[^a-z0-9 ]/g, "").split(" ");

let domain = words.find(w =>
  ["facebook","telegram","whatsapp","gmail","instagram","twitter","netflix","amazon"].includes(w)
);

if (!domain) {
  domain = words[0]; // fallback
}

matchedLogo = `https://logo.clearbit.com/${domain}.com`;
}

/* STEP 3: FINAL FALLBACK */
p.logo = p.logo || matchedLogo || "fallback.png";
    allProducts.push(p);
  });
}

searchInput.addEventListener("input", loadProducts);

function loadProducts(){
  const search = searchInput.value.toLowerCase();
  productsDiv.innerHTML = "";

  allProducts.forEach(p => {
    if(currentCategory !== "all" && (p.category || "").toLowerCase() !== currentCategory.toLowerCase()) return;
    if(!p.name.toLowerCase().includes(search)) return;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="card-top">
        <img src="${p.logo}" class="logo" onerror="this.src='fallback.png'">
        <h4>${p.name}</h4>
        <div class="price">₦${p.price}</div>
        <div style="font-size:11px;color:gray;">
          ${(p.stock || 0) > 0 ? "Available" : "Out of stock"}
        </div>
      </div>
    `;

    const row = document.createElement("div");
    row.className = "row";

    const previewBtn = document.createElement("button");
    previewBtn.textContent = "Preview";
    previewBtn.onclick = () => preview(p);

    const buyBtn = document.createElement("button");
    buyBtn.textContent = "Buy";
    buyBtn.onclick = () => buy(p.id);

    row.append(previewBtn, buyBtn);
    card.appendChild(row);

    productsDiv.appendChild(card);
  });
}

function preview(p){
  if(p.previewLink){
    window.open(p.previewLink, "_blank");
  }else{
    alert("No preview available");
  }
}

/* BUY SYSTEM UNCHANGED */
import { runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function buy(id){
  try{

    const userRef = doc(db,"users",user.uid);
    const productRef = doc(db,"products",id);

    await runTransaction(db, async (transaction)=>{

      const userSnap = await transaction.get(userRef);
      const productSnap = await transaction.get(productRef);

      if(!userSnap.exists()) throw "User not found";
      if(!productSnap.exists()) throw "Product not found";

      const userData = userSnap.data();
      const productData = productSnap.data();

      // 💰 CHECK BALANCE
      if((userData.wallet || 0) < productData.price){
        throw "Insufficient balance";
      }

      // 📦 CHECK STOCK SAFELY
      if(!productData.accounts || productData.accounts.length === 0){
        throw "Out of stock";
      }

      // 🎯 TAKE FIRST ACCOUNT
      const account = productData.accounts[0];

      // 🔄 REMOVE IT FROM STOCK
      const updatedAccounts = productData.accounts.slice(1);

      // 💳 UPDATE USER BALANCE
      transaction.update(userRef,{
        wallet: (userData.wallet || 0) - productData.price
      });

      // 📉 UPDATE PRODUCT STOCK
      transaction.update(productRef,{
        accounts: updatedAccounts,
        stock: updatedAccounts.length
      });

      // 🧾 CREATE ORDER (SAFE DELIVERY)
      const orderRef = doc(collection(db,"orders"));

      transaction.set(orderRef,{
        userId: user.uid,
        productId: id,
        name: productData.name,
        price: productData.price,
        email: account.email,
        password: account.password,
        logo: productData.logo,
        createdAt: Date.now()
      });

    });

    alert("✅ Purchase successful");
location.href="orders.html";

}catch(e){
  console.error(e);

  if((e+"").includes("permission-denied")){
    alert("Service temporarily unavailable");
  }else if((e+"").includes("Insufficient")){
    alert("Insufficient balance");
  }else if((e+"").includes("stock")){
    alert("Out of stock");
  }else{
    alert("Something went wrong, try again");
  }
}
}

window.openMenu = () => {
  document.getElementById("sideMenu").style.right = "0";
  document.getElementById("menuOverlay").style.display = "block";
};

window.closeMenu = () => {
  document.getElementById("sideMenu").style.right = "-100%";
  document.getElementById("menuOverlay").style.display = "none";
};

/* NAVIGATION */
window.goHome = () => location.href = "index.html";
window.goGift = () => location.href = "gift.html";
window.goSettings = () => location.href = "profile.html";
window.goOrders = () => location.href = "orders.html";
window.goTransactions = () => location.href = "wallet.html";

/* TELEGRAM LINKS */
window.openTelegram = () => {
  window.open("https://t.me/wizardigitalaccess", "_blank");
};

document.addEventListener("click", (e) => {
  const menu = document.getElementById("sideMenu");

  if (
    (menu.style.right === "0px" || menu.style.right === "0") &&
    !menu.contains(e.target) &&
    !e.target.closest("[onclick='openMenu()']")
  ) {
    closeMenu();
  }
});
</script>

</body>
</html>
