<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1c1c2e;
  padding:10px;
  position:sticky;
  top:0;
}

.search {
  flex:1;
  margin:0 10px;
}

.search input {
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
}

/* LAYOUT */
.layout {
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:120px;
  background:#111;
  padding:10px;
}

.cat {
  padding:8px;
  margin-bottom:5px;
  background:#222;
  border-radius:6px;
  cursor:pointer;
}

.cat.active {
  background:purple;
}

/* PRODUCTS */
.products {
  flex:1;
  padding:10px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.product {
  background:#1c1c2e;
  padding:10px;
  border-radius:10px;
}

.product img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

button {
  width:100%;
  padding:8px;
  border:none;
  border-radius:6px;
  background:purple;
  color:white;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <div>🛒 Shop</div>
  <div class="search">
    <input id="search" placeholder="Search products..." oninput="renderProducts()">
  </div>
  <div>₦<span id="wallet">0</span></div>
</div>

<div class="layout">

<div class="sidebar" id="categories"></div>

<div class="products" id="products"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let products = [];
let currentCat = "all";

// 🔐 AUTH
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";

  const userSnap = await getDoc(doc(db,"users",user.uid));
  if(userSnap.exists()){
    wallet.innerText = userSnap.data().wallet || 0;
  }

  loadProducts();
});

// 📦 LOAD
async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));

  let cats = new Set();

  products = [];

  snap.forEach(d=>{
    let data = d.data();
    data.id = d.id;

    products.push(data);
    cats.add(data.category);
  });

  renderCategories([...cats]);
  renderProducts();
}

// 📂 CATEGORIES
function renderCategories(cats){
  const div = document.getElementById("categories");
  div.innerHTML = "";

  div.innerHTML += `<div class="cat active" onclick="filter('all')">All</div>`;

  cats.forEach(c=>{
    div.innerHTML += `<div class="cat" onclick="filter('${c}')">${c}</div>`;
  });
}

// 🎯 FILTER
window.filter = function(cat){
  currentCat = cat;

  document.querySelectorAll(".cat").forEach(el=>{
    el.classList.remove("active");
  });

  event.target.classList.add("active");

  renderProducts();
};

// 🛒 RENDER PRODUCTS
window.renderProducts = function(){
  const div = document.getElementById("products");
  const search = document.getElementById("search").value.toLowerCase();

  div.innerHTML = "";

  let filtered = products.filter(p=>{
    return (
      (currentCat === "all" || p.category === currentCat) &&
      p.name.toLowerCase().includes(search)
    );
  });

  filtered.forEach(p=>{
    div.innerHTML += `
      <div class="product">
        <img src="${p.image || 'https://via.placeholder.com/150'}">
        <b>${p.name}</b><br>
        ₦${p.price}
        <button onclick="buy('${p.id}', ${p.price})">Buy Now</button>
      </div>
    `;
  });
};

// 💳 BUY
window.buy = async function(id, price){
  const user = auth.currentUser;

  if(!confirm("Buy this product?")) return;

  await addDoc(collection(db,"transactions"),{
    uid:user.uid,
    productId:id,
    amount:price,
    status:"pending",
    createdAt:new Date()
  });

  alert("Order submitted ✔️");
};
</script>

</body>
</html>
