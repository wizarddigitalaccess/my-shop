<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

.header {
  background:#1c1c2e;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.container { padding:15px; }

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

.products {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.product {
  background:#1c1c2e;
  padding:10px;
  border-radius:10px;
}

button {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
  margin-top:5px;
}

.cat {
  display:inline-block;
  padding:5px 10px;
  margin:5px;
  background:#222;
  border-radius:20px;
  cursor:pointer;
}

.cat.active {
  background:purple;
}
</style>
</head>

<body>

<div class="header">
  <div>🛒 Marketplace</div>
  <div>₦<span id="wallet">0</span></div>
</div>

<div class="container">

<div class="card">
<h3>Categories</h3>
<div id="categories"></div>
</div>

<div class="card">
<h3>Products</h3>
<div id="products" class="products"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let allProducts = [];
let currentCategory = "all";

// 🔐 AUTH
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "auth.html";

  // load wallet
  const userSnap = await getDoc(doc(db,"users",user.uid));
  if(userSnap.exists()){
    document.getElementById("wallet").innerText =
      userSnap.data().wallet || 0;
  }

  loadProducts();
});

// 📦 LOAD PRODUCTS
async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));

  allProducts = [];
  let categories = new Set();

  snap.forEach(d=>{
    const data = d.data();
    data.id = d.id;

    allProducts.push(data);
    categories.add(data.category);
  });

  renderCategories([...categories]);
  renderProducts();
}

// 🎯 RENDER CATEGORIES
function renderCategories(cats){
  const div = document.getElementById("categories");
  div.innerHTML = "";

  div.innerHTML += `<span class="cat active" onclick="filter('all')">All</span>`;

  cats.forEach(c=>{
    div.innerHTML += `
      <span class="cat" onclick="filter('${c}')">${c}</span>
    `;
  });
}

// 🛒 RENDER PRODUCTS
function renderProducts(){
  const div = document.getElementById("products");
  div.innerHTML = "";

  const filtered = currentCategory === "all"
    ? allProducts
    : allProducts.filter(p => p.category === currentCategory);

  filtered.forEach(p=>{
    div.innerHTML += `
      <div class="product">
        <b>${p.name}</b><br>
        ₦${p.price}<br>
        <button onclick="buy('${p.id}', ${p.price})">Buy</button>
      </div>
    `;
  });
}

// 🎯 FILTER
window.filter = function(cat){
  currentCategory = cat;

  document.querySelectorAll(".cat").forEach(el=>{
    el.classList.remove("active");
  });

  event.target.classList.add("active");

  renderProducts();
};

// 💳 BUY
window.buy = async function(id, price){
  const user = auth.currentUser;

  if(!confirm("Confirm purchase?")) return;

  await addDoc(collection(db,"transactions"),{
    uid:user.uid,
    productId:id,
    amount:price,
    status:"pending",
    createdAt:new Date()
  });

  alert("Order placed! Await admin approval.");
};
</script>

</body>
</html>
