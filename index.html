<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
}

/* HEADER */
.header {
  background: #1e1e2f;
  text-align: center;
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  padding: 15px;
}

/* CARD */
.card {
  background: #1c1c2e;
  border-radius: 15px;
  padding: 15px;
}

.price {
  font-weight: bold;
  margin: 10px 0;
}

.buy {
  background: purple;
  padding: 8px 15px;
  border-radius: 20px;
  cursor: pointer;
  display: inline-block;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #1e1e2f;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
}

.account {
  padding: 10px;
  border-bottom: 1px solid #444;
  cursor: pointer;
}

.preview {
  margin-top: 15px;
  background: #111;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
<h2>Wizard Digital Access</h2>
</div>

<div class="grid">

<div class="card">
<h3>Africa Facebook</h3>
<div class="price">₦8,000</div>
<div class="buy" onclick="openModal('africa')">Buy</div>
</div>

<div class="card">
<h3>USA Facebook</h3>
<div class="price">₦18,000</div>
<div class="buy" onclick="openModal('usa')">Buy</div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Select Account</h3>

<div id="accountList"></div>

<div class="preview" id="preview"></div>

<br>
<button onclick="confirmPurchase()">Confirm Purchase</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>
const accounts = {
  africa: [
    {name: "User1", link: "https://facebook.com/user1"},
    {name: "User2", link: "https://facebook.com/user2"}
  ],
  usa: [
    {name: "USAUser1", link: "https://facebook.com/usa1"},
    {name: "USAUser2", link: "https://facebook.com/usa2"}
  ]
};

let selectedAccount = null;

function openModal(type){
  document.getElementById("modal").style.display = "flex";
  let list = document.getElementById("accountList");
  list.innerHTML = "";

  accounts[type].forEach(acc => {
    let div = document.createElement("div");
    div.className = "account";
    div.innerText = acc.name;
    div.onclick = () => selectAccount(acc);
    list.appendChild(div);
  });
}

function selectAccount(acc){
  selectedAccount = acc;
  document.getElementById("preview").innerHTML =
    "Preview:<br>" +
    acc.name + "<br>" +
    "<a href='"+acc.link+"' target='_blank'>View Profile</a>";
}

function confirmPurchase(){
  if(!selectedAccount){
    alert("Select account first");
    return;
  }

  alert("Purchased: " + selectedAccount.name);
  closeModal();
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
