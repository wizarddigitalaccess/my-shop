<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
.loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

/* HEADER */
.header {
  background:#1c1c2e;
  padding:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.title { font-weight:bold; }

.header input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

/* PRODUCTS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
  padding:12px;
}

.card {
  background:#1c1c2e;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.logo {
  width:50px;
  height:50px;
  background:white;
  border-radius:8px;
}

/* NAV (TEXT ONLY FIXED) */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div class="header">
  <div class="title">Wizard Digital Access</div>
  <input id="search" placeholder="Search...">
</div>

<div class="grid" id="products"></div>

<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html">Profile</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user;
let allProducts=[];

/* ⚡ FAST AUTH FIX */
onAuthStateChanged(auth, async (u)=>{
  if(!u){
    location.href="auth.html";
    return;
  }

  user = u;

  loadProducts();

  loader.style.display="none"; // 🔥 instant show
});

/* LOAD PRODUCTS */
async function loadProducts(){
  const snap = await getDocs(collection(db,"products"));
  products.innerHTML="";

  snap.forEach(d=>{
    const p = d.data();

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.logo||''}" class="logo"
      onerror="this.src='https://via.placeholder.com/50'">
      <h4>${p.name}</h4>
      <p>₦${p.price}</p>
    `;

    const btn=document.createElement("button");
    btn.textContent="Buy";
    btn.onclick=()=>buy(d.id);

    card.appendChild(btn);
    products.appendChild(card);
  });
}

/* 🔥 FIXED BUY (REAL FIX) */
async function buy(id){
  const pDoc = await getDoc(doc(db,"products",id));
  const p = pDoc.data();

  const uRef = doc(db,"users",user.uid);
  const uSnap = await getDoc(uRef);

  if(!uSnap.exists()){
    alert("User error");
    return;
  }

  const wallet = Number(uSnap.data().wallet || 0);

  if(wallet < p.price){
    alert("Insufficient funds"); // ✅ fixed spelling + logic
    return;
  }

  const stockRef = doc(db,"productStock",id);
  const stockSnap = await getDoc(stockRef);

  let items = stockSnap.data().items || [];
  const item = items.find(i=>!i.sold);

  if(!item){
    alert("Out of stock");
    return;
  }

  item.sold = true;

  await updateDoc(uRef,{wallet: wallet - p.price});
  await updateDoc(stockRef,{items});

  await addDoc(collection(db,"orders"),{
    userId:user.uid,
    name:p.name,
    price:p.price,
    email:item.email,
    password:item.password,
    createdAt:new Date()
  });

  alert(`Email: ${item.email}\nPassword: ${item.password}`);
}
</script>

</body>
</html>
