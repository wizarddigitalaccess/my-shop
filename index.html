<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
.loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #333;
  border-top:4px solid purple;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg);} }

/* HEADER */
.header {
  background:#1c1c2e;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.site-logo {
  width:30px;
  height:30px;
  border-radius:6px;
  background:white;
  padding:4px;
}

.title {
  font-weight:bold;
}

.header input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.cat.active { background:purple; }

/* PRODUCTS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
  padding:12px;
}

.card {
  background:#1c1c2e;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.logo {
  width:50px;
  height:50px;
  object-fit:contain;
  border-radius:10px;
  background:white;
  padding:6px;
}

.price {
  color:violet;
  font-weight:bold;
}

button {
  width:100%;
  padding:8px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:10px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div id="app">

<div class="header">
  <img src="https://logo.clearbit.com/google.com" class="site-logo">
  <div class="title">Wizard Digital Access</div>
  <input id="search" placeholder="Search...">
</div>

<div class="categories" id="categories"></div>
<div class="grid" id="products"></div>

<div class="nav">
  <a href="index.html" class="active">🏠</a>
  <a href="wallet.html">💳</a>
  <a href="orders.html">📦</a>
  <a href="profile.html">👤</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let allProducts=[];
let currentCategory="all";

/* AUTH */
onAuthStateChanged(auth,(user)=>{
  if(!user){
    location.href="auth.html";
    return;
  }

  // show UI immediately
  document.getElementById("loader").style.display="none";

  // load data async (no blocking)
  loadData();
});

/* LOAD DATA */
async function loadData(){
  try {
    const prodSnap = await getDocs(collection(db,"products"));
    const catSnap = await getDocs(collection(db,"categories"));

    const map = new Map();
    allProducts=[];

    prodSnap.forEach(d=>{
      const p=d.data();
      p.id=d.id;
      allProducts.push(p);
      if(!map.has(p.category)) map.set(p.category,true);
    });

    catSnap.forEach(d=>{
      const c=d.data();
      if(!map.has(c.name)) map.set(c.name,true);
    });

    renderCats(map);
    renderProducts();

  } catch(err){
    console.error(err);

    // fallback UI
    products.innerHTML = "<p style='padding:20px'>Failed to load products</p>";
  }
}

/* CATEGORY */
function renderCats(map){
  categories.innerHTML="";

  const all=createCat("All","all");
  all.classList.add("active");
  categories.appendChild(all);

  map.forEach((_,name)=>{
    categories.appendChild(createCat(name,name));
  });
}

function createCat(label,value){
  const div=document.createElement("div");
  div.className="cat";
  div.innerText=label;

  div.onclick=()=>{
    currentCategory=value;
    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    renderProducts();
  };

  return div;
}

/* LOGO FIX */
function logo(url){
  if(!url) return "https://via.placeholder.com/50?text=Logo";
  try{
    return `https://logo.clearbit.com/${new URL(url).hostname}`;
  }catch{
    return url;
  }
}

/* PRODUCTS */
function renderProducts(){
  const search = document.getElementById("search").value.toLowerCase();
  products.innerHTML="";

  if(allProducts.length === 0){
    products.innerHTML = "<p style='padding:20px'>No products yet</p>";
    return;
  }

  allProducts.forEach(p=>{
    if(currentCategory!=="all" && p.category!==currentCategory) return;
    if(!p.name.toLowerCase().includes(search)) return;

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${logo(p.logo)}" class="logo">
      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>
      <button>Buy</button>
    `;

    products.appendChild(div);
  });
}
</script>

</body>
</html>
