<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
#loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  z-index:1000;
  background:#1c1c2e;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.site-logo {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:10px;
}

.title {
  font-weight:bold;
  font-size:16px;
}

.menu {
  margin-left:auto;
  font-size:22px;
  cursor:pointer;
}

/* SEARCH */
.search-row {
  display:flex;
  gap:8px;
  padding:10px;
}

.search-row input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

.gift-btn {
  background:#1877f2;
  border:none;
  color:white;
  padding:10px;
  border-radius:8px;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.cat.active { background:#1877f2; }

/* PRODUCTS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
  padding:12px;
  padding-bottom:80px;
}

.card {
  background:#1c1c2e;
  padding:14px;
  border-radius:14px;
  text-align:center;
}

.logo {
  width:48px;
  height:48px;
  object-fit:contain;
}

.price {
  color:#4da3ff;
  font-weight:bold;
}

.row {
  display:flex;
  gap:8px;
  margin-top:10px;
}

.row button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1c1c2e;
  padding:20px;
  border-radius:12px;
  width:90%;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:#1877f2; }

/* 🔥 SIDE MENU */
#sideMenu {
  position:fixed;
  top:0;
  left:-100%;
  width:80%;
  height:100%;
  background:#fff;
  color:#000;
  z-index:2000;
  transition:0.3s;
  overflow:auto;
  border-radius:0 15px 15px 0;
}
</style>
</head>

<body>

<div id="loader">Loading...</div>

<div id="app" style="display:none;">

<!-- HEADER -->
<div class="header">
  <img id="siteLogo" class="site-logo">
  <div class="title">Wizard Digital Access</div>
  <div class="menu" onclick="openMenu()">☰</div>
</div>

<div class="search-row">
  <input id="search" placeholder="Search...">
  <button class="gift-btn">🎁</button>
</div>

<div class="categories" id="categories"></div>
<div class="grid" id="products"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- 🔥 SIDE MENU -->
<div id="sideMenu">
  <div style="padding:15px;">

    <div style="text-align:right;">
      <span onclick="closeMenu()">✖</span>
    </div>

    <div>
      <b id="menuName">User</b><br>
      <small id="menuEmail"></small>
    </div>

    <div style="margin-top:15px;background:purple;padding:15px;border-radius:15px;color:white;">
      <div>Balance</div>
      <h2 id="menuBalance">₦0</h2>
      <button onclick="location.href='wallet.html'">+ Fund</button>
    </div>

    <div style="margin-top:20px;">
      <div onclick="closeMenu()">Dashboard</div>
      <div onclick="alert('Coming soon')">Send gifts/ring</div>
      <div onclick="location.href='profile.html'">Settings</div>
      <div onclick="location.href='orders.html'">Order History</div>
    </div>

  </div>
</div>

<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html">Profile</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user, allProducts=[], currentCategory="all";

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");

const searchInput = document.getElementById("search");
const productsDiv = document.getElementById("products");
const categoriesDiv = document.getElementById("categories");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

/* MENU */
window.openMenu = ()=> document.getElementById("sideMenu").style.left="0";
window.closeMenu = ()=> document.getElementById("sideMenu").style.left="-100%";

/* SITE LOGO */
document.getElementById("siteLogo").src = "fallback.png";

/* AUTH */
onAuthStateChanged(auth, async (u)=>{
  if(!u) return location.replace("auth.html");

  user = u;

  /* LOAD MENU USER */
  const ref = doc(db,"users",u.uid);
  const snap = await getDoc(ref);
  const data = snap.data();

  document.getElementById("menuName").innerText = data.name || "User";
  document.getElementById("menuEmail").innerText = data.email || "";
  document.getElementById("menuBalance").innerText = "₦" + (data.wallet || 0);

  await init();

  loader.style.display="none";
  appDiv.style.display="block";
});

/* INIT */
async function init(){
  await loadCategories();
  await loadProductsData();
  loadProducts();
}

/* CATEGORIES */
async function loadCategories(){
  categoriesDiv.innerHTML="";
  const all=createCat("All","all");
  all.classList.add("active");
  categoriesDiv.appendChild(all);

  const snap = await getDocs(collection(db,"categories"));
  snap.forEach(d=>{
    categoriesDiv.appendChild(createCat(d.data().name,d.data().name));
  });
}

function createCat(label,value){
  const div=document.createElement("div");
  div.className="cat";
  div.innerText=label;

  div.onclick=()=>{
    currentCategory=value;
    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    loadProducts();
  };

  return div;
}

/* PRODUCTS */
async function loadProductsData(){
  allProducts=[];
  const snap = await getDocs(collection(db,"products"));
  snap.forEach(d=>{
    const p=d.data();
    p.id=d.id;
    p.logo = p.logo || "fallback.png";
    allProducts.push(p);
  });
}

searchInput.addEventListener("input", loadProducts);

function loadProducts(){
  const search=searchInput.value.toLowerCase();
  productsDiv.innerHTML="";

  allProducts.forEach(p=>{
    if(currentCategory!=="all" && p.category!==currentCategory) return;
    if(!p.name.toLowerCase().includes(search)) return;

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.logo}" class="logo">
      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>
    `;

    const row=document.createElement("div");
    row.className="row";

    const previewBtn=document.createElement("button");
    previewBtn.textContent="Preview";
    previewBtn.onclick=()=>preview(p);

    const buyBtn=document.createElement("button");
    buyBtn.textContent="Buy";
    buyBtn.onclick=()=>buy(p.id);

    row.append(previewBtn,buyBtn);
    card.appendChild(row);

    productsDiv.appendChild(card);
  });
}

/* PREVIEW */
function preview(p){
  modalContent.innerHTML=`
    <h3>${p.name}</h3>
    <p>${p.description || ""}</p>
    <button onclick="document.getElementById('modal').style.display='none'">Close</button>
  `;
  modal.style.display="flex";
}

/* BUY */
async function buy(id){
  alert("Buying...");
}
</script>

</body>
</html>
