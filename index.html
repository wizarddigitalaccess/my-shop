<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
#loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  z-index:1000;
  background:#1c1c2e;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.site-logo {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:10px;
}

.title {
  font-weight:bold;
  font-size:16px;
}

.menu {
  margin-left:auto;
  font-size:22px;
  cursor:pointer;
}

/* 🔥 FIXED SEARCH + GIFT */
.search-row {
  position:sticky;
  top:84px;
  z-index:999;
  display:flex;
  gap:8px;
  padding:10px;
  background:#0f0f1a;
}

.search-row input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

.gift-btn {
  background:#1877f2;
  color:white;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  white-space:nowrap;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
  margin-top:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.cat.active { background:#1877f2; }

/* 🔥 PRODUCTS GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
  padding:12px;
  padding-bottom:80px;
}

/* 🔥 CARD FIX */
.card {
  background:#1c1c2e;
  padding:14px;
  border-radius:14px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:220px; /* 🔥 LOCK HEIGHT */
}

/* TOP CONTENT */
.card-top {
  text-align:center;
}

.logo {
  width:48px;
  height:48px;
  object-fit:contain;
  margin-bottom:8px;
}

/* 🔥 TITLE FIX */
.card h4 {
  font-size:14px;
  margin:5px 0;
  height:36px; /* 🔥 LOCK TITLE HEIGHT */
  overflow:hidden;
}

/* 🔥 PRICE FIX */
.price {
  color:#d5e4f4;
  font-weight:bold;
  margin-top:5px;
}

/* 🔥 BUTTON ROW LOCKED */
.row {
  display:flex;
  gap:6px;
  margin-top:10px;
}

.row button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
  font-size:12px;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1c1c2e;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:#1877f2; }

/* SIDE MENU */
#sideMenu {
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  height:100%;
  background:#0f0f1a;
  z-index:2000;
  transition:0.3s;
  display:flex;
  flex-direction:column;
}
</style>
</head>

<body>

<div id="loader">Loading...</div>

<div id="app" style="display:none;">

<div class="header">
  <img id="siteLogo" class="site-logo">
  <div class="title">Wizard Digital Access</div>
  <div class="menu" onclick="openMenu()">☰</div>
</div>

<div class="search-row">
  <input id="search" placeholder="Search...">
  <button class="gift-btn" onclick="location.href='gift.html'">
    Send Gifts
  </button>
</div>

<div class="categories" id="categories"></div>
<div class="grid" id="products"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html">Profile</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, getDoc, updateDoc, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user, allProducts=[], currentCategory="all";

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");

const searchInput = document.getElementById("search");
const productsDiv = document.getElementById("products");
const categoriesDiv = document.getElementById("categories");

onAuthStateChanged(auth, async (u)=>{
  if(!u) return location.replace("auth.html");

  user = u;

  await init();

  loader.style.display="none";
  appDiv.style.display="block";
});

async function init(){
  await loadCategories();
  await loadProductsData();
  loadProducts();
}

async function loadCategories(){
  categoriesDiv.innerHTML="";
  const all=createCat("All","all");
  all.classList.add("active");
  categoriesDiv.appendChild(all);

  const snap = await getDocs(collection(db,"categories"));
  snap.forEach(d=>{
    const c=d.data();
    categoriesDiv.appendChild(createCat(c.name,c.name));
  });
}

function createCat(label,value){
  const div=document.createElement("div");
  div.className="cat";
  div.innerText=label;

  div.onclick=()=>{
    currentCategory=value;
    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    loadProducts();
  };

  return div;
}

async function loadProductsData(){
  allProducts=[];
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p=d.data();
    p.id=d.id;
    p.logo = p.logo || "fallback.png";
    allProducts.push(p);
  });
}

searchInput.addEventListener("input", loadProducts);

function loadProducts(){
  const search=searchInput.value.toLowerCase();
  productsDiv.innerHTML="";

  allProducts.forEach(p=>{
    if(currentCategory!=="all" && p.category!==currentCategory) return;
    if(!p.name.toLowerCase().includes(search)) return;

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="card-top">
        <img src="${p.logo}" class="logo" onerror="this.src='fallback.png'">
        <h4>${p.name}</h4>
        <div class="price">₦${p.price}</div>
      </div>
    `;

    const row=document.createElement("div");
    row.className="row";

    const previewBtn=document.createElement("button");
    previewBtn.textContent="Preview";
    previewBtn.onclick=()=>preview(p);

    const buyBtn=document.createElement("button");
    buyBtn.textContent="Buy";
    buyBtn.onclick=()=>buy(p.id);

    row.append(previewBtn,buyBtn);
    card.appendChild(row);

    productsDiv.appendChild(card);
  });
}

function preview(p){
  alert(p.name);
}

async function buy(id){
  alert("Buy working");
}
</script>

</body>
</html>
