<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f1a;
  color:white;
}

.header {
  background:#1c1c2e;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.header input {
  width:60%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.cat.active { background:purple; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:15px;
  padding:15px;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  text-align:center;
}

.logo {
  width:50px;
  height:50px;
  object-fit:contain;
  border-radius:10px;
  margin-bottom:10px;
  background:#222;
}

.price {
  color:violet;
  font-weight:bold;
}

.row {
  display:flex;
  gap:5px;
  margin-top:10px;
}

.row button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.modal {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content {
  background:#1c1c2e;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:10px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="header">
  <b>🛒 Wizard Digital Access</b>
  <input id="search" placeholder="Search...">
</div>

<div class="categories" id="categories"></div>
<div class="grid" id="products"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<div class="nav">
  <a href="index.html" class="active">🏠</a>
  <a href="wallet.html">💳</a>
  <a href="orders.html">📦</a>
  <a href="profile.html">👤</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG (ISOLATED FROM ADMIN) */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* STATE */
let user = null;
let allProducts = [];
let currentCategory = "all";
let loaded = false;

/* DOM */
const searchInput = document.getElementById("search");
const productsDiv = document.getElementById("products");
const categoriesDiv = document.getElementById("categories");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

/* AUTH */
onAuthStateChanged(auth, async (u) => {
  if (!u) {
    setTimeout(()=>{
      if (!auth.currentUser) location.href = "auth.html";
    },500);
    return;
  }

  user = u;

  if (!loaded) {
    loaded = true;
    await init();
  }
});

/* SEARCH */
searchInput.addEventListener("input", loadProducts);

/* INIT */
async function init(){
  allProducts = [];

  const snap = await getDocs(collection(db,"products"));
  let cats = new Set();

  snap.forEach(d=>{
    const p = d.data();
    p.id = d.id;

    if(p.status === "disabled") return;

    allProducts.push(p);
    cats.add(p.category);
  });

  renderCats([...cats]);
  loadProducts();
}

/* CATEGORIES */
function renderCats(cats){
  categoriesDiv.innerHTML = "";

  const allBtn = createCatButton("All", "all");
  allBtn.classList.add("active");
  categoriesDiv.appendChild(allBtn);

  cats.forEach(c=>{
    categoriesDiv.appendChild(createCatButton(c, c));
  });
}

function createCatButton(label, value){
  const btn = document.createElement("div");
  btn.className = "cat";
  btn.textContent = label;

  btn.onclick = ()=>{
    currentCategory = value;

    document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
    btn.classList.add("active");

    loadProducts();
  };

  return btn;
}

/* LOAD PRODUCTS */
function loadProducts(){
  const search = searchInput.value.toLowerCase();
  productsDiv.innerHTML = "";

  allProducts.forEach(p=>{
    if(currentCategory !== "all" && p.category !== currentCategory) return;
    if(!p.name.toLowerCase().includes(search)) return;

    const card = document.createElement("div");
    card.className = "card";

    const logo = p.logo || "";

    card.innerHTML = `
      <img src="${logo}" class="logo" onerror="this.style.display='none'">
      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>
    `;

    const row = document.createElement("div");
    row.className = "row";

    const previewBtn = document.createElement("button");
    previewBtn.textContent = "Preview";
    previewBtn.onclick = ()=>preview(p);

    const buyBtn = document.createElement("button");
    buyBtn.textContent = "Buy";
    buyBtn.onclick = ()=>buy(p.id);

    row.append(previewBtn, buyBtn);
    card.appendChild(row);

    productsDiv.appendChild(card);
  });
}

/* PREVIEW */
function preview(p){
  modalContent.innerHTML = `
    <img src="${p.logo || ''}" class="logo" onerror="this.style.display='none'">
    <h3>${p.name}</h3>
    <p>${p.description || "No description"}</p>

    ${p.previewLink ? `
      <a href="${p.previewLink}" target="_blank">
        <button style="margin-top:10px;background:#444">Open Preview</button>
      </a>
    ` : ""}

    <br><br>
    <button id="closeModal">Close</button>
  `;

  modal.style.display = "flex";

  document.getElementById("closeModal").onclick = ()=>{
    modal.style.display = "none";
  };
}

/* CLOSE MODAL */
modal.onclick = (e)=>{
  if(e.target === modal){
    modal.style.display = "none";
  }
};

/* BUY */
async function buy(id){
  try{
    const pRef = doc(db,"products",id);
    const pSnap = await getDoc(pRef);
    const p = pSnap.data();

    const uRef = doc(db,"users",user.uid);
    const uSnap = await getDoc(uRef);
    const u = uSnap.data();

    if((u.wallet||0) < p.price){
      return alert("Insufficient balance");
    }

    const stockRef = doc(db,"productStock",id);
    const stockSnap = await getDoc(stockRef);

    if(!stockSnap.exists()){
      return alert("No stock available");
    }

    let items = stockSnap.data().items;
    const index = items.findIndex(i => !i.sold);

    if(index === -1){
      return alert("Out of stock");
    }

    const item = items[index];
    items[index].sold = true;

    await updateDoc(uRef,{wallet:u.wallet - p.price});

    /* 🔥 FIXED: NOW SAVES LOGO */
    await addDoc(collection(db,"orders"),{
      userId:user.uid,
      productId:id,
      name:p.name,
      price:p.price,
      email:item.email,
      password:item.password,
      logo: p.logo || "",
      createdAt:new Date()
    });

    await updateDoc(stockRef,{items});

    alert(`✅ Purchase successful

Email: ${item.email}
Password: ${item.password}`);

    location.href = "orders.html";

  }catch(err){
    console.error(err);
    alert("Error processing purchase");
  }
}
</script>

</body>
</html>
