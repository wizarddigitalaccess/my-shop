<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
#loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* 🔥 FIXED HEADER */
.header {
  position:sticky;
  top:0;
  z-index:1000;
  background:#1c1c2e;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* BIG LOGO */
.site-logo {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:10px;
}

/* TITLE */
.title {
  font-weight:bold;
  font-size:16px;
}

/* MENU */
.menu {
  margin-left:auto;
  font-size:22px;
  cursor:pointer;
}

/* SEARCH + ACTION */
.search-row {
  display:flex;
  gap:8px;
  padding:10px;
}

.search-row input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

/* 🔥 SEND GIFT BUTTON */
.gift-btn {
  background:#1877f2;
  border:none;
  color:white;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.cat.active { background:#1877f2; }

/* PRODUCTS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
  padding:12px;
  padding-bottom:80px;
}

.card {
  background:#1c1c2e;
  padding:14px;
  border-radius:14px;
  text-align:center;
}

/* PRODUCT LOGO */
.logo {
  width:48px;
  height:48px;
  object-fit:contain;
  margin-bottom:10px;
}

/* PRICE */
.price {
  color:#4da3ff;
  font-weight:bold;
}

/* 🔥 BUTTON ROW FIXED */
.row {
  display:flex;
  gap:8px;
  margin-top:10px;
}

.row button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1c1c2e;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:#1877f2; }
</style>
</head>

<body>

<div id="loader">Loading...</div>

<div id="app" style="display:none;">

<!-- HEADER -->
<div class="header">
  <img id="siteLogo" class="site-logo">
  <div class="title">Wizard Digital Access</div>
  <div class="menu">☰</div>
</div>

<!-- SEARCH + GIFT -->
<div class="search-row">
  <input id="search" placeholder="Search...">
  <button class="gift-btn" onclick="alert('Gift feature coming soon 🎁')">🎁</button>
</div>

<div class="categories" id="categories"></div>
<div class="grid" id="products"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html">Profile</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user, allProducts=[], currentCategory="all";

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");

const searchInput = document.getElementById("search");
const productsDiv = document.getElementById("products");
const categoriesDiv = document.getElementById("categories");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

/* SITE LOGO */
document.getElementById("siteLogo").src = "fallback.png";

/* LOGO FIX */
function getLogo(logo){
  if(!logo) return "fallback.png";
  if(logo.startsWith("http")) return logo;
  return `https://logo.clearbit.com/${logo}`;
}

/* AUTH */
onAuthStateChanged(auth, async (u)=>{
  if(!u) return location.replace("auth.html");

  user = u;

  await init();

  loader.style.display="none";
  appDiv.style.display="block";
});

/* INIT */
async function init(){
  await loadCategories();
  await loadProductsData();
  loadProducts();
}

/* CATEGORIES */
async function loadCategories(){
  categoriesDiv.innerHTML="";

  const all=createCat("All","all");
  all.classList.add("active");
  categoriesDiv.appendChild(all);

  const snap = await getDocs(collection(db,"categories"));

  snap.forEach(d=>{
    const c = d.data();
    categoriesDiv.appendChild(createCat(c.name,c.name));
  });
}

function createCat(label,value){
  const div=document.createElement("div");
  div.className="cat";
  div.innerText=label;

  div.onclick=()=>{
    currentCategory=value;
    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    loadProducts();
  };

  return div;
}

/* PRODUCTS */
async function loadProductsData(){
  allProducts=[];
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p=d.data();
    p.id=d.id;
    p.logo = getLogo(p.logo);
    allProducts.push(p);
  });
}

/* 🔥 SEARCH FIX */
searchInput.addEventListener("input", loadProducts);

function loadProducts(){
  const search=searchInput.value.toLowerCase();
  productsDiv.innerHTML="";

  allProducts.forEach(p=>{
    if(currentCategory!=="all" && p.category!==currentCategory) return;
    if(!p.name.toLowerCase().includes(search)) return;

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.logo}" class="logo" onerror="this.src='fallback.png'">
      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>
    `;

    const row=document.createElement("div");
    row.className="row";

    const previewBtn=document.createElement("button");
    previewBtn.textContent="Preview";
    previewBtn.onclick=()=>preview(p);

    const buyBtn=document.createElement("button");
    buyBtn.textContent="Buy";
    buyBtn.onclick=()=>buy(p.id);

    row.append(previewBtn,buyBtn);
    card.appendChild(row);

    productsDiv.appendChild(card);
  });
}

/* PREVIEW */
function preview(p){
  modalContent.innerHTML=`
    <img src="${p.logo}" class="logo">
    <h3>${p.name}</h3>
    <p>${p.description || "No description available"}</p>

    ${p.previewLink ? `
      <a href="${p.previewLink}" target="_blank">
        <button style="background:#1877f2;margin-top:10px;">Open Preview</button>
      </a>` : ""}

    <br><br>
    <button onclick="document.getElementById('modal').style.display='none'">Close</button>
  `;

  modal.style.display="flex";
}

/* BUY */
async function buy(id){
  try{
    const p=(await getDoc(doc(db,"products",id))).data();
    const uRef=doc(db,"users",user.uid);
    const u=(await getDoc(uRef)).data();

    if((u.wallet||0) < p.price) return alert("Insufficient balance");

    const stockRef=doc(db,"productStock",id);
    const stockSnap=await getDoc(stockRef);

    let items=stockSnap.data().items || [];
    const index=items.findIndex(i=>!i.sold);

    if(index===-1) return alert("Out of stock");

    const item=items[index];
    items[index].sold=true;

    await updateDoc(uRef,{wallet:u.wallet - p.price});

    await addDoc(collection(db,"orders"),{
      userId:user.uid,
      productId:id,
      name:p.name,
      price:p.price,
      email:item.email,
      password:item.password,
      logo:p.logo,
      createdAt:new Date()
    });

    await updateDoc(stockRef,{items});

    alert(`Success\nEmail: ${item.email}\nPassword: ${item.password}`);
    location.href="orders.html";

  }catch(err){
    alert("Purchase failed");
  }
}
</script>

</body>
</html>
