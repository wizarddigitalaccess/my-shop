<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizar Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* HEADER */
.header {
  background:#1c1c2e;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

.header input {
  width:60%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.cat.active { background:purple; }

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card {
  background:#1c1c2e;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.icon {
  font-size:40px;
}

.price {
  color:violet;
  font-weight:bold;
}

.row {
  display:flex;
  gap:5px;
}

.row button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1c1c2e;
  padding:20px;
  border-radius:12px;
  width:80%;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:10px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="header">
  <b>🛒 Marketplace</b>
  <input id="search" placeholder="Search..." oninput="loadProducts()">
</div>

<div class="categories" id="categories"></div>

<div class="grid" id="products"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html" class="active">🏠</a>
  <a href="wallet.html">💳</a>
  <a href="orders.html">📦</a>
  <a href="profile.html">👤</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user, allProducts = [], currentCategory="all";

// 🔐 AUTH
onAuthStateChanged(auth,(u)=>{
  if(!u) location.href="auth.html";
  user = u;
});

/* AUTO ICON */
function getIcon(category){
  if(category.includes("facebook")) return "📘";
  if(category.includes("instagram")) return "📸";
  if(category.includes("tiktok")) return "🎵";
  if(category.includes("twitter")) return "🐦";
  return "📦";
}

/* INIT */
async function init(){
  allProducts=[];
  const snap = await getDocs(collection(db,"products"));

  let cats=new Set();

  snap.forEach(d=>{
    const p=d.data();
    p.id=d.id;

    if(p.status!=="available") return;

    allProducts.push(p);
    cats.add(p.category);
  });

  renderCats([...cats]);
  loadProducts();
}
init();

/* CATEGORIES */
function renderCats(cats){
  const div = document.getElementById("categories");

  div.innerHTML=`<div class="cat active" onclick="setCat('all')">All</div>`;

  cats.forEach(c=>{
    div.innerHTML+=`<div class="cat" onclick="setCat('${c}')">${c}</div>`;
  });
}

window.setCat=(c)=>{
  currentCategory=c;
  document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
  event.target.classList.add("active");
  loadProducts();
};

/* LOAD */
window.loadProducts=()=>{
  const search = document.getElementById("search").value.toLowerCase();
  const div = document.getElementById("products");
  div.innerHTML="";

  allProducts.forEach(p=>{
    if(currentCategory!=="all" && p.category!==currentCategory) return;
    if(!p.name.toLowerCase().includes(search)) return;

    div.innerHTML+=`
    <div class="card">
      <div class="icon">${getIcon(p.category)}</div>
      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>

      <div class="row">
        <button onclick="preview('${p.id}')">Preview</button>
        <button onclick="buy('${p.id}')">Buy</button>
      </div>
    </div>`;
  });
};

/* PREVIEW */
window.preview = async(id)=>{
  const snap = await getDoc(doc(db,"products",id));
  const p = snap.data();

  modal.style.display="flex";
  modalContent.innerHTML=`
    <h3>${p.name}</h3>
    <p>Category: ${p.category}</p>
    <p><a href="${p.link}" target="_blank">View Product</a></p>
    <button onclick="modal.style.display='none'">Close</button>
  `;
};

/* BUY (SECURE) */
window.buy = async(id)=>{
  const pSnap = await getDoc(doc(db,"products",id));
  const p = pSnap.data();

  const uRef = doc(db,"users",user.uid);
  const uSnap = await getDoc(uRef);
  const u = uSnap.data();

  if((u.wallet||0) < p.price){
    return alert("Insufficient balance");
  }

  await updateDoc(uRef,{wallet:u.wallet - p.price});

  await updateDoc(doc(db,"products",id),{
    status:"sold",
    buyer:user.uid
  });

  await addDoc(collection(db,"orders"),{
    userId:user.uid,
    productId:id,
    name:p.name,
    price:p.price,
    createdAt:new Date()
  });

  alert("Purchase successful ✅");

  // 🔥 GO TO ORDERS PAGE
  location.href = "orders.html";
};
</script>

</body>
</html>
