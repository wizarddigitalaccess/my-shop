<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* HEADER */
.header {
  background:#1c1c2e;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.header input {
  width:60%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

/* CATEGORY BAR */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.cat.active {
  background:purple;
}

/* PRODUCTS GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

/* PRODUCT CARD */
.card {
  background:#1c1c2e;
  padding:12px;
  border-radius:12px;
}

.card h4 {
  margin:5px 0;
  font-size:14px;
}

.price {
  color:violet;
  font-weight:bold;
}

button {
  width:100%;
  padding:8px;
  margin-top:5px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  display:flex;
}

.nav a {
  flex:1;
  text-align:center;
  padding:10px;
  color:gray;
  text-decoration:none;
}

.nav a.active {
  color:purple;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <b>🛒 Marketplace</b>
  <input id="search" placeholder="Search products..." oninput="loadProducts()">
</div>

<!-- CATEGORIES -->
<div class="categories" id="categories"></div>

<!-- PRODUCTS -->
<div class="grid" id="products"></div>

<!-- NAV -->
<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="profile.html">Profile</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let allProducts = [];
let currentCategory = "all";

// 🔐 AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) location.href = "auth.html";
});

// 📦 LOAD PRODUCTS + CATEGORIES
async function init() {
  const snap = await getDocs(collection(db, "products"));

  let categories = new Set();

  snap.forEach(doc => {
    const data = doc.data();
    data.id = doc.id;

    allProducts.push(data);
    categories.add(data.category);
  });

  renderCategories([...categories]);
  loadProducts();
}

init();

// 🏷 RENDER CATEGORIES
function renderCategories(cats) {
  const div = document.getElementById("categories");

  div.innerHTML = `<div class="cat active" onclick="setCategory('all')">All</div>`;

  cats.forEach(cat => {
    div.innerHTML += `
      <div class="cat" onclick="setCategory('${cat}')">${cat}</div>
    `;
  });
}

// 📂 SET CATEGORY
window.setCategory = function(cat){
  currentCategory = cat;

  document.querySelectorAll(".cat").forEach(c => c.classList.remove("active"));
  event.target.classList.add("active");

  loadProducts();
}

// 🔍 LOAD PRODUCTS
window.loadProducts = function () {
  const search = document.getElementById("search").value.toLowerCase();
  const div = document.getElementById("products");

  div.innerHTML = "";

  allProducts.forEach(p => {

    if (currentCategory !== "all" && p.category !== currentCategory) return;
    if (!p.name.toLowerCase().includes(search)) return;

    div.innerHTML += `
      <div class="card">
        <h4>${p.name}</h4>
        <div class="price">₦${p.price}</div>

        <button onclick="buy('${p.id}')">Buy</button>
      </div>
    `;
  });
};

// 🛒 BUY
window.buy = function(id){
  alert("Next step: connect to wallet / order system");
};
</script>

</body>
</html>
