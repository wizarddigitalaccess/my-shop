<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
#loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  z-index:1000;
  background:#1c1c2e;
  padding:12px;
  display:flex;
  align-items:center;
  gap:10px;
}

.site-logo {
  width:60px;
  height:60px;
  object-fit:cover;
  border-radius:10px;
}

.title {
  font-weight:bold;
  font-size:16px;
}

.menu {
  margin-left:auto;
  font-size:22px;
  cursor:pointer;
}

/* SEARCH + ACTION */
.search-row {
  display:flex;
  gap:8px;
  padding:10px;
}

.search-row input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

/* 🔥 PREMIUM SEND GIFT BUTTON */
.gift-btn {
  background:#1877f2;
  color:white;
  padding:10px 14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  white-space:nowrap;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
  white-space:nowrap;
}

.cat.active { background:#1877f2; }

/* PRODUCTS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
  padding:12px;
  padding-bottom:80px;
}

.card {
  background:#1c1c2e;
  padding:14px;
  border-radius:14px;
  text-align:center;
}

.logo {
  width:48px;
  height:48px;
  object-fit:contain;
  margin-bottom:10px;
}

.price {
  color:#4da3ff;
  font-weight:bold;
}

.row {
  display:flex;
  gap:8px;
  margin-top:10px;
}

.row button {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#1c1c2e;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:400px;
  text-align:center;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:#1877f2; }

/* 🔥 SIDE MENU (RIGHT + FULL HEIGHT) */
#sideMenu {
  position:fixed;
  top:0;
  right:-100%;
  width:85%;
  height:100%;
  background:#0f0f1a;
  z-index:2000;
  transition:0.3s;
  display:flex;
  flex-direction:column;
}
</style>
</head>

<body>

<div id="loader">Loading...</div>

<div id="app" style="display:none;">

<!-- HEADER -->
<div class="header">
  <img id="siteLogo" class="site-logo">
  <div class="title">Wizard Digital Access</div>
  <div class="menu" onclick="openMenu()">☰</div>
</div>

<!-- SEARCH + GIFT -->
<div class="search-row">
  <input id="search" placeholder="Search...">
  <button class="gift-btn" onclick="alert('Send gifts/ring coming soon')">
    Send gifts/ring
  </button>
</div>

<div class="categories" id="categories"></div>
<div class="grid" id="products"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<!-- 🔥 SIDE MENU -->
<div id="sideMenu">

  <div style="padding:20px;">

    <div style="text-align:right;">
      <span onclick="closeMenu()" style="font-size:22px;">✖</span>
    </div>

    <div style="margin-top:10px;">
      <b id="menuName">User</b><br>
      <small id="menuEmail"></small>
    </div>

    <div style="
      margin-top:20px;
      padding:15px;
      border-radius:15px;
      background:linear-gradient(45deg,#6a00ff,#d000ff);
    ">
      <div>ACCOUNT BALANCE</div>
      <h2 id="menuBalance">₦0</h2>

      <button onclick="location.href='wallet.html'" style="
        margin-top:10px;
        background:white;
        color:black;
        padding:8px 15px;
        border:none;
        border-radius:20px;
      ">
        + Fund
      </button>
    </div>

  </div>

  <div style="flex:1;padding:20px;display:flex;flex-direction:column;gap:18px;">
    <div onclick="closeMenu()">🏠 Dashboard</div>
    <div onclick="alert('Coming soon')">Send gifts/ring</div>
    <div onclick="alert('WhatsApp section')">Buy old USA WhatsApp</div>
    <div onclick="alert('Emails section')">Buy Emails</div>
    <div onclick="location.href='profile.html'">Settings</div>

    <hr style="border-color:#222;">

    <div onclick="location.href='orders.html'">Order History</div>
    <div onclick="alert('Transactions soon')">Transactions</div>
  </div>

</div>

<div class="nav">
  <a href="index.html" class="active">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html">Profile</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, getDoc, updateDoc, addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user, allProducts=[], currentCategory="all";

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");

const searchInput = document.getElementById("search");
const productsDiv = document.getElementById("products");
const categoriesDiv = document.getElementById("categories");
const modal = document.getElementById("modal");
const modalContent = document.getElementById("modalContent");

document.getElementById("siteLogo").src = "fallback.png";

/* MENU CONTROL */
window.openMenu = ()=> document.getElementById("sideMenu").style.right="0";
window.closeMenu = ()=> document.getElementById("sideMenu").style.right="-100%";

/* AUTH */
onAuthStateChanged(auth, async (u)=>{
  if(!u) return location.replace("auth.html");

  user = u;

  const uSnap = await getDoc(doc(db,"users",u.uid));
  const data = uSnap.data();

  document.getElementById("menuName").innerText = data.name || "User";
  document.getElementById("menuEmail").innerText = data.email;
  document.getElementById("menuBalance").innerText = "₦"+(data.wallet||0);

  await init();

  loader.style.display="none";
  appDiv.style.display="block";
});

/* INIT */
async function init(){
  await loadCategories();
  await loadProductsData();
  loadProducts();
}

async function loadCategories(){
  categoriesDiv.innerHTML="";
  const all=createCat("All","all");
  all.classList.add("active");
  categoriesDiv.appendChild(all);

  const snap = await getDocs(collection(db,"categories"));
  snap.forEach(d=>{
    const c=d.data();
    categoriesDiv.appendChild(createCat(c.name,c.name));
  });
}

function createCat(label,value){
  const div=document.createElement("div");
  div.className="cat";
  div.innerText=label;

  div.onclick=()=>{
    currentCategory=value;
    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");
    loadProducts();
  };

  return div;
}

async function loadProductsData(){
  allProducts=[];
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p=d.data();
    p.id=d.id;
    p.logo = p.logo || "fallback.png";
    allProducts.push(p);
  });
}

searchInput.addEventListener("input", loadProducts);

function loadProducts(){
  const search=searchInput.value.toLowerCase();
  productsDiv.innerHTML="";

  allProducts.forEach(p=>{
    if(currentCategory!=="all" && p.category!==currentCategory) return;
    if(!p.name.toLowerCase().includes(search)) return;

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.logo}" class="logo" onerror="this.src='fallback.png'">
      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>
    `;

    const row=document.createElement("div");
    row.className="row";

    const previewBtn=document.createElement("button");
    previewBtn.textContent="Preview";
    previewBtn.onclick=()=>preview(p);

    const buyBtn=document.createElement("button");
    buyBtn.textContent="Buy";
    buyBtn.onclick=()=>buy(p.id);

    row.append(previewBtn,buyBtn);
    card.appendChild(row);

    productsDiv.appendChild(card);
  });
}

function preview(p){
  modalContent.innerHTML=`
    <img src="${p.logo}" class="logo">
    <h3>${p.name}</h3>
    <p>${p.description || "No description available"}</p>

    ${p.previewLink ? `
      <a href="${p.previewLink}" target="_blank">
        <button style="background:#1877f2;margin-top:10px;">Open Preview</button>
      </a>` : ""}

    <br><br>
    <button onclick="document.getElementById('modal').style.display='none'">Close</button>
  `;
  modal.style.display="flex";
}

async function buy(id){
  try{
    const p=(await getDoc(doc(db,"products",id))).data();
    const uRef=doc(db,"users",user.uid);
    const u=(await getDoc(uRef)).data();

    if((u.wallet||0) < p.price) return alert("Insufficient balance");

    const stockRef=doc(db,"productStock",id);
    const stockSnap=await getDoc(stockRef);

    let items=stockSnap.data().items || [];
    const index=items.findIndex(i=>!i.sold);

    if(index===-1) return alert("Out of stock");

    const item=items[index];
    items[index].sold=true;

    await updateDoc(uRef,{wallet:u.wallet - p.price});

    await addDoc(collection(db,"orders"),{
      userId:user.uid,
      productId:id,
      name:p.name,
      price:p.price,
      email:item.email,
      password:item.password,
      logo:p.logo,
      createdAt:new Date()
    });

    await updateDoc(stockRef,{items});

    alert(`Success\nEmail: ${item.email}\nPassword: ${item.password}`);
    location.href="orders.html";

  }catch{
    alert("Purchase failed");
  }
}
</script>

</body>
</html>
