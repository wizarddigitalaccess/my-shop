<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Digital Access</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER OVERLAY */
.loader {
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  transition:opacity .3s;
}

.spinner {
  width:40px;
  height:40px;
  border:4px solid #333;
  border-top:4px solid purple;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

/* HEADER */
.header {
  background:#1c1c2e;
  padding:12px;
  display:flex;
  gap:10px;
}

.site-logo {
  width:30px;
  height:30px;
  border-radius:6px;
  background:white;
  padding:4px;
}

.header input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

/* CATEGORY */
.categories {
  display:flex;
  overflow-x:auto;
  padding:10px;
  gap:10px;
}

.cat {
  background:#1c1c2e;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

.cat.active { background:purple; }

/* PRODUCTS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
  padding:12px;
}

.card {
  background:#1c1c2e;
  padding:12px;
  border-radius:12px;
  text-align:center;
}

.logo {
  width:50px;
  height:50px;
  object-fit:contain;
  border-radius:10px;
  background:white;
  padding:6px;
}

.price {
  color:violet;
  font-weight:bold;
}

.row {
  display:flex;
  gap:5px;
  margin-top:10px;
}

.row button {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:10px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="loader" id="loader">
  <div class="spinner"></div>
</div>

<div id="app">

<div class="header">
  <img src="https://logo.clearbit.com/google.com" class="site-logo">
  <input id="search" placeholder="Search...">
</div>

<div class="categories" id="categories"></div>
<div class="grid" id="products"></div>

<div class="nav">
  <a href="index.html" class="active">🏠</a>
  <a href="wallet.html">💳</a>
  <a href="orders.html">📦</a>
  <a href="profile.html">👤</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user=null;
let allProducts=[];
let currentCategory="all";

/* ⚡ FAST AUTH */
onAuthStateChanged(auth, (u)=>{
  if(!u){
    window.location.href="auth.html";
    return;
  }

  user = u;

  // 🔥 SHOW UI IMMEDIATELY (no wait)
  hideLoader();

  // 🔄 LOAD DATA IN BACKGROUND
  init();
});

/* INIT (SAFE) */
async function init(){
  try {
    const snap = await getDocs(collection(db,"products"));
    const catSnap = await getDocs(collection(db,"categories"));

    const map = new Map();
    allProducts=[];

    snap.forEach(d=>{
      const p=d.data();
      p.id=d.id;
      allProducts.push(p);
      if(!map.has(p.category)) map.set(p.category,p.logo||"");
    });

    catSnap.forEach(d=>{
      const c=d.data();
      if(!map.has(c.name)) map.set(c.name,"");
    });

    renderCats(map);
    loadProducts();

  } catch (err) {
    console.error("Load failed:", err);

    // ❌ NO USER ERROR MESSAGE
    // just fail silently
  }
}

/* HIDE LOADER */
function hideLoader(){
  const loader = document.getElementById("loader");
  loader.style.opacity = "0";
  setTimeout(()=> loader.style.display="none",300);
}

/* CATEGORY */
function renderCats(map){
  categories.innerHTML="";

  const all=createCat("All","all");
  all.classList.add("active");
  categories.appendChild(all);

  map.forEach((_,name)=>{
    categories.appendChild(createCat(name,name));
  });
}

function createCat(label,value){
  const div=document.createElement("div");
  div.className="cat";
  div.innerText=label;

  div.onclick=()=>{
    currentCategory=value;

    document.querySelectorAll(".cat").forEach(c=>c.classList.remove("active"));
    div.classList.add("active");

    loadProducts();
  };

  return div;
}

/* LOGO FIX */
function fixLogo(url){
  if(!url) return "https://via.placeholder.com/50?text=Logo";
  try{
    return `https://logo.clearbit.com/${new URL(url).hostname}`;
  }catch{
    return url;
  }
}

/* PRODUCTS */
function loadProducts(){
  const search = document.getElementById("search").value.toLowerCase();
  products.innerHTML="";

  allProducts.forEach(p=>{
    if(currentCategory!=="all" && p.category!==currentCategory) return;
    if(!p.name.toLowerCase().includes(search)) return;

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${fixLogo(p.logo)}" class="logo"
      onerror="this.src='https://via.placeholder.com/50?text=Logo'">

      <h4>${p.name}</h4>
      <div class="price">₦${p.price}</div>
    `;

    const btn=document.createElement("button");
    btn.textContent="Buy";
    btn.onclick=()=>buy(p.id);

    const row=document.createElement("div");
    row.className="row";
    row.appendChild(btn);

    card.appendChild(row);
    products.appendChild(card);
  });
}

/* BUY */
async function buy(id){
  try{
    const p=(await getDoc(doc(db,"products",id))).data();
    const uRef=doc(db,"users",user.uid);
    const u=(await getDoc(uRef)).data();

    if((u.wallet||0)<p.price) return alert("Insufficient balance");

    const stockRef=doc(db,"productStock",id);
    const stockSnap=await getDoc(stockRef);

    let items=stockSnap.data().items;
    const i=items.findIndex(x=>!x.sold);
    if(i===-1) return alert("Out of stock");

    const item=items[i];
    items[i].sold=true;

    await updateDoc(uRef,{wallet:u.wallet-p.price});

    await addDoc(collection(db,"orders"),{
      userId:user.uid,
      productId:id,
      name:p.name,
      price:p.price,
      email:item.email,
      password:item.password,
      createdAt:new Date()
    });

    await updateDoc(stockRef,{items});

    alert(`Email: ${item.email}\nPassword: ${item.password}`);

  }catch(err){
    console.error(err);
  }
}
</script>

</body>
</html>
