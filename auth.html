<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1c1c2e;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.msg {
  margin-top: 10px;
  font-size: 13px;
  color: orange;
}

.link {
  margin-top: 10px;
  display: block;
  color: violet;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="forgotPassword()">Forgot Password?</div>
  <div class="link" onclick="goSignup()">Create Account</div>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "etee77366@gmail.com";

// ✅ AUTO LOGIN (STABLE + NO LOOP)
onAuthStateChanged(auth, async (user) => {

  if (!user) return;

  try {
    // 🔐 Check email verification FIRST
    if (!user.emailVerified) {
      window.location.href = "verify.html";
      return;
    }

    // ✅ Ensure Firestore user exists
    const userRef = doc(db, "users", user.uid);
    let snap = await getDoc(userRef);

    if (!snap.exists()) {
      await setDoc(userRef, {
        name: user.email.split("@")[0],
        email: user.email,
        wallet: 0,
        verified: true
      });
    }

    // 🔥 Admin redirect
    if (user.email === ADMIN_EMAIL) {
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }

  } catch (err) {
    console.log(err);
  }
});

// 🔐 LOGIN
window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "Enter email and password";
    return;
  }

  try {
    const res = await signInWithEmailAndPassword(auth, email, password);
    const user = res.user;

    // 🔐 Must verify email
    if (!user.emailVerified) {
      window.location.href = "verify.html";
      return;
    }

    // ✅ Ensure Firestore user exists (CRITICAL FIX)
    const userRef = doc(db, "users", user.uid);
    let snap = await getDoc(userRef);

    if (!snap.exists()) {
      await setDoc(userRef, {
        name: user.email.split("@")[0],
        email: user.email,
        wallet: 0,
        verified: true
      });
    }

    // 🔥 Redirect
    if (user.email === ADMIN_EMAIL) {
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }

  } catch (error) {
    if (error.code === "auth/user-not-found") {
      msg.innerText = "User not found";
    } else if (error.code === "auth/wrong-password") {
      msg.innerText = "Wrong password";
    } else {
      msg.innerText = error.message;
    }
  }
};

// 🔁 FORGOT PASSWORD
window.forgotPassword = async function () {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Enter your email first");
    return;
  }

  try {
    await sendPasswordResetEmail(auth, email);
    alert("Password reset email sent ✔️");
  } catch (err) {
    alert(err.message);
  }
};

// 🔁 SIGNUP
window.goSignup = function () {
  window.location.href = "signup.html";
};
</script>

</body>
</html>
