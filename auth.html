<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:#1c1c2e;
  padding:25px;
  border-radius:12px;
  width:320px;
  text-align:center;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.msg {
  margin-top:10px;
  font-size:13px;
  color:orange;
}

.link {
  margin-top:10px;
  color:violet;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="forgotPassword()">Forgot Password?</div>
  <div class="link" onclick="goSignup()">Create Account</div>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔥 YOUR REAL CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* ✅ FIX: Only run once */
let handled = false;

onAuthStateChanged(auth, async (user) => {
  if (handled) return;

  if (!user) return;

  handled = true;

  try {
    const ref = doc(db, "users", user.uid);
    let snap = await getDoc(ref);

    // create user if missing
    if (!snap.exists()) {
      await setDoc(ref, {
        email: user.email,
        name: user.email.split("@")[0],
        wallet: 0,
        role: "user"
      });
      snap = await getDoc(ref);
    }

    const data = snap.data();

    // 🚀 CLEAN REDIRECT (NO LOOP)
    if (data.role === "admin") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }

  } catch (err) {
    console.error(err);
    document.getElementById("msg").innerText = "Error loading account";
  }
});

/* 🔐 LOGIN */
window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "Enter email and password";
    return;
  }

  try {
    msg.innerText = "Logging in...";
    await signInWithEmailAndPassword(auth, email, password);

  } catch (error) {
    msg.innerText = error.message;
  }
};

/* RESET */
window.forgotPassword = async function () {
  const email = document.getElementById("email").value;

  if (!email) return alert("Enter email");

  try {
    await sendPasswordResetEmail(auth, email);
    alert("Reset email sent");
  } catch (err) {
    alert(err.message);
  }
};

/* SIGNUP */
window.goSignup = function () {
  window.location.href = "signup.html";
};
</script>

</body>
</html>
