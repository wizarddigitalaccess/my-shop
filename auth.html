<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizard Access</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a2b;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1e293b;
  padding: 25px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.toggle {
  margin-top: 10px;
  color: lightblue;
  cursor: pointer;
}

.msg {
  margin-top: 10px;
  font-size: 13px;
  color: #ffcc00;
}
</style>
</head>

<body>

<div class="box">
<h2 id="title">Login</h2>

<input id="name" placeholder="Full Name" style="display:none;">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="handleAuth()">Continue</button>

<div class="toggle" onclick="toggleMode()">
  Don't have an account? Sign up
</div>

<div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  fetchSignInMethodsForEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let isLogin = true;

// toggle UI
window.toggleMode = function () {
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Sign Up";
  document.querySelector(".toggle").innerText = isLogin
    ? "Don't have an account? Sign up"
    : "Already have an account? Login";

  document.getElementById("name").style.display = isLogin ? "none" : "block";
  document.getElementById("msg").innerText = "";
};

// MAIN AUTH FUNCTION
window.handleAuth = async function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;
  let msg = document.getElementById("msg");

  try {
    if (isLogin) {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = "index.html";
    } else {
      await createUserWithEmailAndPassword(auth, email, password);
      msg.innerText = "Account created! Redirecting...";
      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);
    }
  } catch (error) {
    // 🚫 NO POPUPS — clean message only
    if (error.code === "auth/email-already-in-use") {
      msg.innerText = "Account exists. Switching to login...";
      isLogin = true;
      toggleMode();
    } else {
      msg.innerText = "Error: " + error.message;
    }
  }
};
</script>

</body>
</html>
