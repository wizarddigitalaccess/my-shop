<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1c1c2e;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.msg {
  margin-top: 10px;
  font-size: 13px;
  color: orange;
}

.link {
  margin-top: 10px;
  display: block;
  color: violet;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="link" onclick="goSignup()">Create Account</div>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const ADMIN_EMAIL = "etee77366@gmail.com";

window.login = async function () {
  let email = document.getElementById("email").value.trim();
  let password = document.getElementById("password").value;
  let msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "Enter email and password";
    return;
  }

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // 🔐 IF NOT VERIFIED → GO TO VERIFY PAGE
    if (!user.emailVerified) {
      window.location.href = "verify.html";
      return;
    }

    // 🔥 ADMIN CHECK
    if (user.email === ADMIN_EMAIL) {
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }

  } catch (error) {
    if (error.code === "auth/user-not-found") {
      msg.innerText = "User not found";
    } else if (error.code === "auth/wrong-password") {
      msg.innerText = "Wrong password";
    } else {
      msg.innerText = error.message;
    }
  }
};

window.goSignup = function () {
  window.location.href = "signup.html";
};
</script>

</body>
</html>
