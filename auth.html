<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let checked = false;

// ✅ SAFE AUTH CHECK (NO LOOP)
onAuthStateChanged(auth, async (user) => {
  if (checked) return;
  checked = true;

  if (!user) return;

  try {
    const ref = doc(db, "users", user.uid);
    let snap = await getDoc(ref);

    // create user if missing
    if (!snap.exists()) {
      await setDoc(ref, {
        email: user.email,
        name: user.email.split("@")[0],
        wallet: 0,
        role: "user"
      });
      snap = await getDoc(ref);
    }

    const data = snap.data();

    // 🔥 REDIRECT BASED ON ROLE
    if (data.role === "admin") {
      window.location.href = "admin.html";
    } else {
      window.location.href = "index.html";
    }

  } catch (err) {
    console.log(err);
  }
});

// 🔐 LOGIN
window.login = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "Enter email and password";
    return;
  }

  try {
    await signInWithEmailAndPassword(auth, email, password);
    // ✅ DO NOT redirect here
    // let onAuthStateChanged handle it

  } catch (error) {
    msg.innerText = error.message;
  }
};

// RESET
window.forgotPassword = async function () {
  const email = document.getElementById("email").value;

  if (!email) return alert("Enter email");

  await sendPasswordResetEmail(auth, email);
  alert("Reset email sent");
};

// SIGNUP
window.goSignup = function () {
  window.location.href = "signup.html";
};
</script>
