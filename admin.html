<!-- ONLY SHOWING CHANGED/IMPORTANT SCRIPT PART -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  updateDoc, deleteDoc, addDoc, increment,
  getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* =========================
   🔥 FIXED ADD PRODUCT
========================= */
window.addProduct = async ()=>{
  const name = document.getElementById("name").value.trim();
  const category = document.getElementById("category").value.trim().toLowerCase();
  const price = Number(document.getElementById("price").value);
  const raw = document.getElementById("stockData").value.trim();

  if(!name || !category || !price){
    return alert("Fill all fields");
  }

  try{
    const ref = await addDoc(collection(db,"products"),{
      name,
      category,
      price,
      status:"active"
    });

    /* 🔥 SAFE STOCK PARSE */
    if(raw){
      const items = raw.split("\n")
        .map(l => l.trim())
        .filter(l => l.includes(":"))
        .map(l=>{
          const [email,password] = l.split(":");
          return {
            email: email?.trim(),
            password: password?.trim(),
            sold:false
          };
        });

      await setDoc(doc(db,"productStock",ref.id),{items});
    }

    alert("Product added ✅");

    name.value="";
    category.value="";
    price.value="";
    stockData.value="";

    loadProducts();

  }catch(err){
    console.error(err);
    alert("Error adding product");
  }
};

/* =========================
   🔥 LOAD PRODUCTS + EDIT
========================= */
window.loadProducts = async ()=>{
  const search = document.getElementById("productSearch").value.toLowerCase();
  const div = document.getElementById("products");
  div.innerHTML="";

  const snap = await getDocs(collection(db,"products"));

  for(const d of snap.docs){
    const p = d.data();

    if(!p.name.toLowerCase().includes(search)) continue;

    const stockSnap = await getDoc(doc(db,"productStock",d.id));
    let left = stockSnap.exists()
      ? stockSnap.data().items.filter(i=>!i.sold).length
      : 0;

    div.innerHTML+=`
    <div class="item">
      <b>${p.name}</b><br>
      Category: ${p.category}<br>
      ₦${p.price} | Stock: ${left}

      <div class="row">
        <button onclick="editProduct('${d.id}')">Edit</button>
        <button onclick="deleteProduct('${d.id}')">Delete</button>
      </div>
    </div>`;
  }
};

/* =========================
   ✏️ EDIT PRODUCT
========================= */
window.editProduct = async (id)=>{
  const newName = prompt("New product name:");
  const newCategory = prompt("New category:");
  const newPrice = Number(prompt("New price:"));

  if(!newName || !newCategory || !newPrice){
    return alert("Invalid input");
  }

  try{
    await updateDoc(doc(db,"products",id),{
      name:newName,
      category:newCategory.toLowerCase(),
      price:newPrice
    });

    alert("Product updated ✅");
    loadProducts();

  }catch(e){
    console.error(e);
    alert("Error updating product");
  }
};

/* =========================
   🗑 DELETE PRODUCT
========================= */
window.deleteProduct = async(id)=>{
  if(confirm("Delete product?")){
    await deleteDoc(doc(db,"products",id));
    await deleteDoc(doc(db,"productStock",id));
    loadProducts();
  }
};

/* =========================
   💰 USERS (ADD + DEDUCT)
========================= */
window.loadUsers = async ()=>{
  const search = document.getElementById("userSearch").value.toLowerCase();
  const div = document.getElementById("users");
  div.innerHTML="";

  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const u = d.data();

    if(!(u.email||"").toLowerCase().includes(search)) return;

    div.innerHTML+=`
    <div class="item">
      ${u.name}<br>
      ${u.email}<br>
      ₦${u.wallet||0}

      <div class="row">
        <button onclick="fund('${d.id}')">+ Fund</button>
        <button onclick="deduct('${d.id}')">- Deduct</button>
        <button onclick="deleteUser('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
};

/* ADD MONEY */
window.fund = async(uid)=>{
  const amount = Number(prompt("Amount to add"));
  if(!amount) return;

  await updateDoc(doc(db,"users",uid),{
    wallet:increment(amount)
  });

  loadUsers();
};

/* 🔥 DEDUCT MONEY */
window.deduct = async(uid)=>{
  const amount = Number(prompt("Amount to deduct"));
  if(!amount) return;

  await updateDoc(doc(db,"users",uid),{
    wallet:increment(-amount)
  });

  loadUsers();
};

window.deleteUser = async(uid)=>{
  if(confirm("Delete user?")){
    await deleteDoc(doc(db,"users",uid));
    loadUsers();
  }
};

/* LOGOUT */
window.logout=()=>signOut(auth).then(()=>location.href="auth.html");
</script>
