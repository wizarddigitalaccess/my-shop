<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
}

.container {
  padding: 20px;
}

.card {
  background: #1c1c2e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: purple;
  color: white;
  cursor: pointer;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Admin Panel</h2>
</div>

<!-- ADD PRODUCT -->
<div class="card">
<h3>Add Account</h3>

<input id="name" placeholder="Account Name">
<input id="link" placeholder="Profile Link">
<input id="category" placeholder="Category (africa, usa)">

<button onclick="addProduct()">Add</button>
</div>

<!-- TRANSACTIONS -->
<div class="card">
<h3>Pending Payments</h3>
<div id="transactions"></div>
</div>

<!-- USERS -->
<div class="card">
<h3>Users</h3>
<div id="users"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  increment,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "etee77366@gmail.com";

// 🔐 ADMIN CHECK
onAuthStateChanged(auth, (user) => {
  if (!user || user.email !== ADMIN_EMAIL) {
    window.location.href = "auth.html";
    return;
  }

  loadUsers();
  loadTransactions();
});

// ➕ ADD PRODUCT
window.addProduct = async function () {
  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;
  const category = document.getElementById("category").value;

  if (!name || !link || !category) {
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "products"), {
    name,
    link,
    category,
    status: "available"
  });

  alert("Product added");
};

// 👤 LOAD USERS
async function loadUsers() {
  const div = document.getElementById("users");
  div.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        ${data.name} - ₦${data.wallet}
      </div>
    `;
  });
}

// 💳 LOAD TRANSACTIONS
async function loadTransactions() {
  const div = document.getElementById("transactions");
  div.innerHTML = "";

  const q = query(
    collection(db, "transactions"),
    where("status", "==", "pending")
  );

  const snap = await getDocs(q);

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        ₦${data.amount}
        <button onclick="approve('${docItem.id}', '${data.uid}', ${data.amount})">
          Approve
        </button>
      </div>
    `;
  });
}

// ✅ APPROVE PAYMENT
window.approve = async function (txId, uid, amount) {
  await updateDoc(doc(db, "users", uid), {
    wallet: increment(amount)
  });

  await updateDoc(doc(db, "transactions", txId), {
    status: "approved"
  });

  alert("Approved!");
  loadTransactions();
};
</script>

</body>
</html>
