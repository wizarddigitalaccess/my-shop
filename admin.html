<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.btn-edit{background:#1877f2;color:white;}
.btn-del{background:#e74c3c;color:white;}
.btn-fund{background:#2ecc71;color:white;}
.btn-deduct{background:#f39c12;color:white;}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
}

.actions {
  display:flex;
  gap:6px;
  min-width:140px;
  justify-content:flex-end;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav button {
  flex:1;
  padding:10px;
  background:#1c1c2e;
  color:gray;
}

.nav button.active {
  background:#1877f2;
  color:white;
}

.statusBox{
  padding:6px;
  border-radius:6px;
  font-size:12px;
}

.placed{background:#665c00;}
.delivery{background:#003366;}
.delivered{background:#003300;}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<div id="home" class="card page">
  <h3>Tracking</h3>
  <div id="tracking"></div>
</div>

<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName"><button onclick="addCategory()">Add</button>
  <div id="categories"></div>

  <h3>Main Products</h3>
  <input id="pName"><input id="pCategory"><input id="pPrice">
  <button onclick="addProduct()">Add</button>
  <div id="products"></div>
</div>

<div id="giftDashboard" class="card page hidden">
  <h3>Gift Categories</h3>
  <input id="gCatName"><button onclick="addGiftCategory()">Add</button>
  <div id="gCategories"></div>

  <h3>Gift Products</h3>
  <input id="gName"><input id="gCategory"><input id="gPrice">
  <button onclick="addGiftProduct()">Add</button>
  <div id="gProducts"></div>
</div>

<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Main</button>
  <button data-page="giftDashboard">Gifts</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore,collection,getDocs,doc,addDoc,getDoc,updateDoc,deleteDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ADMIN_EMAIL = "sleyk414@gmail.com"; // 🔥 PUT YOUR EMAIL HERE

const app=initializeApp({
 apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
 authDomain:"wizard-shop-52a50.firebaseapp.com",
 projectId:"wizard-shop-52a50"
});

const db=getFirestore(app);
const auth=getAuth(app);

/* ✅ FIXED AUTH (NO LOOP) */
onAuthStateChanged(auth,user=>{
 if(!user){
  location.href="auth.html";
  return;
 }

 if(user.email !== ADMIN_EMAIL){
  alert("Not authorized as admin");
  signOut(auth);
  return;
 }

 document.body.style.display="block";
 init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
 btn.onclick=()=>{
  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(btn.dataset.page).classList.remove("hidden");
 };
});

/* INIT */
function init(){
 loadUsers();
 loadCategories();
 loadProducts();
 loadGiftCategories();
 loadGiftProducts();
 loadTracking();
}

/* USERS */
async function loadUsers(){
 users.innerHTML="";
 (await getDocs(collection(db,"users"))).forEach(d=>{
  const u=d.data();
  users.innerHTML+=`
  <div class="item">
   ${u.email} ₦${u.wallet||0}
   <div class="actions">
    <button class="btn-fund" onclick="fund('${d.id}')">+</button>
    <button class="btn-deduct" onclick="deduct('${d.id}')">-</button>
    <button class="btn-del" onclick="delUser('${d.id}')">X</button>
   </div>
  </div>`;
 });
}

window.fund=async(id)=>{
 let amt=prompt("Amount"); if(!amt) return;
 let ref=doc(db,"users",id);
 let u=(await getDoc(ref)).data();
 await updateDoc(ref,{wallet:(u.wallet||0)+Number(amt)});
 loadUsers();
};

window.deduct=async(id)=>{
 let amt=prompt("Amount"); if(!amt) return;
 let ref=doc(db,"users",id);
 let u=(await getDoc(ref)).data();
 await updateDoc(ref,{wallet:(u.wallet||0)-Number(amt)});
 loadUsers();
};

window.delUser=async(id)=>{
 if(confirm("Delete?")){
  await deleteDoc(doc(db,"users",id));
  loadUsers();
 }
};

/* MAIN CATEGORY */
window.addCategory=async()=>{
 if(!catName.value) return;
 await addDoc(collection(db,"categories"),{name:catName.value});
 catName.value="";
 loadCategories();
};

async function loadCategories(){
 categories.innerHTML="";
 (await getDocs(collection(db,"categories"))).forEach(d=>{
  let c=d.data();
  categories.innerHTML+=`
  <div class="item">
   ${c.name}
   <div class="actions">
    <button class="btn-edit" onclick="editCat('${d.id}','${c.name}')">E</button>
    <button class="btn-del" onclick="delCat('${d.id}')">X</button>
   </div>
  </div>`;
 });
}

window.editCat=async(id,name)=>{
 let n=prompt("Edit",name); if(!n) return;
 await updateDoc(doc(db,"categories",id),{name:n});
 loadCategories();
};

window.delCat=async(id)=>{
 await deleteDoc(doc(db,"categories",id));
 loadCategories();
};

/* MAIN PRODUCTS */
window.addProduct=async()=>{
 if(!pName.value||!pCategory.value||!pPrice.value) return alert("Fill all");
 await addDoc(collection(db,"products"),{
  name:pName.value,
  category:pCategory.value,
  price:Number(pPrice.value)
 });
 loadProducts();
};

async function loadProducts(){
 products.innerHTML="";
 (await getDocs(collection(db,"products"))).forEach(d=>{
  let p=d.data();
  products.innerHTML+=`
  <div class="item">
   ${p.name} ₦${p.price}
   <div class="actions">
    <button class="btn-edit" onclick="editProd('${d.id}','${p.name}','${p.category}','${p.price}')">E</button>
    <button class="btn-del" onclick="delProd('${d.id}')">X</button>
   </div>
  </div>`;
 });
}

window.editProd=async(id,n,c,p)=>{
 let name=prompt("Name",n);
 let cat=prompt("Category",c);
 let price=prompt("Price",p);
 await updateDoc(doc(db,"products",id),{name,category:cat,price:Number(price)});
 loadProducts();
};

window.delProd=async(id)=>{
 await deleteDoc(doc(db,"products",id));
 loadProducts();
};

/* GIFT CATEGORY */
window.addGiftCategory=async()=>{
 if(!gCatName.value) return;
 await addDoc(collection(db,"giftCategories"),{name:gCatName.value});
 loadGiftCategories();
};

async function loadGiftCategories(){
 gCategories.innerHTML="";
 (await getDocs(collection(db,"giftCategories"))).forEach(d=>{
  let c=d.data();
  gCategories.innerHTML+=`
  <div class="item">
   ${c.name}
   <div class="actions">
    <button class="btn-edit" onclick="editGCat('${d.id}','${c.name}')">E</button>
    <button class="btn-del" onclick="delGCat('${d.id}')">X</button>
   </div>
  </div>`;
 });
}

window.editGCat=async(id,n)=>{
 let name=prompt("Edit",n);
 await updateDoc(doc(db,"giftCategories",id),{name});
 loadGiftCategories();
};

window.delGCat=async(id)=>{
 await deleteDoc(doc(db,"giftCategories",id));
 loadGiftCategories();
};

/* GIFT PRODUCTS */
window.addGiftProduct=async()=>{
 if(!gName.value||!gCategory.value||!gPrice.value) return alert("Fill all");
 await addDoc(collection(db,"giftProducts"),{
  name:gName.value,
  category:gCategory.value,
  price:Number(gPrice.value)
 });
 loadGiftProducts();
};

async function loadGiftProducts(){
 gProducts.innerHTML="";
 (await getDocs(collection(db,"giftProducts"))).forEach(d=>{
  let p=d.data();
  gProducts.innerHTML+=`
  <div class="item">
   ${p.name} ₦${p.price}
   <div class="actions">
    <button class="btn-edit" onclick="editGProd('${d.id}','${p.name}','${p.category}','${p.price}')">E</button>
    <button class="btn-del" onclick="delGProd('${d.id}')">X</button>
   </div>
  </div>`;
 });
}

window.editGProd=async(id,n,c,p)=>{
 let name=prompt("Name",n);
 let cat=prompt("Category",c);
 let price=prompt("Price",p);
 await updateDoc(doc(db,"giftProducts",id),{name,category:cat,price:Number(price)});
 loadGiftProducts();
};

window.delGProd=async(id)=>{
 await deleteDoc(doc(db,"giftProducts",id));
 loadGiftProducts();
};

/* TRACKING */
async function loadTracking(){
 tracking.innerHTML="";
 (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
  let g=d.data();
  tracking.innerHTML+=`
  <div class="item">
   ${g.type}
   <div class="statusBox ${g.status||'placed'}">${g.status||'placed'}</div>
  </div>`;
 });
}

logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
