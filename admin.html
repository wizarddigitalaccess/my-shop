<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: none;
}

.header {
  padding: 15px;
  background: #1c1c2e;
  font-size: 18px;
  font-weight: bold;
}

.container {
  padding: 15px;
  padding-bottom: 80px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #1c1c2e;
  padding: 15px;
  border-radius: 12px;
}

/* STATS */
.stat {
  font-size: 22px;
  font-weight: bold;
}

/* BUTTONS */
button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: none;
  border-radius: 8px;
  background: purple;
  color: white;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #333;
  font-size: 14px;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
}

.nav button {
  flex: 1;
  background: none;
  border: none;
  color: gray;
  padding: 10px;
}

.nav button.active {
  color: purple;
}
</style>
</head>

<body>

<div class="header">Admin Dashboard</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="grid">
  <div class="card">
    <div>Total Users</div>
    <div class="stat" id="totalUsers">0</div>
  </div>

  <div class="card">
    <div>Total Products</div>
    <div class="stat" id="totalProducts">0</div>
  </div>

  <div class="card">
    <div>Total Revenue</div>
    <div class="stat">₦<span id="revenue">0</span></div>
  </div>

  <div class="card">
    <div>Pending Payments</div>
    <div class="stat" id="pending">0</div>
  </div>
</div>

<br>

<div class="card">
<h3>Quick Actions</h3>

<input id="name" placeholder="Product Name">
<input id="link" placeholder="Link">
<input id="category" placeholder="Category">
<input id="price" type="number" placeholder="Price">

<button onclick="addProduct()">Add Product</button>
</div>

</div>

<!-- USERS -->
<div id="usersPage" style="display:none">
<div class="card">
<h3>Users</h3>
<div id="users"></div>
</div>
</div>

<!-- PAYMENTS -->
<div id="paymentsPage" style="display:none">
<div class="card">
<h3>Pending Payments</h3>
<div id="transactions"></div>
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="showPage('dashboard')" class="active" id="btnDashboard">Dashboard</button>
<button onclick="showPage('users')" id="btnUsers">Users</button>
<button onclick="showPage('payments')" id="btnPayments">Payments</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  doc,
  updateDoc,
  increment,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "etee77366@gmail.com";

// 🔐 AUTH
onAuthStateChanged(auth, async (user) => {
  if (!user) return location.href = "auth.html";
  if (user.email !== ADMIN_EMAIL) return location.href = "index.html";

  document.body.style.display = "block";

  loadDashboard();
  loadUsers();
  loadPayments();
});

// 📊 DASHBOARD
async function loadDashboard() {
  const usersSnap = await getDocs(collection(db, "users"));
  const productsSnap = await getDocs(collection(db, "products"));
  const txSnap = await getDocs(collection(db, "transactions"));

  document.getElementById("totalUsers").innerText = usersSnap.size;
  document.getElementById("totalProducts").innerText = productsSnap.size;

  let revenue = 0;
  let pending = 0;

  txSnap.forEach(doc => {
    const data = doc.data();
    if (data.status === "approved") revenue += data.amount;
    if (data.status === "pending") pending++;
  });

  document.getElementById("revenue").innerText = revenue;
  document.getElementById("pending").innerText = pending;
}

// ➕ ADD PRODUCT
window.addProduct = async function () {
  const name = nameEl.value;
  const link = linkEl.value;
  const category = categoryEl.value.toLowerCase();
  const price = Number(priceEl.value);

  if (!name || !link || !category || !price) {
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "products"), {
    name, link, category, price, status: "available"
  });

  alert("Added");

  nameEl.value = "";
  linkEl.value = "";
  categoryEl.value = "";
  priceEl.value = "";

  loadDashboard();
};

// 👤 USERS
async function loadUsers() {
  const div = document.getElementById("users");
  div.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        ${data.name}<br>
        ${data.email}<br>
        ₦${data.wallet || 0}

        <button onclick="fund('${docItem.id}')">Fund</button>
      </div>
    `;
  });
}

window.fund = async function (uid) {
  const amount = Number(prompt("Amount"));
  if (!amount) return;

  await updateDoc(doc(db, "users", uid), {
    wallet: increment(amount)
  });

  loadUsers();
};

// 💳 PAYMENTS
async function loadPayments() {
  const div = document.getElementById("transactions");
  div.innerHTML = "";

  const q = query(collection(db, "transactions"), where("status", "==", "pending"));
  const snap = await getDocs(q);

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        ₦${data.amount}
        <button onclick="approve('${docItem.id}', '${data.uid}', ${data.amount})">
          Approve
        </button>
      </div>
    `;
  });
}

window.approve = async function (txId, uid, amount) {
  await updateDoc(doc(db, "users", uid), {
    wallet: increment(amount)
  });

  await updateDoc(doc(db, "transactions", txId), {
    status: "approved"
  });

  loadPayments();
  loadDashboard();
};

// 📱 NAVIGATION
window.showPage = function (page) {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("usersPage").style.display = "none";
  document.getElementById("paymentsPage").style.display = "none";

  document.getElementById("btnDashboard").classList.remove("active");
  document.getElementById("btnUsers").classList.remove("active");
  document.getElementById("btnPayments").classList.remove("active");

  if (page === "dashboard") {
    dashboard.style.display = "block";
    btnDashboard.classList.add("active");
  }

  if (page === "users") {
    usersPage.style.display = "block";
    btnUsers.classList.add("active");
  }

  if (page === "payments") {
    paymentsPage.style.display = "block";
    btnPayments.classList.add("active");
  }
};
</script>

</body>
</html>
