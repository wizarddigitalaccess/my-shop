<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a2b;
  color: white;
}

.container {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
}

button {
  background: purple;
  color: white;
  cursor: pointer;
}

h2 {
  margin-top: 0;
}

.user {
  padding: 10px;
  background: #0f172a;
  margin-top: 10px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Admin Panel</h2>
    <p>Manage users & wallet</p>
  </div>

  <!-- ADD WALLET -->
  <div class="card">
    <h3>Credit User Wallet</h3>

    <input id="uid" placeholder="User UID">
    <input id="amount" type="number" placeholder="Amount">

    <button onclick="addMoney()">Credit Wallet</button>
  </div>

  <!-- USERS -->
  <div class="card">
    <h3>Users</h3>
    <div id="users">Loading...</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  increment,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 ADMIN SECURITY
const ADMIN_EMAIL = "wizarddigitalaccess@gmail.com";

// 🔒 AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    alert("Access denied!");
    window.location.href = "index.html";
    return;
  }

  loadUsers();
});

// 👥 LOAD USERS
async function loadUsers() {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach((docItem) => {
    const data = docItem.data();

    usersDiv.innerHTML += `
      <div class="user">
        <b>${data.name || "No Name"}</b><br>
        Email: ${data.email || "No Email"}<br>
        Wallet: ₦${data.wallet || 0}<br>
        UID: ${docItem.id}
      </div>
    `;
  });
}

// 💰 CREDIT WALLET + SAVE TRANSACTION
window.addMoney = async function () {
  const uid = document.getElementById("uid").value.trim();
  const amount = Number(document.getElementById("amount").value);

  if (!uid || isNaN(amount) || amount <= 0) {
    alert("Enter valid UID and amount");
    return;
  }

  try {
    const userRef = doc(db, "users", uid);

    // 🔹 Update wallet
    await updateDoc(userRef, {
      wallet: increment(amount)
    });

    // 🔹 Save transaction (for future history)
    await addDoc(collection(db, "transactions"), {
      uid: uid,
      amount: amount,
      type: "credit",
      status: "completed",
      createdAt: new Date()
    });

    alert("Wallet credited successfully ✔️");

    // reset fields
    document.getElementById("uid").value = "";
    document.getElementById("amount").value = "";

    loadUsers();

  } catch (err) {
    alert("Error: " + err.message);
  }
};
</script>

</body>
</html>
