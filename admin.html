<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
}

.actions { display:flex; gap:6px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  padding:5px;
}

.nav button {
  flex:1;
  margin:3px;
  padding:10px;
  border-radius:10px;
  background:#1c1c2e;
  color:gray;
  font-size:12px;
}

.nav button.active {
  background:#1877f2;
  color:white;
}

/* 🔥 TRACKING STYLE */
.statusBox{
  padding:8px;
  border-radius:8px;
  font-weight:bold;
  font-size:12px;
  text-align:center;
  min-width:110px;
}

.placed{background:#665c00;color:#ffd700;}
.delivery{background:#003366;color:#4da3ff;}
.delivered{background:#003300;color:#00ff88;}

select{
  padding:6px;
  border-radius:6px;
  background:#111;
  color:white;
  border:none;
}

.toggle {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">
  <h3>Tracking System</h3>
  <div id="tracking"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- MAIN -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName" placeholder="Category name">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>

  <hr>

  <h3>Main Products</h3>
  <input id="pName" placeholder="Product name">
  <input id="pCategory" placeholder="Category">
  <input id="pPrice" type="number" placeholder="Price">
  <input id="pPreview" placeholder="Preview Link">
  <button onclick="addProduct()">Add Product</button>
  <div id="products"></div>
</div>

<!-- ORDERS -->
<div id="ordersPage" class="card page hidden">
  <h3>Main Orders</h3>
  <div id="orders"></div>
</div>

<!-- GIFT -->
<!-- 🔥 GIFT CATEGORIES -->
<h3>Gift Categories</h3>

<input id="gCatName" placeholder="Gift category name">
<button onclick="addGiftCategory()">Add Category</button>

<div id="gCategories"></div>

<hr>

  <input id="gName" placeholder="Product name">
  <input id="gCategory" placeholder="Category">
  <input id="gPrice" type="number" placeholder="Price">

  <div class="toggle">
    <label>Require Size</label>
    <input type="checkbox" id="gProductSize">
  </div>

  <button onclick="addGiftProduct()">Add</button>

  <div id="gProducts"></div>
</div>

<!-- GIFT ORDERS -->
<div id="giftOrdersPage" class="card page hidden">
  <h3>Gift Orders</h3>
  <div id="giftOrders"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Main</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="giftDashboard">Gifts</button>
  <button data-page="giftOrdersPage">Gift Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, addDoc, getDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";
  document.body.style.display="block";
  init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadUsers();
  loadCategories();
  loadProducts();
  loadGiftProducts();
  loadTracking();
  loadGiftCategories();
}

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  (await getDocs(collection(db,"users"))).forEach(d=>{
    const u=d.data();
    users.innerHTML+=`
    <div class="item">
      ${u.email} ₦${u.wallet||0}
      <div class="actions">
        <button onclick="fund('${d.id}')">+₦</button>
        <button onclick="deduct('${d.id}')">-₦</button>
        <button onclick="delUser('${d.id}')">Del</button>
      </div>
    </div>`;
  });
}

window.fund = async(id)=>{
  const amount = prompt("Amount");
  if(!amount) return;
  const ref = doc(db,"users",id);
  const u = (await getDoc(ref)).data();
  await updateDoc(ref,{wallet:(u.wallet||0)+Number(amount)});
  loadUsers();
};

window.deduct = async(id)=>{
  const amount = prompt("Amount");
  if(!amount) return;
  const ref = doc(db,"users",id);
  const u = (await getDoc(ref)).data();
  await updateDoc(ref,{wallet:(u.wallet||0)-Number(amount)});
  loadUsers();
};

window.delUser = async(id)=>{
  if(confirm("Delete user?")){
    await deleteDoc(doc(db,"users",id));
    loadUsers();
  }
};

/* CATEGORY + EDIT */
window.addCategory = async()=>{
  if(!catName.value) return;
  await addDoc(collection(db,"categories"),{name:catName.value});
  catName.value="";
  loadCategories();
};

async function loadCategories(){
  categories.innerHTML="";
  (await getDocs(collection(db,"categories"))).forEach(d=>{
    const c=d.data();
    categories.innerHTML+=`
    <div class="item">
      ${c.name}
      <div class="actions">
        <button onclick="editCat('${d.id}','${c.name}')">Edit</button>
        <button onclick="delCat('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

window.editCat = async(id,name)=>{
  const newName = prompt("Edit category",name);
  if(!newName) return;
  await updateDoc(doc(db,"categories",id),{name:newName});
  loadCategories();
};

window.delCat = async(id)=>{
  await deleteDoc(doc(db,"categories",id));
  loadCategories();
};

/* PRODUCTS + EDIT */
window.addProduct = async()=>{
  await addDoc(collection(db,"products"),{
    name:pName.value,
    category:pCategory.value,
    price:Number(pPrice.value),
    previewLink:pPreview.value
  });
  pName.value=""; pCategory.value=""; pPrice.value=""; pPreview.value="";
  loadProducts();
};

async function loadProducts(){
  products.innerHTML="";
  (await getDocs(collection(db,"products"))).forEach(d=>{
    const p=d.data();
    products.innerHTML+=`
    <div class="item">
      ${p.name} ₦${p.price}
      <div class="actions">
        <button onclick="editProduct('${d.id}','${p.name}','${p.category}','${p.price}','${p.previewLink||""}')">Edit</button>
        <button onclick="delProduct('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

window.editProduct = async(id,n,c,pr,link)=>{
  const name = prompt("Name",n);
  const cat = prompt("Category",c);
  const price = prompt("Price",pr);
  const preview = prompt("Preview link",link);

  await updateDoc(doc(db,"products",id),{
    name,category:cat,price:Number(price),previewLink:preview
  });

  loadProducts();
};

window.delProduct = async(id)=>{
  await deleteDoc(doc(db,"products",id));
  loadProducts();
};

/* GIFT PRODUCTS + EDIT */
window.addGiftProduct = async()=>{
  await addDoc(collection(db,"giftProducts"),{
    name:gName.value,
    category:gCategory.value,
    price:Number(gPrice.value),
    requiresSize:gProductSize.checked
  });
  gName.value=""; gCategory.value=""; gPrice.value="";
  loadGiftProducts();
};

async function loadGiftProducts(){
  gProducts.innerHTML="";
  (await getDocs(collection(db,"giftProducts"))).forEach(d=>{
    const p=d.data();
    gProducts.innerHTML+=`
    <div class="item">
      ${p.name} ₦${p.price}
      <div class="actions">
        <button onclick="editGift('${d.id}','${p.name}','${p.category}','${p.price}',${p.requiresSize})">Edit</button>
        <button onclick="delGift('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

window.editGift = async(id,n,c,pr,size)=>{
  const name = prompt("Name",n);
  const cat = prompt("Category",c);
  const price = prompt("Price",pr);
  const requires = confirm("Require size?");

  await updateDoc(doc(db,"giftProducts",id),{
    name,category:cat,price:Number(price),requiresSize:requires
  });

  loadGiftProducts();
};

window.delGift = async(id)=>{
  await deleteDoc(doc(db,"giftProducts",id));
  loadGiftProducts();
};

/* 🔥 GIFT CATEGORY SYSTEM */
window.addGiftCategory = async()=>{
  if(!gCatName.value) return;

  await addDoc(collection(db,"giftCategories"),{
    name:gCatName.value
  });

  gCatName.value="";
  loadGiftCategories();
};

async function loadGiftCategories(){
  gCategories.innerHTML="";

  (await getDocs(collection(db,"giftCategories"))).forEach(d=>{
    const c=d.data();

    gCategories.innerHTML+=`
    <div class="item">
      ${c.name}
      <div class="actions">
        <button onclick="editGiftCat('${d.id}','${c.name}')">Edit</button>
        <button onclick="delGiftCat('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}


/* TRACKING */
async function loadTracking(){
  tracking.innerHTML="";
  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    const g=d.data();

    let cls="placed";
    if(g.status==="on delivery") cls="delivery";
    if(g.status==="delivered") cls="delivered";

    tracking.innerHTML+=`
    <div class="item">
      <div>
        <b>${g.type}</b><br>
        <small>${g.userEmail || ""}</small>
      </div>

      <div class="actions">
        <div class="statusBox ${cls}">${g.status || "placed"}</div>

        <select onchange="updateStatus('${d.id}',this.value)">
          <option ${g.status=="placed"?"selected":""}>placed</option>
          <option ${g.status=="on delivery"?"selected":""}>on delivery</option>
          <option ${g.status=="delivered"?"selected":""}>delivered</option>
        </select>
      </div>
    </div>`;
  });
}

window.updateStatus = async(id,val)=>{
  await updateDoc(doc(db,"giftOrders",id),{status:val});
  loadTracking();
};

/* LOGOUT */
/* 🔥 GIFT CATEGORY SYSTEM */
window.addGiftCategory = async()=>{
  if(!gCatName.value) return;

  await addDoc(collection(db,"giftCategories"),{
    name:gCatName.value
  });

  gCatName.value="";
  loadGiftCategories();
};

async function loadGiftCategories(){
  gCategories.innerHTML="";

  (await getDocs(collection(db,"giftCategories"))).forEach(d=>{
    const c=d.data();

    gCategories.innerHTML+=`
    <div class="item">
      ${c.name}
      <div class="actions">
        <button onclick="editGiftCat('${d.id}','${c.name}')">Edit</button>
        <button onclick="delGiftCat('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
