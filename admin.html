<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* ACTION BUTTONS */
.btn-edit{background:#1877f2;color:white;}
.btn-del{background:#e74c3c;color:white;}
.btn-fund{background:#2ecc71;color:white;}
.btn-deduct{background:#f39c12;color:white;}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
}

.actions {
  display:flex;
  gap:6px;
  min-width:140px;
  justify-content:flex-end;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav button {
  flex:1;
  padding:10px;
  background:#1c1c2e;
  color:gray;
}

.nav button.active {
  background:#1877f2;
  color:white;
}

.statusBox{
  padding:6px;
  border-radius:6px;
  font-size:12px;
}

.placed{background:#665c00;}
.delivery{background:#003366;}
.delivered{background:#003300;}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">
  <h3>Tracking System</h3>
  <div id="tracking"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- MAIN -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName"><button onclick="addCategory()">Add</button>
  <div id="categories"></div>

  <h3>Main Products</h3>
  <input id="pName"><input id="pCategory"><input id="pPrice">
  <button onclick="addProduct()">Add</button>
  <div id="products"></div>
</div>

<!-- ORDERS -->
<div id="ordersPage" class="card page hidden">
  <h3>Main Orders</h3>
  <div id="orders"></div>
</div>

<!-- GIFTS -->
<div id="giftDashboard" class="card page hidden">
  <h3>Gift Categories</h3>
  <input id="gCatName"><button onclick="addGiftCategory()">Add</button>
  <div id="gCategories"></div>

  <h3>Gift Products</h3>
  <input id="gName"><input id="gCategory"><input id="gPrice">
  <button onclick="addGiftProduct()">Add</button>
  <div id="gProducts"></div>
</div>

<!-- GIFT ORDERS -->
<div id="giftOrdersPage" class="card page hidden">
  <h3>Gift Orders</h3>
  <div id="giftOrders"></div>
</div>

<!-- ✅ 6 BUTTON NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Main</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="giftDashboard">Gifts</button>
  <button data-page="giftOrdersPage">Gift Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore,collection,getDocs,doc,addDoc,getDoc,updateDoc,deleteDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ADMIN LOCK */
const ADMIN_EMAIL = "etee77366@gmail.com".toLowerCase();

const app=initializeApp({
 apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
 authDomain:"wizard-shop-52a50.firebaseapp.com",
 projectId:"wizard-shop-52a50"
});

const db=getFirestore(app);
const auth=getAuth(app);

/* AUTH */
onAuthStateChanged(auth,user=>{
 if(!user){
  location.href="auth.html";
  return;
 }

 const email=(user.email||"").toLowerCase();

 if(email!==ADMIN_EMAIL){
  alert("Access denied: Admin only");
  signOut(auth);
  return;
 }

 document.body.style.display="block";
 init();
});

/* NAV FIX */
document.querySelectorAll(".nav button").forEach(btn=>{
 btn.onclick=()=>{
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(btn.dataset.page).classList.remove("hidden");
 };
});

/* INIT */
function init(){
 loadUsers();
 loadCategories();
 loadProducts();
 loadGiftCategories();
 loadGiftProducts();
 loadTracking();
 loadOrders();
 loadGiftOrders();
}

/* ORDERS */
async function loadOrders(){
 orders.innerHTML="";
 (await getDocs(collection(db,"orders"))).forEach(d=>{
  let o=d.data();
  orders.innerHTML+=`
  <div class="item">
   ${o.name} ₦${o.price}
  </div>`;
 });
}

/* GIFT ORDERS */
async function loadGiftOrders(){
 giftOrders.innerHTML="";
 (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
  let g=d.data();
  giftOrders.innerHTML+=`
  <div class="item">
   ${g.type}
   <div class="statusBox ${g.status||'placed'}">${g.status||'placed'}</div>
  </div>`;
 });
}

/* KEEP ALL YOUR OLD FUNCTIONS BELOW (UNCHANGED) */

/* USERS */
async function loadUsers(){
 users.innerHTML="";
 (await getDocs(collection(db,"users"))).forEach(d=>{
  const u=d.data();
  users.innerHTML+=`
  <div class="item">
   ${u.email} ₦${u.wallet||0}
   <div class="actions">
    <button class="btn-fund" onclick="fund('${d.id}')">+</button>
    <button class="btn-deduct" onclick="deduct('${d.id}')">-</button>
    <button class="btn-del" onclick="delUser('${d.id}')">X</button>
   </div>
  </div>`;
 });
}

/* KEEP REST EXACTLY SAME */

logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
