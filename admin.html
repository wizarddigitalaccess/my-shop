<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container { padding:15px; }

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

button:hover { opacity:0.85; }

.item {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #333;
}

.logo {
  width:40px;
  height:40px;
  border-radius:8px;
  background:#222;
  object-fit:contain;
}

.row { display:flex; gap:5px; }
.row button { flex:1; font-size:12px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button { flex:1; background:none; color:gray; }
.nav button.active { color:purple; }
</style>
</head>

<body>

<div class="header">
  <span>💎 Premium Admin</span>
  <button id="logoutBtn" style="width:auto;background:red;">Logout</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="card">
    <h3>Revenue Chart</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    Users: <span id="usersCount"></span><br>
    Products: <span id="productsCount"></span><br>
    Orders: <span id="ordersCount"></span><br>
    Revenue: ₦<span id="revenue"></span>
  </div>
</div>

<!-- USERS -->
<div id="usersPage" style="display:none">
  <div class="card">
    <input id="userSearch" placeholder="Search users...">
    <div id="users"></div>
  </div>
</div>

<!-- PRODUCTS -->
<div id="productsPage" style="display:none">
  <div class="card">

    <h3>Add Product</h3>

    <input id="name" placeholder="Product Name (e.g Facebook Account)">
    <input id="category" placeholder="Category">
    <input id="price" type="number" placeholder="Price">
    <input id="domain" placeholder="Domain (facebook.com)">
    <input id="logoInput" placeholder="Custom Logo URL (optional)">
    
    <img id="logoPreview" class="logo">

    <textarea id="stockData" placeholder="email:password per line"></textarea>

    <button id="addProductBtn">Add Product</button>

    <hr>

    <input id="productSearch" placeholder="Search products...">
    <div id="products"></div>
  </div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none">
  <div class="card">
    <h3>Transactions</h3>
    <div id="orders"></div>
  </div>
</div>

</div>

<div class="nav">
<button data-page="dashboard" class="active">Dashboard</button>
<button data-page="users">Users</button>
<button data-page="products">Products</button>
<button data-page="orders">Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  updateDoc, deleteDoc, addDoc, increment,
  getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* STATE */
let chartInstance;
let usersData = [];
let productsData = [];

/* DOM */
const usersDiv = document.getElementById("users");
const productsDiv = document.getElementById("products");

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    setTimeout(()=>{
      if (!auth.currentUser) location.href="auth.html";
    },500);
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));

  if(!snap.exists() || snap.data().role !== "admin"){
    location.href="index.html";
    return;
  }

  document.body.style.display="block";
  init();
});

/* INIT */
async function init(){
  loadDashboard();
  loadUsers();
  loadProducts();
  loadOrders();
}

/* LOGO SYSTEM */
function getLogo(domain, custom){
  if(custom) return custom;
  if(!domain) return "";
  return `https://logo.clearbit.com/${domain}`;
}

function updateLogoPreview(){
  const domain = document.getElementById("domain").value;
  const custom = document.getElementById("logoInput").value;
  document.getElementById("logoPreview").src = getLogo(domain, custom);
}

document.getElementById("domain").addEventListener("input", updateLogoPreview);
document.getElementById("logoInput").addEventListener("input", updateLogoPreview);

/* DASHBOARD */
async function loadDashboard(){
  const usersSnap = await getDocs(collection(db,"users"));
  const productsSnap = await getDocs(collection(db,"products"));
  const ordersSnap = await getDocs(collection(db,"orders"));

  usersCount.innerText = usersSnap.size;
  productsCount.innerText = productsSnap.size;
  ordersCount.innerText = ordersSnap.size;

  let revenue = 0;
  let days = {};

  ordersSnap.forEach(d=>{
    const o = d.data();
    revenue += Number(o.price||0);

    if(o.createdAt){
      const date = new Date(o.createdAt);
      const key = date.toLocaleDateString();
      days[key]=(days[key]||0)+Number(o.price||0);
    }
  });

  revenueEl.innerText = revenue;

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(chart,{
    type:"line",
    data:{
      labels:Object.keys(days),
      datasets:[{label:"Revenue",data:Object.values(days)}]
    }
  });
}

/* USERS */
async function loadUsers(){
  usersDiv.innerHTML="";
  const snap = await getDocs(collection(db,"users"));
  usersData = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderUsers();
}

function renderUsers(){
  const search = userSearch.value.toLowerCase();

  usersDiv.innerHTML="";
  usersData
    .filter(u => (u.email||"").toLowerCase().includes(search))
    .forEach(u=>{
      const div=document.createElement("div");
      div.className="item";
      div.innerHTML=`${u.email}<br>₦${u.wallet||0}`;

      const row=document.createElement("div");
      row.className="row";

      ["+Fund","-Deduct","Delete"].forEach((t,i)=>{
        const b=document.createElement("button");
        b.textContent=t;
        b.onclick=()=> i===0?updateWallet(u.id,true):i===1?updateWallet(u.id,false):deleteUser(u.id);
        row.appendChild(b);
      });

      div.appendChild(row);
      usersDiv.appendChild(div);
    });
}

async function updateWallet(id,add){
  const amt=Number(prompt("Amount"));
  if(!amt)return;
  await updateDoc(doc(db,"users",id),{wallet:increment(add?amt:-amt)});
  loadUsers();
}

async function deleteUser(id){
  if(confirm("Delete user?")){
    await deleteDoc(doc(db,"users",id));
    loadUsers();
  }
}

/* PRODUCTS */
async function loadProducts(){
  productsDiv.innerHTML="";
  const snap = await getDocs(collection(db,"products"));
  productsData = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderProducts();
}

function renderProducts(){
  const search = productSearch.value.toLowerCase();

  productsDiv.innerHTML="";
  productsData
    .filter(p => p.name.toLowerCase().includes(search))
    .forEach(p=>{
      const div=document.createElement("div");
      div.className="item";

      div.innerHTML=`
        <img src="${p.logo||""}" class="logo">
        <div>${p.name}<br>₦${p.price}</div>
      `;

      const row=document.createElement("div");
      row.className="row";

      const edit=document.createElement("button");
      edit.textContent="Edit";
      edit.onclick=()=>editProduct(p.id);

      const del=document.createElement("button");
      del.textContent="Delete";
      del.onclick=()=>deleteProduct(p.id);

      row.append(edit,del);
      div.appendChild(row);

      productsDiv.appendChild(div);
    });
}

/* ADD PRODUCT */
addProductBtn.onclick = async ()=>{
  const name = document.getElementById("name").value.trim();
  const category = document.getElementById("category").value.trim();
  const price = Number(document.getElementById("price").value);
  const domain = document.getElementById("domain").value.trim().toLowerCase();
  const custom = document.getElementById("logoInput").value.trim();

  if(!name || !category || !price){
    return alert("Fill all fields");
  }

  // 🔥 AUTO CLEAN DOMAIN (VERY IMPORTANT)
  const cleanDomain = domain
    .replace("https://","")
    .replace("http://","")
    .replace("www.","")
    .split("/")[0];

  // 🔥 GENERATE LOGO
  const logo = getLogo(cleanDomain, custom);

  // ✅ SAVE PRODUCT WITH LOGO
  const ref = await addDoc(collection(db,"products"),{
    name,
    category,
    price,
    domain: cleanDomain,
    logo // ← THIS IS THE KEY FIELD
  });

  // 🔥 STOCK SYSTEM
  const lines = document.getElementById("stockData").value.split("\n");

  const items = lines
    .filter(l => l.includes(":"))
    .map(l=>{
      const [email,password]=l.split(":");
      return {
        email: email.trim(),
        password: password.trim(),
        sold:false
      };
    });

  await setDoc(doc(db,"productStock",ref.id),{items});

  alert("Product added 🚀");
  loadProducts();
};

/* DELETE */
async function deleteProduct(id){
  if(confirm("Delete?")){
    await deleteDoc(doc(db,"products",id));
    loadProducts();
  }
}

/* ORDERS */
async function loadOrders(){
  orders.innerHTML="";
  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{
    const o=d.data();
    orders.innerHTML+=`<div class="item">₦${o.price}<br>${o.name}</div>`;
  });
}

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    ["dashboard","usersPage","productsPage","ordersPage"].forEach(id=>{
      document.getElementById(id).style.display="none";
    });

    document.getElementById(btn.dataset.page+(btn.dataset.page==="dashboard"?"":"Page")).style.display="block";
  };
});

/* SEARCH */
userSearch.oninput=renderUsers;
productSearch.oninput=renderProducts;

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
