<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
}

.container {
  padding: 20px;
}

.card {
  background: #1c1c2e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: purple;
  color: white;
  cursor: pointer;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Admin Panel</h2>
<p>Manage products, users & payments</p>
</div>

<!-- ADD PRODUCT -->
<div class="card">
<h3>Add Product</h3>

<input id="name" placeholder="Account Name">
<input id="link" placeholder="Profile Link">
<input id="category" placeholder="Category (africa, usa, instagram)">
<input id="price" type="number" placeholder="Price">

<button onclick="addProduct()">Add Product</button>
</div>

<!-- TRANSACTIONS -->
<div class="card">
<h3>Pending Payments</h3>
<div id="transactions">Loading...</div>
</div>

<!-- USERS -->
<div class="card">
<h3>Users</h3>
<div id="users">Loading...</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  increment,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby...",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "etee77366@gmail.com";
let ready = false;

// 🔐 ADMIN CHECK (FIXED)
onAuthStateChanged(auth, (user) => {
  if (ready) return;
  ready = true;

  if (!user || user.email !== ADMIN_EMAIL) {
    window.location.href = "auth.html";
    return;
  }

  loadUsers();
  loadTransactions();
});

// ➕ ADD PRODUCT (WITH PRICE)
window.addProduct = async function () {
  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;
  const category = document.getElementById("category").value.toLowerCase();
  const price = Number(document.getElementById("price").value);

  if (!name || !link || !category || !price) {
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "products"), {
    name,
    link,
    category,
    price,
    status: "available"
  });

  alert("Product added ✔️");

  document.getElementById("name").value = "";
  document.getElementById("link").value = "";
  document.getElementById("category").value = "";
  document.getElementById("price").value = "";
};

// 👤 LOAD USERS
async function loadUsers() {
  const div = document.getElementById("users");
  div.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        <b>${data.name || "No Name"}</b><br>
        ${data.email}<br>
        Wallet: ₦${data.wallet || 0}<br>
        UID: ${docItem.id}
      </div>
    `;
  });
}

// 💳 LOAD TRANSACTIONS
async function loadTransactions() {
  const div = document.getElementById("transactions");
  div.innerHTML = "";

  const q = query(
    collection(db, "transactions"),
    where("status", "==", "pending")
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    div.innerHTML = "No pending payments";
    return;
  }

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        ₦${data.amount}<br>
        UID: ${data.uid}<br>
        <button onclick="approve('${docItem.id}', '${data.uid}', ${data.amount})">
          Approve
        </button>
      </div>
    `;
  });
}

// ✅ APPROVE PAYMENT
window.approve = async function (txId, uid, amount) {
  await updateDoc(doc(db, "users", uid), {
    wallet: increment(amount)
  });

  await updateDoc(doc(db, "transactions", txId), {
    status: "approved"
  });

  alert("Payment approved ✔️");
  loadTransactions();
};
</script>

</body>
</html>
