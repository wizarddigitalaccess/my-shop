<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }
.header { padding:15px; background:#1c1c2e; display:flex; justify-content:space-between; }
.card { background:#1c1c2e; padding:15px; border-radius:12px; margin:15px; }
.hidden { display:none; }

input { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; background:#111; color:white; }
button { padding:6px 10px; border:none; border-radius:8px; background:#1877f2; color:white; cursor:pointer; }

.item { display:flex; justify-content:space-between; border-bottom:1px solid #333; padding:10px; gap:10px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button { flex:1; background:none; color:gray; }
.nav button.active { color:#1877f2; }

img { width:40px; height:40px; object-fit:cover; border-radius:6px; }
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">
  <h3>Dashboard</h3>
  <div id="analytics"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- GIFT DASHBOARD -->
<div id="giftDashboard" class="card page hidden">
  <h3>Gift Categories</h3>
  <input id="gCatName" placeholder="Category name">
  <button onclick="addGiftCategory()">Add</button>
  <div id="gCategories"></div>

  <hr>

  <h3>Gift Products</h3>
  <input id="gName" placeholder="Product name">
  <input id="gCategory" placeholder="Category">
  <input id="gPrice" type="number" placeholder="Price">
  <input type="file" id="gImageFile">
  <button onclick="addGiftProduct()">Add</button>
  <div id="gProducts"></div>
</div>

<!-- GIFT ORDERS -->
<div id="giftOrdersPage" class="card page hidden">
  <h3>Gift Orders</h3>
  <div id="giftOrders"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="giftDashboard">Gift Dashboard</button>
  <button data-page="giftOrdersPage">Gift Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* INIT */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists() || snap.data().role !== "admin"){
    return location.href="index.html";
  }

  document.body.style.display="block";
  init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");

    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadAnalytics();
  loadUsers();
  loadGiftCategories();
  loadGiftProducts();
  loadGiftOrders();
}

/* IMAGE UPLOAD */
async function uploadImage(file){
  const storageRef = ref(storage,"gifts/"+Date.now());
  await uploadBytes(storageRef,file);
  return await getDownloadURL(storageRef);
}

/* ANALYTICS (IMPROVED) */
async function loadAnalytics(){
  let total=0, count=0;

  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    total+=Number(d.data().price||0);
    count++;
  });

  analytics.innerHTML = `
    💰 Revenue: ₦${total}<br>
    📦 Orders: ${count}
  `;
}

/* USERS (SAFE FUND/DEDUCT) */
async function loadUsers(){
  users.innerHTML="";
  (await getDocs(collection(db,"users"))).forEach(d=>{
    const u=d.data();
    users.innerHTML+=`
      <div class="item">
        ${u.email || d.id} | ₦${u.balance||0}
        <div>
          <button onclick="fundUser('${d.id}')">+₦</button>
          <button onclick="deductUser('${d.id}')">-₦</button>
          <button onclick="deleteUser('${d.id}')">🗑</button>
        </div>
      </div>`;
  });
}

window.fundUser=async(id)=>{
  const amt=Number(prompt("Amount to ADD"));
  if(!amt || amt<=0) return;

  const refDoc = doc(db,"users",id);
  const snap = await getDoc(refDoc);

  await updateDoc(refDoc,{balance:(snap.data().balance||0)+amt});
  loadUsers();
};

window.deductUser=async(id)=>{
  const amt=Number(prompt("Amount to REMOVE"));
  if(!amt || amt<=0) return;

  const refDoc = doc(db,"users",id);
  const snap = await getDoc(refDoc);

  let newBal = (snap.data().balance||0)-amt;
  if(newBal < 0) newBal = 0;

  await updateDoc(refDoc,{balance:newBal});
  loadUsers();
};

window.deleteUser=async(id)=>{
  if(!confirm("Delete this user?")) return;
  await deleteDoc(doc(db,"users",id));
  loadUsers();
};

/* (ALL YOUR GIFT FUNCTIONS LEFT UNCHANGED — SAFE) */

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
