<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
  display:none;
}

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #333;
  padding:10px;
  gap:10px;
}

.logo {
  width:40px;
  height:40px;
  object-fit:contain;
  border-radius:6px;
  background:#111; /* 🔥 removed white background */
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button {
  flex:1;
  background:none;
  color:gray;
}
.nav button.active {
  color:purple;
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<div id="dashboard" class="card">
  Revenue: ₦<span id="revenue"></span>
</div>

<div id="usersPage" class="card" style="display:none">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="categoriesPage" class="card" style="display:none">
  <h3>Categories</h3>
  <input id="newCategory" placeholder="Category name">
  <button id="addCategoryBtn">Add</button>
  <div id="categories"></div>
</div>

<div id="productsPage" class="card" style="display:none">
  <h3>Add Product</h3>

  <!-- KEEP YOUR ORIGINAL FORM -->
  <input id="nameInput" placeholder="Name">
  <input id="categoryInput" placeholder="Category">
  <input id="priceInput" type="number" placeholder="Price">
  <input id="domain" placeholder="Website (e.g facebook.com)">
  <input id="logoInput" placeholder="Custom Logo URL">
  <input id="previewLink" placeholder="Preview Link">
  <textarea id="description" placeholder="Product Description"></textarea>
  <textarea id="stockData" placeholder="email:password"></textarea>

  <button id="addProductBtn">Add Product</button>

  <hr>

  <h3>Products</h3>
  <div id="products"></div>
</div>

<div id="ordersPage" class="card" style="display:none">
  <h3>Orders</h3>
  <div id="orders"></div>
</div>

<div class="nav">
  <button data-page="dashboard" class="active">Dashboard</button>
  <button data-page="users">Users</button>
  <button data-page="categories">Categories</button>
  <button data-page="products">Products</button>
  <button data-page="orders">Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, setDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.replace("auth.html");

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists() || snap.data().role !== "admin"){
    return location.replace("index.html");
  }

  document.body.style.display="block";
  init();
});

/* INIT */
async function init(){
  loadDashboard();
  loadUsers();
  loadCategories();
  loadProducts();
  loadOrders();
}

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const u = d.data();

    users.innerHTML += `
      <div class="item">
        ${u.email}<br>₦${u.wallet||0}
        <div>
          <button onclick="addMoney('${d.id}')">+</button>
          <button onclick="subMoney('${d.id}')">-</button>
          <button onclick="deleteUser('${d.id}')">X</button>
        </div>
      </div>
    `;
  });
}

window.addMoney = async (id)=>{
  const amt = Number(prompt("Amount"));
  if(!amt) return;
  const ref = doc(db,"users",id);
  const u = (await getDoc(ref)).data();
  await updateDoc(ref,{wallet:(u.wallet||0)+amt});
  loadUsers();
};

window.subMoney = async (id)=>{
  const amt = Number(prompt("Amount"));
  if(!amt) return;
  const ref = doc(db,"users",id);
  const u = (await getDoc(ref)).data();
  await updateDoc(ref,{wallet:(u.wallet||0)-amt});
  loadUsers();
};

window.deleteUser = async (id)=>{
  if(confirm("Delete user?")){
    await deleteDoc(doc(db,"users",id));
    loadUsers();
  }
};

/* CATEGORIES */
addCategoryBtn.onclick = async ()=>{
  const name = newCategory.value.trim();
  if(!name) return;
  await addDoc(collection(db,"categories"),{name});
  newCategory.value="";
  loadCategories();
};

async function loadCategories(){
  categories.innerHTML="";
  const snap = await getDocs(collection(db,"categories"));

  snap.forEach(d=>{
    const c = d.data();

    categories.innerHTML += `
      <div class="item">
        ${c.name}
        <div>
          <button onclick="editCategory('${d.id}','${c.name}')">Edit</button>
          <button onclick="deleteCategory('${d.id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

window.editCategory = async (id, oldName)=>{
  const name = prompt("Edit category", oldName);
  if(!name) return;
  await updateDoc(doc(db,"categories",id),{name});
  loadCategories();
};

window.deleteCategory = async (id)=>{
  if(confirm("Delete category?")){
    await deleteDoc(doc(db,"categories",id));
    loadCategories();
  }
};

/* PRODUCTS */
async function loadProducts(){
  products.innerHTML="";
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p = d.data();

    products.innerHTML += `
      <div class="item">
        <img src="${p.logo || ''}" class="logo"
        onerror="this.style.display='none'">

        ${p.name} - ₦${p.price}

        <div>
          <button onclick="editProduct('${d.id}','${p.name}',${p.price})">Edit</button>
          <button onclick="deleteProduct('${d.id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

window.editProduct = async (id,name,price)=>{
  const newName = prompt("Edit name", name);
  const newPrice = Number(prompt("Edit price", price));

  if(!newName || !newPrice) return;

  await updateDoc(doc(db,"products",id),{
    name:newName,
    price:newPrice
  });

  loadProducts();
};

window.deleteProduct = async (id)=>{
  if(confirm("Delete product?")){
    await deleteDoc(doc(db,"products",id));
    loadProducts();
  }
};

/* DASHBOARD */
async function loadDashboard(){
  const snap = await getDocs(collection(db,"orders"));
  let total = 0;
  snap.forEach(d=> total += Number(d.data().price||0));
  revenue.innerText = total;
}

/* ORDERS */
async function loadOrders(){
  orders.innerHTML="";
  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{
    const o = d.data();
    orders.innerHTML += `<div class="item">₦${o.price} - ${o.name}</div>`;
  });
}

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    ["dashboard","usersPage","categoriesPage","productsPage","ordersPage"]
    .forEach(id=> document.getElementById(id).style.display="none");

    document.getElementById(btn.dataset.page+(btn.dataset.page==="dashboard"?"":"Page")).style.display="block";
  };
});

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
