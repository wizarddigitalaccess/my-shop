<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
}

.actions { display:flex; gap:6px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  padding:5px;
}

.nav button {
  flex:1;
  margin:3px;
  padding:10px;
  border-radius:10px;
  background:#1c1c2e;
  color:gray;
  font-size:12px;
}

.nav button.active {
  background:#1877f2;
  color:white;
}

.statusBox{
  padding:8px;
  border-radius:8px;
  font-weight:bold;
  font-size:12px;
  text-align:center;
  min-width:110px;
}

.placed{background:#665c00;color:#ffd700;}
.delivery{background:#003366;color:#4da3ff;}
.delivered{background:#003300;color:#00ff88;}

select{
  padding:6px;
  border-radius:6px;
  background:#111;
  color:white;
  border:none;
}

.toggle {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<div id="home" class="card page">
  <h3>Tracking System</h3>
  <div id="tracking"></div>
</div>

<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName" placeholder="Category name">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>

  <hr>

  <h3>Main Products</h3>
  <input id="pName" placeholder="Product name">
  <input id="pCategory" placeholder="Category">
  <input id="pPrice" type="number" placeholder="Price">
  <input id="pPreview" placeholder="Preview Link">
  <button onclick="addProduct()">Add Product</button>
  <div id="products"></div>
</div>

<div id="ordersPage" class="card page hidden">
  <h3>Main Orders</h3>
  <div id="orders"></div>
</div>

<div id="giftDashboard" class="card page hidden">
<h3>Gift Categories</h3>
<input id="gCatName">
<button onclick="addGiftCategory()">Add</button>
<div id="gCategories"></div>

<hr>

<input id="gName">
<input id="gCategory">
<input id="gPrice" type="number">

<div class="toggle">
  <label>Require Size</label>
  <input type="checkbox" id="gProductSize">
</div>

<button onclick="addGiftProduct()">Add</button>
<div id="gProducts"></div>
</div>

<div id="giftOrdersPage" class="card page hidden">
  <h3>Gift Orders</h3>
  <div id="giftOrders"></div>
</div>

<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Main</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="giftDashboard">Gifts</button>
  <button data-page="giftOrdersPage">Gift Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, addDoc, getDoc, updateDoc, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";
  document.body.style.display="block";
  init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadCategories();
  loadProducts();
  loadGiftCategories();
  loadGiftProducts();
  loadTracking();
}

/* CATEGORY */
window.addCategory = async()=>{
  if(!catName.value) return;
  await addDoc(collection(db,"categories"),{name:catName.value});
  catName.value="";
  loadCategories();
};

async function loadCategories(){
  categories.innerHTML="";
  (await getDocs(collection(db,"categories"))).forEach(d=>{
    categories.innerHTML+=`<div class="item">${d.data().name}</div>`;
  });
}

/* PRODUCTS */
window.addProduct = async()=>{
  if(!pName.value || !pCategory.value || !pPrice.value) return alert("Fill all");
  await addDoc(collection(db,"products"),{
    name:pName.value,
    category:pCategory.value,
    price:Number(pPrice.value),
    previewLink:pPreview.value
  });
  loadProducts();
};

async function loadProducts(){
  products.innerHTML="";
  (await getDocs(collection(db,"products"))).forEach(d=>{
    const p=d.data();
    products.innerHTML+=`<div class="item">${p.name} ₦${p.price}</div>`;
  });
}

/* GIFT PRODUCT */
window.addGiftProduct = async()=>{
  if(!gName.value || !gCategory.value || !gPrice.value) return alert("Fill all");
  await addDoc(collection(db,"giftProducts"),{
    name:gName.value,
    category:gCategory.value,
    price:Number(gPrice.value),
    requiresSize:gProductSize.checked
  });
  loadGiftProducts();
};

async function loadGiftProducts(){
  gProducts.innerHTML="";
  (await getDocs(collection(db,"giftProducts"))).forEach(d=>{
    const p=d.data();
    gProducts.innerHTML+=`<div class="item">${p.name} ₦${p.price}</div>`;
  });
}

/* GIFT CATEGORY */
window.addGiftCategory = async()=>{
  if(!gCatName.value) return;
  await addDoc(collection(db,"giftCategories"),{name:gCatName.value});
  loadGiftCategories();
};

async function loadGiftCategories(){
  gCategories.innerHTML="";
  (await getDocs(collection(db,"giftCategories"))).forEach(d=>{
    gCategories.innerHTML+=`<div class="item">${d.data().name}</div>`;
  });
}

/* TRACKING */
async function loadTracking(){
  tracking.innerHTML="";
  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    const g=d.data();
    tracking.innerHTML+=`<div class="item">${g.type} - ${g.status||"placed"}</div>`;
  });
}

logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
