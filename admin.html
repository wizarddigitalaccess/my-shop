<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a2b;
  color: white;
}

.container {
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
}

button {
  background: purple;
  color: white;
  cursor: pointer;
}

h2 {
  margin-top: 0;
}

.user {
  padding: 10px;
  background: #0f172a;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h2>Admin Panel</h2>
    <p>Manage users & wallet</p>
  </div>

  <!-- ADD WALLET -->
  <div class="card">
    <h3>Add Wallet Credit</h3>

    <input id="uid" placeholder="User UID">
    <input id="amount" type="number" placeholder="Amount">

    <button onclick="addMoney()">Credit Wallet</button>
  </div>

  <!-- USERS LIST -->
  <div class="card">
    <h3>Users</h3>
    <div id="users">Loading...</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  collection, 
  getDocs, 
  doc, 
  updateDoc, 
  increment 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 ADMIN ONLY
const ADMIN_EMAIL = "wizarddigitalaccess@gmail.com";

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    alert("Access denied!");
    window.location.href = "index.html";
    return;
  }

  loadUsers();
});

// 👤 LOAD USERS
async function loadUsers() {
  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach((docItem) => {
    const data = docItem.data();

    usersDiv.innerHTML += `
      <div class="user">
        <b>${data.name || "No Name"}</b><br>
        Email: ${data.email}<br>
        Wallet: ₦${data.wallet || 0}<br>
        UID: ${docItem.id}
      </div>
    `;
  });
}

// 💰 ADD MONEY
window.addMoney = async function () {
  const uid = document.getElementById("uid").value;
  const amount = Number(document.getElementById("amount").value);

  if (!uid || !amount) {
    alert("Fill all fields");
    return;
  }

  const userRef = doc(db, "users", uid);

  await updateDoc(userRef, {
    wallet: increment(amount)
  });

  alert("Wallet updated ✔️");
  loadUsers();
};
</script>

</body>
</html>
