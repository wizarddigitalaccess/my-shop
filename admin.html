<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
  display:none;
}

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #333;
  padding:10px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button {
  flex:1;
  background:none;
  color:gray;
}
.nav button.active {
  color:#1877f2;
}
img { width:40px; height:40px; object-fit:cover; border-radius:6px; }
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card page">
  <h3>Analytics</h3>
  <div id="analytics"></div>
</div>

<!-- CATEGORIES -->
<div id="categoriesPage" class="card page hidden">
  <h3>Categories</h3>
  <input id="catName" placeholder="Name">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>
</div>

<!-- PRODUCTS -->
<div id="productsPage" class="card page hidden">
  <h3>Products</h3>
  <input id="pName" placeholder="Name">
  <input id="pCategory" placeholder="Category">
  <input id="pPrice" type="number" placeholder="Price">
  <input type="file" id="pImageFile">
  <button onclick="addProduct()">Add</button>
  <div id="products"></div>
</div>

<!-- ORDERS -->
<div id="ordersPage" class="card page hidden">
  <h3>Orders</h3>
  <div id="orders"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div class="nav">
  <button data-page="dashboard" class="active">Home</button>
  <button data-page="categoriesPage">Categories</button>
  <button data-page="productsPage">Products</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="usersPage">Users</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* INIT */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists() || snap.data().role !== "admin"){
    alert("Not admin");
    return location.href="index.html";
  }

  document.body.style.display="block";
  init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");

    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT LOAD */
function init(){
  loadAnalytics();
  loadCategories();
  loadProducts();
  loadOrders();
  loadUsers();
}

/* IMAGE UPLOAD */
async function uploadImage(file){
  const storageRef = ref(storage,"products/"+Date.now());
  await uploadBytes(storageRef,file);
  return await getDownloadURL(storageRef);
}

/* ANALYTICS */
async function loadAnalytics(){
  let total=0, count=0, delivered=0;

  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{
    const o=d.data();
    total += Number(o.total||0);
    count++;
    if(o.status==="delivered") delivered++;
  });

  analytics.innerHTML = `
    💰 Revenue: ₦${total}<br>
    📦 Orders: ${count}<br>
    ✅ Delivered: ${delivered}
  `;
}

/* CATEGORIES */
window.addCategory=async()=>{
  await addDoc(collection(db,"categories"),{name:catName.value});
  catName.value="";
  loadCategories();
};

async function loadCategories(){
  categories.innerHTML="";
  (await getDocs(collection(db,"categories"))).forEach(d=>{
    categories.innerHTML+=`
      <div class="item">
        ${d.data().name}
        <button onclick="deleteCategory('${d.id}')">Delete</button>
      </div>`;
  });
}

window.deleteCategory=async(id)=>{
  await deleteDoc(doc(db,"categories",id));
  loadCategories();
};

/* PRODUCTS */
window.addProduct=async()=>{
  const file = pImageFile.files[0];
  if(!file) return alert("Select image");

  const image = await uploadImage(file);

  await addDoc(collection(db,"products"),{
    name:pName.value,
    category:pCategory.value,
    price:Number(pPrice.value),
    image:image,
    createdAt:Date.now()
  });

  loadProducts();
};

async function loadProducts(){
  products.innerHTML="";
  (await getDocs(collection(db,"products"))).forEach(d=>{
    const p=d.data();
    products.innerHTML+=`
      <div class="item">
        <img src="${p.image}">
        ${p.name} - ₦${p.price}
        <div>
          <button onclick="editProduct('${d.id}')">Edit</button>
          <button onclick="deleteProduct('${d.id}')">Delete</button>
        </div>
      </div>`;
  });
}

window.editProduct=async(id)=>{
  const name=prompt("New name");
  const price=prompt("New price");
  if(!name || !price) return;

  await updateDoc(doc(db,"products",id),{
    name, price:Number(price)
  });

  loadProducts();
};

window.deleteProduct=async(id)=>{
  await deleteDoc(doc(db,"products",id));
  loadProducts();
};

/* ORDERS */
async function loadOrders(){
  orders.innerHTML="";
  (await getDocs(collection(db,"orders"))).forEach(d=>{
    const o=d.data();
    orders.innerHTML+=`
      <div class="item">
        ₦${o.total} - ${o.status || "pending"}
        <div>
          <button onclick="updateOrder('${d.id}','processing')">⚙️</button>
          <button onclick="updateOrder('${d.id}','delivered')">✅</button>
          <button onclick="deleteOrder('${d.id}')">🗑</button>
        </div>
      </div>`;
  });
}

window.updateOrder=async(id,status)=>{
  await updateDoc(doc(db,"orders",id),{status});
  loadOrders();
};

window.deleteOrder=async(id)=>{
  await deleteDoc(doc(db,"orders",id));
  loadOrders();
};

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  (await getDocs(collection(db,"users"))).forEach(d=>{
    users.innerHTML+=`
      <div class="item">
        ${d.data().email || d.id}
      </div>`;
  });
}

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
