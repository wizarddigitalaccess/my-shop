<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;

  max-height:80vh;
  overflow-y:auto;
}

.page {
  padding-bottom: 80px;
}
.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* BUTTONS */
.btn-edit{background:#1877f2;color:white;}
.btn-del{background:#e74c3c;color:white;}
.btn-fund{background:#2ecc71;color:white;}
.btn-deduct{background:#f39c12;color:white;}
.btn-status{background:#9b59b6;color:white;}

.item {
  display:flex;
  flex-direction:column;
  gap:6px;
  border-bottom:1px solid #333;
  padding:10px;
}

.topRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.actions {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:#111;
  z-index:999;
}

.nav button {
  flex:1;
  padding:10px;
  background:#1c1c2e;
  color:gray;
}

.nav button.active {
  background:#1877f2;
  color:white;
}

/* STATUS */
.statusBox{
  padding:6px;
  border-radius:6px;
  font-size:12px;
}

.placed{background:#665c00;}
.processing{background:#5a2d82;}
.delivery{background:#003366;}
.delivered{background:#003300;}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
    <div class="card" id="cardUsers">Users: 0</div>
    <div class="card" id="cardSales">Sales: ₦0</div>
    <div class="card" id="cardDeposits">Deposits: ₦0</div>
    <div class="card" id="cardOrders">Orders: 0</div>
  </div>

  <h3>Tracking (Live)</h3>
  <div id="tracking"></div>

</div> <!-- ✅ VERY IMPORTANT -->

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <input id="userSearch" placeholder="Search by email...">
  <div id="users"></div>
</div>

<!-- MAIN -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName"><button onclick="addCategory()">Add</button>
  <div id="categories"></div>

  <h3>Main Products</h3>
  <input id="pName" placeholder="Product Name (e.g Facebook Account)">
  <input id="pCategory" placeholder="Category (must match exactly)">
  <input id="pPrice" placeholder="Price (e.g 5000)">
  <input id="pDetails" placeholder="Details (e.g Email:..., Password:...)">
  <button onclick="addProduct()">Add</button>
  <div id="products"></div>
</div>

<!-- GIFTS -->
<div id="giftDashboard" class="card page hidden">
  <h3>Gift Categories</h3>
  <input id="gCatName">
  <button onclick="addGiftCategory()">Add</button>
  <div id="gCategories"></div>

  <h3>Gift Products</h3>
  <input id="gName" placeholder="Product Name">
  <input id="gCategory" placeholder="Category (must match exactly)">
  <input id="gPrice" placeholder="Price (e.g. 5000)">
  <input type="file" id="gImage" accept="image/*">

  <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
    <span>Requires Size</span>

    <label style="position:relative; width:45px; height:22px;">
      <input type="checkbox" id="gRequiresSize" style="display:none;">

      <span id="toggleTrack" style="
        position:absolute;
        inset:0;
        background:#555;
        border-radius:20px;
        transition:.3s;
      "></span>

      <span id="toggleCircle" style="
        position:absolute;
        width:18px;
        height:18px;
        left:2px;
        top:2px;
        background:white;
        border-radius:50%;
        transition:.3s;
      "></span>
    </label>
  </div>

  <button onclick="addGiftProduct()">Add</button>
  <div id="gProducts"></div>
</div>

<div id="ordersPage" class="card page hidden">
  <h3>All Orders</h3>

  <select id="orderFilter" onchange="loadAllOrders()" style="margin-bottom:10px;">
    <option value="all">All</option>
    <option value="placed">Placed</option>
    <option value="processing">Processing</option>
    <option value="delivery">Delivery</option>
    <option value="delivered">Delivered</option>
    <option value="cancelled">Cancelled</option>
  </select>
  <div id="allOrders"></div>
</div>

<div id="paymentsPage" class="card page hidden">
  <h3>Wallet Payments</h3>
  <div id="payments"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Main</button>
  <button data-page="giftDashboard">Gifts</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="paymentsPage">Payments</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
  getFirestore,collection,getDocs,doc,
  updateDoc,deleteDoc,addDoc,getDoc,
  onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
/* ADMIN LOCK */
const ADMIN_EMAIL="etee77366@gmail.com".toLowerCase();

const app=initializeApp({
 apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
 authDomain:"wizard-shop-52a50.firebaseapp.com",
 projectId:"wizard-shop-52a50",
 storageBucket:"wizard-shop-52a50.appspot.com" // ✅ ADD THIS LINE
});

const db=getFirestore(app);
const auth=getAuth(app);
const storage = getStorage(app);

/* AUTH */
onAuthStateChanged(auth,user=>{
 if(!user){ location.href="auth.html"; return; }

 if((user.email||"").toLowerCase()!==ADMIN_EMAIL){
  alert("Admin only");
  signOut(auth);
  return;
 }

 document.body.style.display="block";
 init();
 document.getElementById("userSearch")?.addEventListener("input", loadUsers);
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
 btn.onclick=()=>{
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(btn.dataset.page).classList.remove("hidden");
 };
});

/* INIT */
function init(){
 loadDashboard();
 loadUsers();
 loadCategories();
 loadProducts();
 loadGiftCategories();
 loadGiftProducts();
 loadTracking();
 loadAllOrders();
 loadPayments();
}

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  const snap=await getDocs(collection(db,"users"));

  const search = (document.getElementById("userSearch")?.value || "").toLowerCase();

  const filter = document.getElementById("orderFilter")?.value || "all";

  snap.forEach(d=>{
    const u=d.data();

    if(search && !u.email?.toLowerCase().includes(search)) return;

    users.innerHTML+=`
    <div class="item">
      <div class="topRow">
        ${u.email}
        ₦${u.wallet||0}
      </div>

      <div class="actions">
        <button class="btn-fund" onclick="fund('${d.id}')">+ Fund</button>
        <button class="btn-deduct" onclick="deduct('${d.id}')">- Deduct</button>
        <button class="btn-del" onclick="delUser('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

window.fund=async(id)=>{
 let amt=prompt("Amount");
 if(!amt) return;
 let ref=doc(db,"users",id);
 let u=(await getDoc(ref)).data();
 await updateDoc(ref,{wallet:(u.wallet||0)+Number(amt)});
 loadUsers();
};

window.deduct=async(id)=>{
 let amt=prompt("Amount");
 if(!amt) return;
 let ref=doc(db,"users",id);
 let u=(await getDoc(ref)).data();
 await updateDoc(ref,{wallet:(u.wallet||0)-Number(amt)});
 loadUsers();
};

window.delUser=async(id)=>{
 if(confirm("Delete user?")){
  await deleteDoc(doc(db,"users",id));
  loadUsers();
 }
};


/* MAIN CATEGORIES */
window.addCategory=async()=>{
 if(!catName.value) return;
 await addDoc(collection(db,"categories"),{name:catName.value});
 catName.value="";
 loadCategories();
};

async function loadCategories(){
 categories.innerHTML="";
 const snap=await getDocs(collection(db,"categories"));

 snap.forEach(d=>{
  const c=d.data();

  <div class="item">
    ${c.name}
    <div class="actions">
      <button class="btn-edit" onclick="editCat('${d.id}','${c.name}')">Edit</button>
      <button class="btn-del" onclick="delCat('${d.id}')">Delete</button>
    </div>
  </div>`;
 });
}

window.editCat=async(id,name)=>{
 let n=prompt("Edit",name);

 await updateDoc(doc(db,"categories",id),{name:n});

};

window.delCat=async(id)=>{

};

/* MAIN PRODUCTS */
window.addProduct=async()=>{
 if(!pName.value||!pCategory.value||!pPrice.value) return alert("Fill all");

  category: pCategory.value,

 snap.forEach(d=>{

window.editProd=async(id,n,c,p)=>{
 let name=prompt("Name",n);

/* GIFT CATEGORIES */
window.addGiftCategory=async()=>{
 if(!gCatName.value) return;

};

/* GIFT PRODUCTS */
window.addGiftProduct = async()=>{
  try{
    if(!gName.value || !gCategory.value || !gPrice.value){
      alert("Fill all fields");
      return;
    }

    let imageUrl = "";
    const file = document.getElementById("gImage").files[0];

    // OPTIONAL IMAGE (won’t break if empty)
    if(file){
      const storageRef = ref(storage, "giftProducts/" + Date.now() + "_" + file.name);
      await uploadBytes(storageRef, file);
      imageUrl = await getDownloadURL(storageRef);
    }

    await addDoc(collection(db,"giftProducts"),{
      name: gName.value.trim(),
      category: gCategory.value.trim(),
      price: Number(gPrice.value),
      image: imageUrl,
      requiresSize: document.getElementById("gRequiresSize").checked,
      createdAt: serverTimestamp()
    });

    // RESET
    gName.value="";
    gCategory.value="";
    gPrice.value="";
    document.getElementById("gImage").value="";
    document.getElementById("gRequiresSize").checked=false;

    alert("Gift product added ✔️");

    loadGiftProducts();

  }catch(err){
    console.error(err);
    alert("Error: " + err.message);
  }
};

async function loadGiftProducts(){
 gProducts.innerHTML="";
 const snap=await getDocs(collection(db,"giftProducts"));

 snap.forEach(d=>{
  const p = {
  name:"",
  category:"",

  requiresSize:false,
  image:"",
  ...d.data()
};
  gProducts.innerHTML+=`
  <div class="item">
    ${p.image ? `<img src="${p.image}" style="width:50px;height:50px;border-radius:8px;">` : ""}
    ${p.name} ₦${p.price}
    ${p.requiresSize ? "<div class='tag'>Size</div>" : ""}
    <div class="actions">
      <button class="btn-edit" onclick="editGProd('${d.id}','${p.name}','${p.category}','${p.price}')">Edit</button>
      <button class="btn-del" onclick="delGProd('${d.id}')">Delete</button>
    </div>
  </div>`;
 });
}

window.editGProd=async(id,n,c,p)=>{
 let name=prompt("Name",n);
 let cat=prompt("Category",c);
 let price=prompt("Price",p);
 await updateDoc(doc(db,"giftProducts",id),{name,category:cat,price:Number(price)});
 loadGiftProducts();
};

window.delGProd=async(id)=>{

};

function loadAllOrders(){
  const filter = document.getElementById("orderFilter")?.value || "all";
  onSnapshot(collection(db,"giftOrders"), async snap=>{
    const list = [...snap.docs].sort((a,b)=>(b.data().createdAt||0)-(a.data().createdAt||0));

    let totalSales = 0;
    let totalOrders = list.length;
    let totalUsers = new Set();
    let totalDeposits = 0;

    allOrders.innerHTML = "";

    for(const d of list){
      const o = d.data();

      const filter = document.getElementById("orderFilter")?.value || "all";
      if(filter !== "all" && o.status !== filter) continue;
      totalSales += o.price || 0;
      totalUsers.add(o.userId);

      let userEmail = "Unknown";

      try{
        const u = await getDoc(doc(db,"users",o.userId));
        if(u.exists()) userEmail = u.data().email;
      }catch(e){}

      allOrders.innerHTML += `
      <div class="item">
        <div class="topRow">
          ${o.productName || "Gift"} - ₦${o.price || 0}
        </div>

        <div>👤 ${userEmail}</div>
        <div>📅 ${o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString() : "-"}</div>
        <div class="statusBox ${o.status || 'placed'}">
  ${o.status || 'placed'}
</div>

        ${o.image ? `<img src="${o.image}" style="width:60px;border-radius:8px;">` : ""}
      </div>`;
    }

    allOrders.innerHTML = `
      <div class="item">💰 Total Sales: ₦${totalSales}</div>
      <div class="item">📦 Total Orders: ${totalOrders}</div>
      <div class="item">👥 Total Users: ${totalUsers.size}</div>
    ` + allOrders.innerHTML;
  });
}

  alert("🚨 New Order Received!");
}
lastCount = snap.size;
  tracking.innerHTML="";

  const sorted = snap.docs.sort((a,b)=>(b.data().createdAt||0)-(a.data().createdAt||0));

  for(const d of sorted){
   const g=d.data();

   let userEmail = "Unknown";

   try{
     const userSnap = await getDoc(doc(db,"users",g.userId));
     if(userSnap.exists()){
       userEmail = userSnap.data().email || "No email";
     }
   }catch(e){}

   tracking.innerHTML+=`
   <div class="item">
     <div class="topRow">
       ${g.type || "Gift"} - ₦${g.price || 0}
      <span class="statusBox ${g.status||'placed'}">
  ${g.status||'placed'} ${!g.status || g.status==="placed" ? "🆕 NEW" : ""}
     </span>
     </div>

     <div>👤 ${userEmail}</div>

     <div>📦 Receiver: ${g.receiver?.name || "-"}</div>
     <div>📞 ${g.receiver?.phone || "-"}</div>
     <div>🏠 ${g.receiver?.house || ""} ${g.receiver?.street || ""}</div>
     <div>🌍 ${g.receiver?.city || ""}, ${g.receiver?.state || ""}, ${g.receiver?.country || ""}</div>
     ${g.receiver?.size ? `<div>📏 Size: ${g.receiver.size}</div>` : ""}

     <div class="actions">
       <button class="btn-status" onclick="updateStatus('${d.id}','placed')">Placed</button>
       <button class="btn-status" onclick="updateStatus('${d.id}','processing')">Processing</button>
       <button class="btn-status" onclick="updateStatus('${d.id}','delivery')">Delivery</button>
       <button class="btn-status" onclick="updateStatus('${d.id}','delivered')">Delivered</button>

       <button class="btn-del" onclick="deleteOrder('${d.id}')">Delete</button>
       <button class="btn-del" onclick="cancelOrder('${d.id}')">Cancel</button>

window.rejectPayment = async(id)=>{
  try{
    await updateDoc(doc(db,"transactions",id),{
      status: "rejected"
    });
  }catch(err){
    alert(err.message);
  }
};

window.updateStatus=async(id,status)=>{
 await updateDoc(doc(db,"giftOrders",id),{status});
};

/* 🔥 DELETE ORDER */
window.deleteOrder = async(id)=>{
  if(confirm("Delete this order?")){
    await deleteDoc(doc(db,"giftOrders",id));
  }
};

/* 🔥 CANCEL ORDER (LIVE FOR USER) */
window.cancelOrder = async(id)=>{
  await updateDoc(doc(db,"giftOrders",id),{
    status: "cancelled"
  });
};

window.approvePayment = async(id, uid, amount)=>{
  try{
    const userRef = doc(db,"users",uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()) return;

    const current = userSnap.data().wallet || 0;

    // add money
    await updateDoc(userRef,{
      wallet: current + Number(amount)
    });

    // update transaction
    await updateDoc(doc(db,"transactions",id),{
      status: "approved"
    });

  }catch(err){
    alert(err.message);
  }
};

const toggle = document.getElementById("gRequiresSize");
const track = document.getElementById("toggleTrack");
const circle = document.getElementById("toggleCircle");

if(toggle){
  toggle.addEventListener("change", ()=>{
    if(toggle.checked){
      track.style.background = "#1877f2";
      circle.style.transform = "translateX(22px)";
    } else {
      track.style.background = "#555";
      circle.style.transform = "translateX(0)";
    }
  });
}

async function loadDashboard(){
  const usersSnap = await getDocs(collection(db,"users"));
  cardUsers.innerText = "Users: " + usersSnap.size;

  const ordersSnap = await getDocs(collection(db,"giftOrders"));
  let sales = 0;
  ordersSnap.forEach(d=> sales += d.data().price || 0);
  cardSales.innerText = "Sales: ₦" + sales;

  const transSnap = await getDocs(collection(db,"transactions"));
  let deposits = 0;
  transSnap.forEach(d=>{
    if(d.data().status==="approved"){
      deposits += d.data().amount || 0;
    }
  });
  cardDeposits.innerText = "Deposits: ₦" + deposits;

  cardOrders.innerText = "Orders: " + ordersSnap.size;
}

logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>
