<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container { padding:15px; }

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #333;
}

.logo {
  width:40px;
  height:40px;
  border-radius:8px;
  background:#222;
  object-fit:contain;
}

.row { display:flex; gap:5px; }
.row button { flex:1; font-size:12px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button { flex:1; background:none; color:gray; }
.nav button.active { color:purple; }
</style>
</head>

<body>

<div class="header">
  <span>💎 Premium Admin</span>
  <button id="logoutBtn" style="width:auto;background:red;">Logout</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="card">
    <h3>Revenue Chart</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    Users: <span id="usersCount"></span><br>
    Products: <span id="productsCount"></span><br>
    Orders: <span id="ordersCount"></span><br>
    Revenue: ₦<span id="revenue"></span>
  </div>
</div>

<!-- USERS -->
<div id="usersPage" style="display:none">
  <div class="card">
    <input id="userSearch" placeholder="Search users...">
    <div id="users"></div>
  </div>
</div>

<!-- PRODUCTS -->
<div id="productsPage" style="display:none">
  <div class="card">

    <h3>Add Product</h3>

    <input id="name" placeholder="Product Name">
    <input id="category" placeholder="Category">
    <input id="price" type="number" placeholder="Price">
    
    <input id="domain" placeholder="Paste ANY link or domain">
    <input id="logoInput" placeholder="Custom Logo URL (optional)">
    <input id="previewLink" placeholder="Preview Link (optional)">

    <img id="logoPreview" class="logo">

    <textarea id="stockData" placeholder="email:password per line"></textarea>

    <button id="addProductBtn">Add Product</button>

    <hr>

    <input id="productSearch" placeholder="Search products...">
    <div id="products"></div>
  </div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none">
  <div class="card">
    <h3>Transactions</h3>
    <div id="orders"></div>
  </div>
</div>

</div>

<div class="nav">
<button data-page="dashboard" class="active">Dashboard</button>
<button data-page="users">Users</button>
<button data-page="products">Products</button>
<button data-page="orders">Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  updateDoc, deleteDoc, addDoc, increment,
  getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let chartInstance;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    setTimeout(()=>{
      if (!auth.currentUser) location.href="auth.html";
    },500);
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));

  if(!snap.exists() || snap.data().role !== "admin"){
    location.href="index.html";
    return;
  }

  document.body.style.display="block";
  init();
});

/* INIT */
async function init(){
  loadDashboard();
  loadUsers();
  loadProducts();
  loadOrders();
}

/* DOMAIN CLEANER */
function cleanDomain(input){
  if(!input) return "";
  try {
    const url = new URL(input);
    return url.hostname.replace("www.","");
  } catch {
    return input.replace("www.","").split("/")[0];
  }
}

/* LOGO */
function getLogo(domain, custom){
  if(custom) return custom;
  if(!domain) return "";
  return `https://logo.clearbit.com/${domain}`;
}

/* LIVE PREVIEW */
function updateLogoPreview(){
  const raw = document.getElementById("domain").value;
  const clean = cleanDomain(raw);
  const custom = document.getElementById("logoInput").value;
  document.getElementById("logoPreview").src = getLogo(clean, custom);
}

domain.oninput = updateLogoPreview;
logoInput.oninput = updateLogoPreview;

/* ADD PRODUCT */
addProductBtn.onclick = async ()=>{
  const name = nameInput.value.trim();
  const category = categoryInput.value.trim();
  const price = Number(priceInput.value);
  const rawDomain = domain.value.trim();
  const custom = logoInput.value.trim();
  const previewLink = previewLinkInput.value.trim();

  if(!name || !category || !price){
    return alert("Fill all fields");
  }

  const clean = cleanDomain(rawDomain);
  const logo = getLogo(clean, custom);

  const ref = await addDoc(collection(db,"products"),{
    name,
    category,
    price,
    domain: clean,
    logo,
    previewLink
  });

  const lines = stockData.value.split("\n");

  const items = lines
    .map(l => l.trim())
    .filter(l => l.includes(":"))
    .map(l=>{
      const [email,password]=l.split(":");
      return {
        email: email.trim(),
        password: password.trim(),
        sold:false
      };
    });

  await setDoc(doc(db,"productStock",ref.id),{items});

  alert("Product added 🚀");
  loadProducts();
};

/* DASHBOARD */
async function loadDashboard(){
  const usersSnap = await getDocs(collection(db,"users"));
  const productsSnap = await getDocs(collection(db,"products"));
  const ordersSnap = await getDocs(collection(db,"orders"));

  usersCount.innerText = usersSnap.size;
  productsCount.innerText = productsSnap.size;
  ordersCount.innerText = ordersSnap.size;

  let revenue = 0;
  let days = {};

  ordersSnap.forEach(d=>{
    const o = d.data();
    revenue += Number(o.price||0);

    if(o.createdAt){
      const date = new Date(o.createdAt);
      const key = date.toLocaleDateString();
      days[key]=(days[key]||0)+Number(o.price||0);
    }
  });

  document.getElementById("revenue").innerText = revenue;

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(chart,{
    type:"line",
    data:{
      labels:Object.keys(days),
      datasets:[{label:"Revenue",data:Object.values(days)}]
    }
  });
}

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const u=d.data();
    users.innerHTML+=`
    <div class="item">
      ${u.email}<br>₦${u.wallet||0}
    </div>`;
  });
}

/* PRODUCTS */
async function loadProducts(){
  products.innerHTML="";
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p=d.data();
    products.innerHTML+=`
    <div class="item">
      <img src="${p.logo||""}" class="logo">
      <div>${p.name}<br>₦${p.price}</div>
    </div>`;
  });
}

/* ORDERS */
async function loadOrders(){
  orders.innerHTML="";
  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{
    const o=d.data();
    orders.innerHTML+=`
    <div class="item">
      ₦${o.price}<br>${o.name}
    </div>`;
  });
}

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    ["dashboard","usersPage","productsPage","ordersPage"].forEach(id=>{
      document.getElementById(id).style.display="none";
    });

    document.getElementById(btn.dataset.page+(btn.dataset.page==="dashboard"?"":"Page")).style.display="block";
  };
});

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
