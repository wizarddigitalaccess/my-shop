<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: none;
}

.container { padding: 20px; }

.card {
  background: #1c1c2e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: purple;
  color: white;
  cursor: pointer;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #333;
}

.success {
  color: lightgreen;
  font-size: 13px;
}

.error {
  color: orange;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Admin Panel</h2>
<p>Manage products, users & payments</p>
</div>

<!-- ADD PRODUCT -->
<div class="card">
<h3>Add Product</h3>

<input id="name" placeholder="Account Name">
<input id="link" placeholder="Profile Link">
<input id="category" placeholder="Category (e.g africa, usa, netflix)">
<input id="price" type="number" placeholder="Price">

<button onclick="addProduct()">Add Product</button>

<div id="msg"></div>
</div>

<!-- TRANSACTIONS -->
<div class="card">
<h3>Pending Payments</h3>
<div id="transactions">Loading...</div>
</div>

<!-- USERS -->
<div class="card">
<h3>Users</h3>
<div id="users">Loading...</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  increment,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "etee77366@gmail.com";

// 🔐 ADMIN AUTH (STABLE)
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    window.location.href = "index.html";
    return;
  }

  document.body.style.display = "block";

  loadUsers();
  loadTransactions();
});

// ➕ ADD PRODUCT (FIXED + UPGRADED)
window.addProduct = async function () {
  const msg = document.getElementById("msg");

  const name = document.getElementById("name").value.trim();
  const link = document.getElementById("link").value.trim();
  const category = document.getElementById("category").value.trim().toLowerCase();
  const price = Number(document.getElementById("price").value);

  if (!name || !link || !category || !price) {
    msg.innerHTML = '<div class="error">Fill all fields</div>';
    return;
  }

  try {
    // ✅ ADD PRODUCT
    await addDoc(collection(db, "products"), {
      name,
      link,
      category,
      price,
      status: "available",
      createdAt: new Date()
    });

    // ✅ SAVE CATEGORY (for future dynamic UI)
    await addDoc(collection(db, "categories"), {
      name: category
    });

    msg.innerHTML = '<div class="success">Product added successfully ✔️</div>';

    // CLEAR INPUTS
    document.getElementById("name").value = "";
    document.getElementById("link").value = "";
    document.getElementById("category").value = "";
    document.getElementById("price").value = "";

  } catch (err) {
    msg.innerHTML = '<div class="error">' + err.message + '</div>';
  }
};

// 👤 LOAD USERS
async function loadUsers() {
  const div = document.getElementById("users");
  div.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        <b>${data.name || "No Name"}</b><br>
        ${data.email}<br>
        Wallet: ₦${data.wallet || 0}
      </div>
    `;
  });
}

// 💳 LOAD TRANSACTIONS
async function loadTransactions() {
  const div = document.getElementById("transactions");
  div.innerHTML = "";

  const q = query(
    collection(db, "transactions"),
    where("status", "==", "pending")
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    div.innerHTML = "No pending payments";
    return;
  }

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        ₦${data.amount}<br>
        UID: ${data.uid}<br>
        <button onclick="approve('${docItem.id}', '${data.uid}', ${data.amount})">
          Approve
        </button>
      </div>
    `;
  });
}

// ✅ APPROVE PAYMENT
window.approve = async function (txId, uid, amount) {
  await updateDoc(doc(db, "users", uid), {
    wallet: increment(amount)
  });

  await updateDoc(doc(db, "transactions", txId), {
    status: "approved"
  });

  alert("Payment approved ✔️");
  loadTransactions();
};
</script>

</body>
</html>
