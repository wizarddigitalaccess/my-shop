<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
  display:none;
}

html, body {
  height:100%;
  overflow-x:hidden;
}

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container { padding:15px; }

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  font-size:16px;
}

button {
  padding:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #333;
}

.logo {
  width:40px;
  height:40px;
  border-radius:8px;
  background:white;
  object-fit:contain;
  padding:4px;
}

.row {
  display:flex;
  gap:5px;
}

.row button {
  font-size:12px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button {
  flex:1;
  background:none;
  color:gray;
}
.nav button.active {
  color:purple;
}
</style>
</head>

<body>

<div class="header">
  <span>💎 Admin Panel</span>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="card">
    <h3>Revenue</h3>
    ₦<span id="revenue"></span>
  </div>
</div>

<!-- USERS -->
<div id="usersPage" style="display:none">
  <div class="card">
    <h3>Users</h3>
    <div id="users"></div>
  </div>
</div>

<!-- PRODUCTS -->
<div id="productsPage" style="display:none">
  <div class="card">

    <h3>Add Product</h3>

    <input id="nameInput" placeholder="Product Name">
    <input id="categoryInput" placeholder="Category">
    <input id="priceInput" type="number" placeholder="Price">

    <input id="domain" placeholder="Paste link">
    <input id="logoInput" placeholder="Custom Logo URL">

    <img id="logoPreview" class="logo">

    <textarea id="stockData" placeholder="email:password per line"></textarea>

    <button id="addProductBtn">Add Product</button>

    <hr>

    <h3>Edit Product</h3>

    <input id="editName">
    <input id="editCategory">
    <input id="editPrice" type="number">
    <input id="editLogo">

    <button id="saveEditBtn">Save Changes</button>

    <hr>

    <div id="products"></div>
  </div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none">
  <div class="card">
    <h3>Orders</h3>
    <div id="orders"></div>
  </div>
</div>

</div>

<div class="nav">
<button data-page="dashboard" class="active">Dashboard</button>
<button data-page="users">Users</button>
<button data-page="products">Products</button>
<button data-page="orders">Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, setDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let editingId = null;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.href="auth.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));

  if(!snap.exists() || snap.data().role !== "admin"){
    location.href="index.html";
    return;
  }

  document.body.style.display="block";
  init();
});

/* INIT */
function init(){
  loadDashboard();
  loadUsers();
  loadProducts();
  loadOrders();
}

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const u = d.data();

    const div = document.createElement("div");
    div.className="item";

    div.innerHTML = `
      <div>
        ${u.email}<br>₦${u.wallet||0}
      </div>
    `;

    const row = document.createElement("div");
    row.className="row";

    const add = document.createElement("button");
    add.textContent="+";
    add.onclick=async()=>{
      const amt = Number(prompt("Amount"));
      if(!amt) return;
      await updateDoc(doc(db,"users",d.id),{wallet:(u.wallet||0)+amt});
      loadUsers();
    };

    const sub = document.createElement("button");
    sub.textContent="-";
    sub.onclick=async()=>{
      const amt = Number(prompt("Amount"));
      if(!amt) return;
      await updateDoc(doc(db,"users",d.id),{wallet:(u.wallet||0)-amt});
      loadUsers();
    };

    const del = document.createElement("button");
    del.textContent="X";
    del.onclick=async()=>{
      if(confirm("Delete user?")){
        await deleteDoc(doc(db,"users",d.id));
        loadUsers();
      }
    };

    row.append(add,sub,del);
    div.appendChild(row);
    users.appendChild(div);
  });
}

/* LOGO */
function getLogo(domain, custom){
  if(custom) return custom;
  if(!domain) return "";
  return `https://logo.clearbit.com/${domain}`;
}

function cleanDomain(input){
  try {
    return new URL(input).hostname.replace("www.","");
  } catch {
    return input.split("/")[0];
  }
}

/* ADD PRODUCT */
addProductBtn.onclick = async ()=>{
  const name = nameInput.value.trim();
  const category = categoryInput.value.trim();
  const price = Number(priceInput.value);

  if(!name || !category || !price) return alert("Fill all");

  const logo = getLogo(cleanDomain(domain.value), logoInput.value);

  const ref = await addDoc(collection(db,"products"),{
    name, category, price, logo
  });

  const items = stockData.value.split("\n")
    .filter(l=>l.includes(":"))
    .map(l=>{
      const [email,password]=l.split(":");
      return {email:email.trim(),password:password.trim(),sold:false};
    });

  await setDoc(doc(db,"productStock",ref.id),{items});

  alert("Added");
  loadProducts();
};

/* LOAD PRODUCTS */
async function loadProducts(){
  products.innerHTML="";
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p=d.data();

    const div = document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <img src="${p.logo||""}" class="logo">
      <div>${p.name}<br>₦${p.price}</div>
    `;

    const row = document.createElement("div");
    row.className="row";

    const edit = document.createElement("button");
    edit.textContent="Edit";
    edit.onclick=()=>{
      editingId = d.id;
      editName.value = p.name;
      editCategory.value = p.category;
      editPrice.value = p.price;
      editLogo.value = p.logo;
    };

    const del = document.createElement("button");
    del.textContent="Delete";
    del.onclick=async()=>{
      if(confirm("Delete product?")){
        await deleteDoc(doc(db,"products",d.id));
        loadProducts();
      }
    };

    row.append(edit,del);
    div.appendChild(row);

    products.appendChild(div);
  });
}

/* SAVE EDIT */
saveEditBtn.onclick = async ()=>{
  if(!editingId) return alert("Select product");

  await updateDoc(doc(db,"products",editingId),{
    name: editName.value,
    category: editCategory.value,
    price: Number(editPrice.value),
    logo: editLogo.value
  });

  alert("Updated");
  loadProducts();
};

/* DASHBOARD */
async function loadDashboard(){
  const snap = await getDocs(collection(db,"orders"));
  let total=0;
  snap.forEach(d=> total+=Number(d.data().price||0));
  revenue.innerText=total;
}

/* ORDERS */
async function loadOrders(){
  orders.innerHTML="";
  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{
    const o=d.data();
    orders.innerHTML+=`
      <div class="item">₦${o.price} - ${o.name}</div>
    `;
  });
}

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    ["dashboard","usersPage","productsPage","ordersPage"].forEach(id=>{
      document.getElementById(id).style.display="none";
    });

    document.getElementById(btn.dataset.page+(btn.dataset.page==="dashboard"?"":"Page")).style.display="block";
  };
});

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
