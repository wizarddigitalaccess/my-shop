<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.container { padding:15px; }

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.item {
  padding:10px;
  border-bottom:1px solid #333;
}

.row { display:flex; gap:5px; }
.row button { flex:1; font-size:12px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button { flex:1; background:none; color:gray; }
.nav button.active { color:purple; }
</style>
</head>

<body>

<div class="header">
  <span>Admin Dashboard</span>
  <button onclick="logout()" style="width:auto;background:red;">Logout</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="card">
<h3>Revenue Chart</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
Users: <span id="usersCount"></span><br>
Products: <span id="productsCount"></span><br>
Orders: <span id="ordersCount"></span><br>
Revenue: ₦<span id="revenue"></span>
</div>
</div>

<!-- USERS -->
<div id="usersPage" style="display:none">
<div class="card">
<input id="userSearch" placeholder="Search users..." oninput="loadUsers()">
<div id="users"></div>
</div>
</div>

<!-- PRODUCTS -->
<div id="productsPage" style="display:none">
<div class="card">

<input id="productSearch" placeholder="Search products..." oninput="loadProducts()">

<input id="name" placeholder="Product Name">
<input id="category" placeholder="Category">
<input id="price" type="number" placeholder="Price">

<input id="emailLogin" placeholder="Account Email (secret)">
<input id="passwordLogin" placeholder="Account Password (secret)">

<button onclick="addProduct()">Add Product</button>

<div id="products"></div>
</div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none">
<div class="card">
<h3>Orders</h3>
<div id="orders"></div>
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="showPage('dashboard')" class="active" id="b1">Dashboard</button>
<button onclick="showPage('users')" id="b2">Users</button>
<button onclick="showPage('products')" id="b3">Products</button>
<button onclick="showPage('orders')" id="b4">Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore, collection, getDocs, doc,
  updateDoc, deleteDoc, addDoc, increment,
  getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let chartInstance;

// 🔐 ADMIN CHECK
onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.href="auth.html";

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists() || snap.data().role !== "admin"){
    return location.href="index.html";
  }

  document.body.style.display="block";

  loadDashboard();
  loadUsers();
  loadProducts();
  loadOrders();
});

// 📊 DASHBOARD
async function loadDashboard(){
  const users = await getDocs(collection(db,"users"));
  const products = await getDocs(collection(db,"products"));
  const orders = await getDocs(collection(db,"orders"));

  usersCount.innerText = users.size;
  productsCount.innerText = products.size;
  ordersCount.innerText = orders.size;

  let revenue = 0;
  let days = {};

  orders.forEach(d=>{
    const data = d.data();
    revenue += data.price;

    let date = new Date(data.createdAt.seconds * 1000).toLocaleDateString();
    days[date] = (days[date]||0)+data.price;
  });

  document.getElementById("revenue").innerText = revenue;

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(chart,{
    type:"line",
    data:{
      labels:Object.keys(days),
      datasets:[{label:"Revenue",data:Object.values(days)}]
    }
  });
}

// 👤 USERS
window.loadUsers = async ()=>{
  const search = userSearch.value.toLowerCase();
  users.innerHTML="";

  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const u=d.data();
    if(!(u.email||"").toLowerCase().includes(search)) return;

    users.innerHTML+=`
    <div class="item">
      ${u.name}<br>${u.email}<br>₦${u.wallet||0}

      <div class="row">
        <button onclick="fund('${d.id}')">Fund</button>
        <button onclick="deleteUser('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
};

window.fund = async(uid)=>{
  const amount = Number(prompt("Amount"));
  if(!amount) return;
  await updateDoc(doc(db,"users",uid),{wallet:increment(amount)});
  loadUsers();
};

window.deleteUser = async(uid)=>{
  if(confirm("Delete user?")){
    await deleteDoc(doc(db,"users",uid));
    loadUsers();
  }
};

// 📦 PRODUCTS
window.loadProducts = async ()=>{
  const search = productSearch.value.toLowerCase();
  products.innerHTML="";

  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p=d.data();
    if(!p.name.toLowerCase().includes(search)) return;

    products.innerHTML+=`
    <div class="item">
      ${p.name} (${p.category}) - ₦${p.price} [${p.status}]

      <div class="row">
        <button onclick="deleteProduct('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
};

// ➕ ADD PRODUCT
window.addProduct = async ()=>{
  const nameV = name.value.trim();
  const categoryV = category.value.trim().toLowerCase();
  const priceV = Number(price.value);
  const emailV = emailLogin.value.trim();
  const passV = passwordLogin.value.trim();

  if(!nameV||!categoryV||!priceV||!emailV||!passV){
    return alert("Fill all fields");
  }

  const ref = await addDoc(collection(db,"products"),{
    name:nameV,
    category:categoryV,
    price:priceV,
    status:"available"
  });

  await setDoc(doc(db,"productSecrets",ref.id),{
    email:emailV,
    password:passV
  });

  alert("Product added ✅");

  name.value="";
  category.value="";
  price.value="";
  emailLogin.value="";
  passwordLogin.value="";

  loadProducts();
};

// DELETE
window.deleteProduct = async(id)=>{
  if(confirm("Delete product?")){
    await deleteDoc(doc(db,"products",id));
    await deleteDoc(doc(db,"productSecrets",id));
    loadProducts();
  }
};

// 📦 ORDERS
async function loadOrders(){
  orders.innerHTML="";

  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{
    const o=d.data();

    orders.innerHTML+=`
    <div class="item">
      ${o.name}<br>
      ₦${o.price}<br>
      User: ${o.userId}
    </div>`;
  });
}

// 🚪 LOGOUT
window.logout=()=> signOut(auth).then(()=>location.href="auth.html");

// NAV
window.showPage=(p)=>{
  dashboard.style.display="none";
  usersPage.style.display="none";
  productsPage.style.display="none";
  ordersPage.style.display="none";

  b1.classList.remove("active");
  b2.classList.remove("active");
  b3.classList.remove("active");
  b4.classList.remove("active");

  if(p==="dashboard"){dashboard.style.display="block";b1.classList.add("active");}
  if(p==="users"){usersPage.style.display="block";b2.classList.add("active");}
  if(p==="products"){productsPage.style.display="block";b3.classList.add("active");}
  if(p==="orders"){ordersPage.style.display="block";b4.classList.add("active");}
};
</script>

</body>
</html>
