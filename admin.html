<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* BUTTONS */
.btn-edit{background:#1877f2;color:white;}
.btn-del{background:#e74c3c;color:white;}
.btn-fund{background:#2ecc71;color:white;}
.btn-deduct{background:#f39c12;color:white;}
.btn-status{background:#9b59b6;color:white;}

.item {
  display:flex;
  flex-direction:column;
  gap:6px;
  border-bottom:1px solid #333;
  padding:10px;
}

.topRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.actions {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav button {
  flex:1;
  padding:10px;
  background:#1c1c2e;
  color:gray;
}

.nav button.active {
  background:#1877f2;
  color:white;
}

/* STATUS */
.statusBox{
  padding:6px;
  border-radius:6px;
  font-size:12px;
}

.placed{background:#665c00;}
.processing{background:#5a2d82;}
.delivery{background:#003366;}
.delivered{background:#003300;}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">
  <h3>Tracking (Live)</h3>
  <div id="tracking"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- MAIN -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName"><button onclick="addCategory()">Add</button>
  <div id="categories"></div>

  <h3>Main Products</h3>
  <input id="pName" placeholder="Product Name (e.g Facebook Account)">
  <input id="pCategory" placeholder="Category (must match exactly)">
  <input id="pPrice" placeholder="Price (e.g 5000)">
  <input id="pDetails" placeholder="Details (e.g Email:..., Password:...)">
  <button onclick="addProduct()">Add</button>
  <div id="products"></div>
</div>

<!-- GIFTS -->
<div id="giftDashboard" class="card page hidden">
  <h3>Gift Categories</h3>
  <input id="gCatName"><button onclick="addGiftCategory()">Add</button>
  <div id="gCategories"></div>

  <h3>Gift Products</h3>
  <input id="gName" placeholder="Product Name">
  <input id="gCategory" placeholder="Category (must match exactly)">
  <input id="gPrice" placeholder="Price (e.g. 5000)">

  <input id="gImage" placeholder="Image URL (paste link)">
  <label style="display:flex;gap:8px;margin-top:8px;">
  <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
  <span>Requires Size</span>
  <label style="position:relative; display:inline-block; width:40px; height:20px;">
    <input type="checkbox" id="gRequiresSize" style="opacity:0; width:0; height:0;">
    <span style="
      position:absolute;
      cursor:pointer;
      top:0; left:0; right:0; bottom:0;
      background:#555;
      border-radius:20px;
      transition:.3s;
    "></span>
    <span style="
      position:absolute;
      height:16px;
      width:16px;
      left:2px;
      bottom:2px;
      background:white;
      border-radius:50%;
      transition:.3s;
    " id="toggleCircle"></span>
  </label>
</div>
  Requires Size
</label>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Main</button>
  <button data-page="giftDashboard">Gifts</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { 
  getFirestore,collection,getDocs,doc,
  updateDoc,deleteDoc,addDoc,getDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ADMIN LOCK */
const ADMIN_EMAIL="etee77366@gmail.com".toLowerCase();

const app=initializeApp({
 apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
 authDomain:"wizard-shop-52a50.firebaseapp.com",
 projectId:"wizard-shop-52a50"
});

const db=getFirestore(app);
const auth=getAuth(app);

/* AUTH */
onAuthStateChanged(auth,user=>{
 if(!user){ location.href="auth.html"; return; }

 if((user.email||"").toLowerCase()!==ADMIN_EMAIL){
  alert("Admin only");
  signOut(auth);
  return;
 }

 document.body.style.display="block";
 init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
 btn.onclick=()=>{
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
  document.getElementById(btn.dataset.page).classList.remove("hidden");
 };
});

/* INIT */
function init(){
 loadUsers();
 loadCategories();
 loadProducts();
 loadGiftCategories();
 loadGiftProducts();
 loadTracking();
}

/* USERS */
async function loadUsers(){
 users.innerHTML="";
 const snap=await getDocs(collection(db,"users"));

 snap.forEach(d=>{
  const u=d.data();
  users.innerHTML+=`
  <div class="item">
   <div class="topRow">
    ${u.email}
    ₦${u.wallet||0}
   </div>

   <div class="actions">
    <button class="btn-fund" onclick="fund('${d.id}')">+ Fund</button>
    <button class="btn-deduct" onclick="deduct('${d.id}')">- Deduct</button>
    <button class="btn-del" onclick="delUser('${d.id}')">Delete</button>
   </div>
  </div>`;
 });
}

window.fund=async(id)=>{
 let amt=prompt("Amount");
 if(!amt) return;
 let ref=doc(db,"users",id);
 let u=(await getDoc(ref)).data();
 await updateDoc(ref,{wallet:(u.wallet||0)+Number(amt)});
 loadUsers();
};

window.deduct=async(id)=>{
 let amt=prompt("Amount");
 if(!amt) return;
 let ref=doc(db,"users",id);
 let u=(await getDoc(ref)).data();
 await updateDoc(ref,{wallet:(u.wallet||0)-Number(amt)});
 loadUsers();
};

window.delUser=async(id)=>{
 if(confirm("Delete user?")){
  await deleteDoc(doc(db,"users",id));
  loadUsers();
 }
};

/* MAIN CATEGORIES */
window.addCategory=async()=>{
 if(!catName.value) return;
 await addDoc(collection(db,"categories"),{name:catName.value});
 catName.value="";
 loadCategories();
};

async function loadCategories(){
 categories.innerHTML="";
 const snap=await getDocs(collection(db,"categories"));

 snap.forEach(d=>{
  const c=d.data();
  categories.innerHTML+=`
  <div class="item">
    ${c.name}
    <div class="actions">
      <button class="btn-edit" onclick="editCat('${d.id}','${c.name}')">Edit</button>
      <button class="btn-del" onclick="delCat('${d.id}')">Delete</button>
    </div>
  </div>`;
 });
}

window.editCat=async(id,name)=>{
 let n=prompt("Edit",name);
 if(!n) return;
 await updateDoc(doc(db,"categories",id),{name:n});
 loadCategories();
};

window.delCat=async(id)=>{
 await deleteDoc(doc(db,"categories",id));
 loadCategories();
};

/* MAIN PRODUCTS */
window.addProduct=async()=>{
 if(!pName.value||!pCategory.value||!pPrice.value) return alert("Fill all");

 await addDoc(collection(db,"products"),{
  name: pName.value,
  category: pCategory.value,
  price: Number(pPrice.value),
  details: pDetails?.value || ""
 });

 loadProducts();
};

async function loadProducts(){
 products.innerHTML="";
 const snap=await getDocs(collection(db,"products"));

 snap.forEach(d=>{
  const p=d.data();
  products.innerHTML+=`
  <div class="item">
    ${p.name} ₦${p.price}
    <div style="font-size:12px;color:gray;">${p.details || ""}</div>
    <div class="actions">
      <button class="btn-edit" onclick="editProd('${d.id}','${p.name}','${p.category}','${p.price}')">Edit</button>
      <button class="btn-del" onclick="delProd('${d.id}')">Delete</button>
    </div>
  </div>`;
 });
}

window.editProd=async(id,n,c,p)=>{
 let name=prompt("Name",n);
 let cat=prompt("Category",c);
 let price=prompt("Price",p);
 await updateDoc(doc(db,"products",id),{name,category:cat,price:Number(price)});
 loadProducts();
};

window.delProd=async(id)=>{
 await deleteDoc(doc(db,"products",id));
 loadProducts();
};

/* GIFT CATEGORIES */
window.addGiftCategory=async()=>{
 if(!gCatName.value) return;
 await addDoc(collection(db,"giftCategories"),{name:gCatName.value});
 loadGiftCategories();
};

async function loadGiftCategories(){
 gCategories.innerHTML="";
 const snap=await getDocs(collection(db,"giftCategories"));

 snap.forEach(d=>{
  const c=d.data();
  gCategories.innerHTML+=`
  <div class="item">
    ${c.name}
    <div class="actions">
      <button class="btn-edit" onclick="editGCat('${d.id}','${c.name}')">Edit</button>
      <button class="btn-del" onclick="delGCat('${d.id}')">Delete</button>
    </div>
  </div>`;
 });
}

window.editGCat=async(id,n)=>{
 let name=prompt("Edit",n);
 await updateDoc(doc(db,"giftCategories",id),{name});
 loadGiftCategories();
};

window.delGCat=async(id)=>{
 await deleteDoc(doc(db,"giftCategories",id));
 loadGiftCategories();
};

/* GIFT PRODUCTS */
window.addGiftProduct = async()=>{
 if(!gName.value || !gCategory.value || !gPrice.value) return;

 await addDoc(collection(db,"giftProducts"),{
  name: gName.value,
  category: gCategory.value,
  price: Number(gPrice.value),
  image: gImage.value || "",
  requiresSize: gSizeToggle.checked
 });

 gName.value="";
 gCategory.value="";
 gPrice.value="";
 gImage.value="";
 gSizeToggle.checked=false;

 loadGiftProducts();
};

async function loadGiftProducts(){
 gProducts.innerHTML="";
 const snap=await getDocs(collection(db,"giftProducts"));

 snap.forEach(d=>{
  const p = { requiresSize:false, ...d.data() };
  gProducts.innerHTML+=`
  <div class="item">
    <img src="${p.image || 'fallback.png'}" style="width:40px;height:40px;border-radius:6px;">
    ${p.name} ₦${p.price}
    ${p.requiresSize ? "<div class='tag'>Size</div>" : ""}
    <div class="actions">
      <button class="btn-edit" onclick="editGProd('${d.id}','${p.name}','${p.category}','${p.price}')">Edit</button>
      <button class="btn-del" onclick="delGProd('${d.id}')">Delete</button>
    </div>
  </div>`;
 });
}

window.editGProd=async(id,n,c,p)=>{
 let name=prompt("Name",n);
 let cat=prompt("Category",c);
 let price=prompt("Price",p);
 await updateDoc(doc(db,"giftProducts",id),{name,category:cat,price:Number(price)});
 loadGiftProducts();
};

window.delGProd=async(id)=>{
 await deleteDoc(doc(db,"giftProducts",id));
 loadGiftProducts();
};

/* LIVE TRACKING */
function loadTracking(){
 onSnapshot(collection(db,"giftOrders"),async snap=>{
  tracking.innerHTML="";

  const sorted = snap.docs.sort((a,b)=>(b.data().createdAt||0)-(a.data().createdAt||0));

  for(const d of sorted){
   const g=d.data();

   let userEmail = "Unknown";

   try{
     const userSnap = await getDoc(doc(db,"users",g.userId));
     if(userSnap.exists()){
       userEmail = userSnap.data().email || "No email";
     }
   }catch(e){}

   tracking.innerHTML+=`
   <div class="item">
     <div class="topRow">
       ${g.type || "Gift"} - ₦${g.price || 0}
      <span class="statusBox ${g.status||'placed'}">
  ${g.status||'placed'} ${!g.status || g.status==="placed" ? "🆕 NEW" : ""}
     </span>
     </div>

     <div>👤 ${userEmail}</div>
     <div>🧾 Sender: ${g.senders?.name || "-"}</div>

     <div>📦 Receiver: ${g.receiver?.name || "-"}</div>
     <div>📞 ${g.receiver?.phone || "-"}</div>
     <div>🏠 ${g.receiver?.house || ""} ${g.receiver?.street || ""}</div>
     <div>🌍 ${g.receiver?.city || ""}, ${g.receiver?.state || ""}, ${g.receiver?.country || ""}</div>
     ${g.receiver?.size ? `<div>📏 Size: ${g.receiver.size}</div>` : ""}

     <div class="actions">
       <button class="btn-status" onclick="updateStatus('${d.id}','placed')">Placed</button>
       <button class="btn-status" onclick="updateStatus('${d.id}','processing')">Processing</button>
       <button class="btn-status" onclick="updateStatus('${d.id}','delivery')">Delivery</button>
       <button class="btn-status" onclick="updateStatus('${d.id}','delivered')">Delivered</button>

       <button class="btn-del" onclick="deleteOrder('${d.id}')">Delete</button>
       <button class="btn-del" onclick="cancelOrder('${d.id}')">Cancel</button>
     </div>
   </div>`;
  }
 });
}

window.updateStatus=async(id,status)=>{
 await updateDoc(doc(db,"giftOrders",id),{status});
};

/* 🔥 DELETE ORDER */
window.deleteOrder = async(id)=>{
  if(confirm("Delete this order?")){
    await deleteDoc(doc(db,"giftOrders",id));
  }
};

/* 🔥 CANCEL ORDER (LIVE FOR USER) */
window.cancelOrder = async(id)=>{
  await updateDoc(doc(db,"giftOrders",id),{
    status: "cancelled"
  });
};

logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
