<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }
.header { padding:15px; background:#1c1c2e; display:flex; justify-content:space-between; }
.card { background:#1c1c2e; padding:15px; border-radius:12px; margin:15px; }
.hidden { display:none; }

input { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; background:#111; color:white; }

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

/* 🔥 CLEAR BUTTON TYPES */
.btn-edit { background:#ffaa00; }
.btn-delete { background:#ff3b3b; }
.btn-status { background:#00c853; }

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
}

.actions {
  display:flex;
  gap:8px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button { flex:1; background:none; color:gray; font-size:12px; }
.nav button.active { color:#1877f2; }

img { width:40px; height:40px; object-fit:cover; border-radius:6px; }

.toggle {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<div id="home" class="card page">
  <h3>Dashboard</h3>
  <div id="analytics"></div>
</div>

<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName" placeholder="Category name">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>
</div>

<div id="ordersPage" class="card page hidden">
  <h3>Main Orders</h3>
  <div id="orders"></div>
</div>

<div id="giftDashboard" class="card page hidden">
  <h3>Gift Categories</h3>

  <input id="gCatName" placeholder="Category name">
  <div class="toggle">
    <label>Require Size</label>
    <input type="checkbox" id="gRequireSize">
  </div>

  <button onclick="addGiftCategory()">Add</button>
  <div id="gCategories"></div>

  <hr>

  <h3>Gift Products</h3>
  <input id="gName" placeholder="Product name">
  <input id="gCategory" placeholder="Category">
  <input id="gPrice" type="number" placeholder="Price">

  <div class="toggle">
    <label>Require Size</label>
    <input type="checkbox" id="gProductSize">
  </div>

  <input type="file" id="gImageFile">
  <button onclick="addGiftProduct()">Add</button>
  <div id="gProducts"></div>
</div>

<div id="giftOrdersPage" class="card page hidden">
  <h3>Gift Orders</h3>
  <div id="giftOrders"></div>
</div>

<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Categories</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="giftDashboard">Gifts</button>
  <button data-page="giftOrdersPage">Gift Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists() || snap.data().role !== "admin"){
    return location.href="index.html";
  }

  document.body.style.display="block";
  init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadAnalytics();
  loadUsers();
  loadCategories();
  loadOrders();
  loadGiftCategories();
  loadGiftProducts();
  loadGiftOrders();
}

/* ANALYTICS */
async function loadAnalytics(){
  let total=0;
  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    total+=Number(d.data().price||0);
  });
  analytics.innerHTML = "Revenue ₦"+total;
}

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  (await getDocs(collection(db,"users"))).forEach(d=>{
    const u=d.data();
    users.innerHTML+=`
      <div class="item">
        ${u.email} ₦${u.balance||0}
        <div class="actions">
          <button onclick="fundUser('${d.id}')">+₦</button>
          <button onclick="deductUser('${d.id}')">-₦</button>
          <button class="btn-delete" onclick="deleteUser('${d.id}')">Delete</button>
        </div>
      </div>`;
  });
}

window.fundUser=async(id)=>{
  const amt=Number(prompt("Amount"));
  if(!amt) return;
  const refDoc = doc(db,"users",id);
  const snap = await getDoc(refDoc);
  await updateDoc(refDoc,{balance:(snap.data().balance||0)+amt});
  loadUsers();
};

window.deductUser=async(id)=>{
  const amt=Number(prompt("Amount"));
  if(!amt) return;
  const refDoc = doc(db,"users",id);
  const snap = await getDoc(refDoc);
  await updateDoc(refDoc,{balance:(snap.data().balance||0)-amt});
  loadUsers();
};

window.deleteUser=async(id)=>{
  if(!confirm("Delete user?")) return;
  await deleteDoc(doc(db,"users",id));
  loadUsers();
};

/* 🔥 FIXED PRODUCT ADD */
async function uploadImage(file){
  if(!file) throw new Error("No image selected");
  const r=ref(storage,"gifts/"+Date.now());
  await uploadBytes(r,file);
  return await getDownloadURL(r);
}

window.addGiftProduct=async()=>{
  try{
    if(!gName.value || !gCategory.value || !gPrice.value){
      return alert("Fill all fields");
    }

    const img=await uploadImage(gImageFile.files[0]);

    await addDoc(collection(db,"giftProducts"),{
      name:gName.value,
      category:gCategory.value,
      price:Number(gPrice.value),
      image:img,
      requiresSize:gProductSize.checked
    });

    alert("Product added");
    loadGiftProducts();

  }catch(err){
    console.error(err);
    alert("Failed to add product");
  }
};

/* 🔥 TRACKING SYSTEM */
async function loadGiftOrders(){
  giftOrders.innerHTML="";
  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    const o=d.data();
    giftOrders.innerHTML+=`
      <div class="item">
        <div>
          ${o.userEmail}<br>
          ${o.receiver?.name}<br>
          ₦${o.price}<br>
          <b>Status: ${o.status}</b>
        </div>

        <div class="actions">
          <button class="btn-status" onclick="updateGiftOrder('${d.id}','processing')">Processing</button>
          <button class="btn-status" onclick="updateGiftOrder('${d.id}','on the way')">On Way</button>
          <button class="btn-status" onclick="updateGiftOrder('${d.id}','delivered')">Done</button>
          <button class="btn-delete" onclick="deleteGiftOrder('${d.id}')">Delete</button>
        </div>
      </div>`;
  });
}

window.updateGiftOrder=async(id,status)=>{
  await updateDoc(doc(db,"giftOrders",id),{status});
  loadGiftOrders();
};

window.deleteGiftOrder=async(id)=>{
  if(!confirm("Delete order?")) return;
  await deleteDoc(doc(db,"giftOrders",id));
  loadGiftOrders();
};

logoutBtn.onclick=()=>signOut(auth);
</script>

</body>
</html>
