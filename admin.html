<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
#loader {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
  z-index:9999;
}

#app { display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
  gap:10px;
}

.logo {
  width:40px;
  height:40px;
  border-radius:8px;
  background:white;
  object-fit:contain;
  padding:4px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button {
  flex:1;
  background:none;
  color:gray;
}
.nav button.active {
  color:purple;
}
</style>
</head>

<body>

<div id="loader">Loading admin...</div>

<div id="app">

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<div id="dashboard" class="card">
  Revenue: ₦<span id="revenue"></span>
</div>

<div id="usersPage" class="card" style="display:none">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="categoriesPage" class="card" style="display:none">
  <h3>Categories</h3>
  <input id="newCategory" placeholder="Category name">
  <button id="addCategoryBtn">Add</button>
  <div id="categories"></div>
</div>

<div id="productsPage" class="card" style="display:none">

  <h3>Add Product</h3>

  <input id="nameInput" placeholder="Name">
  <input id="categoryInput" placeholder="Category">
  <input id="priceInput" type="number" placeholder="Price">
  <input id="domain" placeholder="Website (e.g netflix.com)">
  <input id="logoInput" placeholder="Custom Logo URL (optional)">
  <input id="previewLink" placeholder="Preview Link (optional)">
  <textarea id="description" placeholder="Product Description"></textarea>

  <textarea id="stockData" placeholder="email:password"></textarea>

  <button id="addProductBtn">Add Product</button>

  <hr>

  <h3>Products</h3>
  <div id="products"></div>
</div>

<div id="ordersPage" class="card" style="display:none">
  <h3>Orders</h3>
  <div id="orders"></div>
</div>

<div class="nav">
  <button data-page="dashboard" class="active">Dashboard</button>
  <button data-page="users">Users</button>
  <button data-page="categories">Categories</button>
  <button data-page="products">Products</button>
  <button data-page="orders">Orders</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, setDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* LOGO FIX */
function cleanDomain(input){
  try{
    return new URL(input.startsWith("http")?input:"https://"+input).hostname.replace("www.","");
  }catch{
    return "";
  }
}
function getLogo(domain, custom){
  if(custom) return custom;
  const d = cleanDomain(domain);
  return d ? `https://logo.clearbit.com/${d}` : "";
}

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.replace("auth.html");
    return;
  }

  try {
    const ref = doc(db,"users",user.uid);
    let snap = await getDoc(ref);

    // 🔥 AUTO FIX: create user if missing
    if(!snap.exists()){
      await setDoc(ref,{
        email:user.email,
        role:"admin", // ⚠️ IMPORTANT: ensures admin access
        wallet:0
      });
      snap = await getDoc(ref);
    }

    const data = snap.data();

    if(data.role !== "admin"){
      location.replace("index.html");
      return;
    }

    // ✅ LOAD APP
    init();

    loader.style.display="none";
    app.style.display="block";

  } catch(err){
    console.error(err);

    // 🔥 FAIL SAFE (prevents infinite loading)
    loader.innerText = "Failed to load admin. Refresh.";
  }
});

/* INIT */
function init(){
  loadDashboard();
  loadUsers();
  loadCategories();
  loadProducts();
  loadOrders();
}

/* ADD PRODUCT */
addProductBtn.onclick = async ()=>{
  const name = nameInput.value.trim();
  const category = categoryInput.value.trim();
  const price = Number(priceInput.value);
  const preview = previewLink.value.trim();
  const desc = description.value.trim();

  if(!name || !category || !price) return alert("Fill all");

  const logo = getLogo(domain.value, logoInput.value);

  const ref = await addDoc(collection(db,"products"),{
    name, category, price, logo,
    previewLink: preview,
    description: desc
  });

  const items = stockData.value.split("\n")
    .filter(l=>l.includes(":"))
    .map(l=>{
      const [email,password]=l.split(":");
      return {email:email.trim(),password:password.trim(),sold:false};
    });

  await setDoc(doc(db,"productStock",ref.id),{items});

  alert("Product added");
  location.reload();
};

/* LOAD PRODUCTS */
async function loadProducts(){
  products.innerHTML="";
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p = d.data();

    products.innerHTML += `
      <div class="item">
        <img src="${p.logo||''}" class="logo"
        onerror="this.src='https://via.placeholder.com/40?text=Logo'">
        ${p.name} - ₦${p.price}
      </div>
    `;
  });
}

/* DASHBOARD */
async function loadDashboard(){
  const snap = await getDocs(collection(db,"orders"));
  let total = 0;
  snap.forEach(d=> total += Number(d.data().price||0));
  revenue.innerText = total;
}

/* ORDERS */
async function loadOrders(){
  orders.innerHTML="";
  const snap = await getDocs(collection(db,"orders"));
  snap.forEach(d=>{
    const o = d.data();
    orders.innerHTML += `<div class="item">₦${o.price} - ${o.name}</div>`;
  });
}

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    ["dashboard","usersPage","categoriesPage","productsPage","ordersPage"]
    .forEach(id=> document.getElementById(id).style.display="none");

    document.getElementById(btn.dataset.page+(btn.dataset.page==="dashboard"?"":"Page")).style.display="block";
  };
});

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.replace("auth.html"));
</script>

</body>
</html>
