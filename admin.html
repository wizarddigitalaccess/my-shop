<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Premium Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
  display:none;
}

/* 🔥 FIX ZOOM / APP FEEL */
html, body {
  height:100%;
  overflow-x:hidden;
}

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.container { padding:15px; }

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  font-size:16px;
}

/* 🔥 STOP MOBILE ZOOM ON INPUT */
input, textarea, select {
  font-size:16px;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:purple;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #333;
}

.logo {
  width:40px;
  height:40px;
  border-radius:8px;
  background:#222;
  object-fit:contain;
}

.row { display:flex; gap:5px; }
.row button { flex:1; font-size:12px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button { flex:1; background:none; color:gray; }
.nav button.active { color:purple; }
</style>
</head>

<body>

<div class="header">
  <span>💎 Premium Admin</span>
  <button id="logoutBtn" style="width:auto;background:red;">Logout</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="card">
    <h3>Revenue Chart</h3>
    <canvas id="chart"></canvas>
  </div>

  <div class="card">
    Users: <span id="usersCount"></span><br>
    Products: <span id="productsCount"></span><br>
    Orders: <span id="ordersCount"></span><br>
    Revenue: ₦<span id="revenue"></span>
  </div>
</div>

<!-- PRODUCTS -->
<div id="productsPage" style="display:none">
  <div class="card">

    <h3>Add Product</h3>

    <input id="nameInput" placeholder="Product Name">
    <input id="categoryInput" placeholder="Category">
    <input id="priceInput" type="number" placeholder="Price">

    <input id="domain" placeholder="Paste ANY link (facebook / instagram)">
    <input id="logoInput" placeholder="Custom Logo URL (optional)">
    <input id="previewLinkInput" placeholder="Preview Link (optional)">

    <img id="logoPreview" class="logo">

    <textarea id="stockData" placeholder="email:password per line"></textarea>

    <button id="addProductBtn">Add Product</button>

    <hr>

    <div id="products"></div>
  </div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none">
  <div class="card">
    <h3>Transactions</h3>
    <div id="orders"></div>
  </div>
</div>

</div>

<div class="nav">
<button data-page="dashboard" class="active">Dashboard</button>
<button data-page="products">Products</button>
<button data-page="orders">Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let chartInstance;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.href="auth.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));

  if(!snap.exists() || snap.data().role !== "admin"){
    location.href="index.html";
    return;
  }

  document.body.style.display="block";
  init();
});

/* INIT */
function init(){
  loadDashboard();
  loadProducts();
  loadOrders();
}

/* DOMAIN CLEAN */
function cleanDomain(input){
  try {
    const url = new URL(input);
    return url.hostname.replace("www.","");
  } catch {
    return input.replace("https://","")
      .replace("http://","")
      .replace("www.","")
      .split("/")[0];
  }
}

/* LOGO */
function getLogo(domain, custom){
  if(custom) return custom;
  if(!domain) return "";
  return `https://logo.clearbit.com/${domain}`;
}

/* PREVIEW LOGO */
function updateLogoPreview(){
  const clean = cleanDomain(domain.value);
  logoPreview.src = getLogo(clean, logoInput.value);
}

domain.oninput = updateLogoPreview;
logoInput.oninput = updateLogoPreview;

/* ADD PRODUCT */
addProductBtn.onclick = async ()=>{
  const name = nameInput.value.trim();
  const category = categoryInput.value.trim();
  const price = Number(priceInput.value);
  const previewLink = previewLinkInput.value.trim();

  if(!name || !category || !price){
    return alert("Fill all fields");
  }

  const clean = cleanDomain(domain.value);
  const logo = getLogo(clean, logoInput.value);

  const ref = await addDoc(collection(db,"products"),{
    name,
    category,
    price,
    domain: clean,
    logo,
    previewLink
  });

  const items = stockData.value.split("\n")
    .filter(l => l.includes(":"))
    .map(l=>{
      const [email,password]=l.split(":");
      return { email:email.trim(), password:password.trim(), sold:false };
    });

  await setDoc(doc(db,"productStock",ref.id),{items});

  alert("Product added 🚀");
  loadProducts();
};

/* DASHBOARD */
async function loadDashboard(){
  const ordersSnap = await getDocs(collection(db,"orders"));

  let revenue = 0;

  ordersSnap.forEach(d=>{
    revenue += Number(d.data().price||0);
  });

  document.getElementById("revenue").innerText = revenue;
}

/* PRODUCTS */
async function loadProducts(){
  products.innerHTML="";
  const snap = await getDocs(collection(db,"products"));

  snap.forEach(d=>{
    const p=d.data();
    products.innerHTML+=`
    <div class="item">
      <img src="${p.logo||""}" class="logo" onerror="this.style.display='none'">
      <div>${p.name}<br>₦${p.price}</div>
    </div>`;
  });
}

/* ORDERS */
async function loadOrders(){
  orders.innerHTML="";
  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{
    const o=d.data();
    orders.innerHTML+=`
    <div class="item">
      ₦${o.price}<br>${o.name}
    </div>`;
  });
}

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    ["dashboard","productsPage","ordersPage"].forEach(id=>{
      document.getElementById(id).style.display="none";
    });

    document.getElementById(btn.dataset.page+(btn.dataset.page==="dashboard"?"":"Page")).style.display="block";
  };
});

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
