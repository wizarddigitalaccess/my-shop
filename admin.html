function getAutoLogo(name){
  const logoMap = {
    "facebook": "https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg",
    "telegram": "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg",
    "whatsapp": "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg",
    "gmail": "https://upload.wikimedia.org/wikipedia/commons/4/4e/Gmail_Icon.png",
    "instagram": "https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png",
    "twitter": "https://upload.wikimedia.org/wikipedia/commons/6/6f/Logo_of_Twitter.svg",
    "netflix": "https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg",
    "amazon": "https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"
  };

  const n = (name || "").toLowerCase();

  // STEP 1: match known brands
  for(let key in logoMap){
    if(n.includes(key)){
      return logoMap[key];
    }
  }

  // STEP 2: fallback (auto brand)
  const first = n.split(" ")[0];
  return `https://logo.clearbit.com/${first}.com`;
}

async function uploadToCloudinary(file){
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "adqk5pxt"); // ✅ your preset
  formData.append("folder", "gift-products");

  const res = await fetch("https://api.cloudinary.com/v1_1/del024tsa/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if(!data.secure_url){
    console.error(data);
    throw new Error("Upload failed");
  }

  return data.secure_url;
}

  snap.forEach(d=>{

window.editProd = async(id)=>{

  const ref = doc(db,"products",id);
  const snap = await getDoc(ref);

  if(!snap.exists()) return;

  const p = snap.data();

  const name = prompt("Product Name", p.name);
  if(name === null) return;

  const category = prompt("Category", p.category);
  if(category === null) return;

  const price = prompt("Price", p.price);
  if(price === null) return;

  const preview = prompt("Preview link", p.previewLink || "");

  const accountsRaw = prompt(
    "Login Details (one per line)",
    (p.accounts || []).map(a => a.details).join("\n")
  );

  let accounts = [];

  if(accountsRaw){
    accounts = accountsRaw
      .split("\n")
      .map(a => a.trim())
      .filter(a => a)
      .map(a => ({ details: a }));
  }

  await updateDoc(ref,{
    name,
    category,
    price: Number(price),
    previewLink: preview || "",
    accounts,
    stock: accounts.length
  });

  alert("✅ Product fully updated");
  loadProducts();
};

window.delProd=async(id)=>{

 loadProducts();
};

/* LIVE TRACKING */
function loadTracking(){ 
  let lastCount = 0;
  let firstLoad = true;

  const unsub = onSnapshot(collection(db,"giftOrders"), async snap => {

    // 🔇 Prevent sound on first load
    if(firstLoad){
      lastCount = snap.size;
      firstLoad = false;
    } else {
      // 🔔 Sound on new order
      if(snap.size > lastCount){
        const audio = document.getElementById("alertSound");

        try{
          audio.currentTime = 0;
          await audio.play();
        }catch(e){
          console.log("Autoplay blocked");
        }

        alert("🚨 New Order Received!");
      }

      lastCount = snap.size;
    }

    tracking.innerHTML="";

    const sorted = [...snap.docs].sort((a,b)=>{
      const A = a.data().createdAt?.toMillis ? a.data().createdAt.toMillis() : 0;
      const B = b.data().createdAt?.toMillis ? b.data().createdAt.toMillis() : 0;
      return B - A;
    });

    for(const d of sorted){
      const g = d.data();

      let userEmail = "Unknown";

      try{
        const userSnap = await getDoc(doc(db,"users",g.userId));
        if(userSnap.exists()){
          userEmail = userSnap.data().email || "No email";
        }
      }catch(e){}

      tracking.innerHTML+=`
      <div class="item">
        <div class="topRow">
          ${g.type || "Gift"} - ₦${g.price || 0}
          <span class="statusBox ${g.status||'placed'}">
            ${g.status||'placed'} ${!g.viewed ? "🆕 NEW" : ""}
          </span>
        </div>

        <div>👤 ${userEmail}</div>

        <div>🧾 Sender: ${g.senders?.name || "-"}</div>
        <div>📍 ${g.senders?.location || ""}</div>

        ${g.note ? `<div>💬 Note: ${g.note}</div>` : ""}

        <div>📦 Receiver: ${g.receiver?.name || "-"}</div>
        <div>📞 ${g.receiver?.phone || "-"}</div>
        <div>🏠 ${g.receiver?.house || ""} ${g.receiver?.street || ""}</div>
        <div>🌍 ${g.receiver?.city || ""}, ${g.receiver?.state || ""}, ${g.receiver?.country || ""}</div>

        ${g.receiver?.size ? `<div>📏 Size: ${g.receiver.size}</div>` : ""}

        <div class="actions">
          <button class="btn-status" onclick="updateStatus('${d.id}','placed')">Placed</button>
          <button class="btn-status" onclick="updateStatus('${d.id}','processing')">Processing</button>
          <button class="btn-status" onclick="updateStatus('${d.id}','delivery')">Delivery</button>
          <button class="btn-status" onclick="updateStatus('${d.id}','delivered')">Delivered</button>

          ${
            !g.viewed
            ? `<button class="btn-edit" onclick="markViewed('${d.id}')">👁️ Viewed</button>`
            : ""
          }

          <button class="btn-del" onclick="deleteOrder('${d.id}')">Delete</button>
          <button class="btn-del" onclick="cancelOrder('${d.id}')">Cancel</button>
        </div>
      </div>`;
    }
  });

  // ✅ FIX: store listener OUTSIDE callback
  unsubscribers.push(unsub);
}

window.approvePayment = async(id, uid, amount)=>{
  try{
    const userRef = doc(db,"users",uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()) return;

    const current = userSnap.data().wallet || 0;

    // add money
    await updateDoc(userRef,{
      wallet: current + Number(amount)
    });

    // update transaction
    await updateDoc(doc(db,"transactions",id),{
      status: "approved"
    });

  }catch(err){
    alert(err.message);
  }
};

let salesChart, ordersChart;

function loadCharts(){

  const unsub = onSnapshot(collection(db,"orders"), snap=>{

    let dailySales = {};
    let dailyOrders = {};

    snap.forEach(doc=>{
      const o = doc.data();

      if(!o.createdAt) return;

      const date = o.createdAt.toDate().toLocaleDateString();

      dailySales[date] = (dailySales[date] || 0) + (o.price || 0);
      dailyOrders[date] = (dailyOrders[date] || 0) + 1;
    });

    const labels = Object.keys(dailySales);
    const salesData = Object.values(dailySales);
    const ordersData = Object.values(dailyOrders);

    if(salesChart) salesChart.destroy();
    if(ordersChart) ordersChart.destroy();

    const ctx1 = document.getElementById("salesChart");

    salesChart = new Chart(ctx1, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: "Daily Revenue (₦)",
          data: salesData,
          tension: 0.4
        }]
      },
      options: {
        plugins:{ legend:{ labels:{ color:"white" } } },
        scales:{
          x:{ ticks:{ color:"white" } },
          y:{ ticks:{ color:"white" } }
        }
      }
    });

    const ctx2 = document.getElementById("ordersChart");

    ordersChart = new Chart(ctx2, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Orders Count",
          data: ordersData
        }]
      },
      options: {
        plugins:{ legend:{ labels:{ color:"white" } } },
        scales:{
          x:{ ticks:{ color:"white" } },
          y:{ ticks:{ color:"white" } }
        }
      }
    });

  });

  unsubscribers.push(unsub);
}
