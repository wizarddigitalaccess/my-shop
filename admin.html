<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0f0f1a; color:white; display:none; }
.header { padding:15px; background:#1c1c2e; display:flex; justify-content:space-between; }
.container { padding:15px; }
.card { background:#1c1c2e; padding:15px; border-radius:12px; margin-bottom:15px; }

input, textarea {
  width:100%; padding:10px; margin-top:8px;
  border:none; border-radius:8px; background:#111; color:white;
}

button {
  width:100%; padding:10px; margin-top:8px;
  border:none; border-radius:8px; background:purple; color:white;
}

.item { padding:10px; border-bottom:1px solid #333; }
.row { display:flex; gap:5px; }
.row button { flex:1; font-size:12px; }

.nav {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#111;
}
.nav button { flex:1; background:none; color:gray; }
.nav button.active { color:purple; }
</style>
</head>

<body>

<div class="header">
  <span>Admin Dashboard</span>
  <button onclick="logout()" style="width:auto;background:red;">Logout</button>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="card">
<h3>Revenue Chart</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
Users: <span id="usersCount"></span><br>
Products: <span id="productsCount"></span><br>
Orders: <span id="ordersCount"></span><br>
Revenue: ₦<span id="revenue"></span>
</div>
</div>

<!-- USERS -->
<div id="usersPage" style="display:none">
<div class="card">
<input id="userSearch" placeholder="Search users..." oninput="loadUsers()">
<div id="users"></div>
</div>
</div>

<!-- PRODUCTS -->
<div id="productsPage" style="display:none">
<div class="card">

<input id="productSearch" placeholder="Search products..." oninput="loadProducts()">

<input id="name" placeholder="Product Name">
<input id="category" placeholder="Category">
<input id="price" type="number" placeholder="Price">

<textarea id="stockData" placeholder="email:password (one per line)"></textarea>

<button onclick="addProduct()">Add Product</button>

<div id="products"></div>
</div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none">
<div class="card">
<h3>Orders</h3>
<div id="orders"></div>
</div>
</div>

</div>

<div class="nav">
<button onclick="showPage('dashboard')" class="active" id="b1">Dashboard</button>
<button onclick="showPage('users')" id="b2">Users</button>
<button onclick="showPage('products')" id="b3">Products</button>
<button onclick="showPage('orders')" id="b4">Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  updateDoc, deleteDoc, addDoc, increment,
  getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ CONFIG */
const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let chartInstance;
let checked = false;

/* 🔐 FIXED ADMIN AUTH */
onAuthStateChanged(auth, async (user)=>{
  if (checked) return;

  if (!user) {
    setTimeout(()=>{
      if (!auth.currentUser) location.href="auth.html";
    }, 500);
    return;
  }

  checked = true;

  try{
    const ref = doc(db,"users",user.uid);
    let snap = await getDoc(ref);

    /* AUTO CREATE USER */
    if (!snap.exists()) {
      await setDoc(ref,{
        email:user.email,
        name:user.email.split("@")[0],
        wallet:0,
        role:"user"
      });
      location.reload();
      return;
    }

    const data = snap.data();

    if (data.role !== "admin") {
      alert("Not admin account");
      location.href="index.html";
      return;
    }

    document.body.style.display="block";

    loadDashboard();
    loadUsers();
    loadProducts();
    loadOrders();

  }catch(e){
    console.error("ADMIN ERROR:", e);
    alert("Admin load failed");
  }
});

/* DASHBOARD */
async function loadDashboard(){
  const usersSnap = await getDocs(collection(db,"users"));
  const productsSnap = await getDocs(collection(db,"products"));
  const ordersSnap = await getDocs(collection(db,"orders"));

  usersCount.innerText = usersSnap.size;
  productsCount.innerText = productsSnap.size;
  ordersCount.innerText = ordersSnap.size;

  let revenue=0, days={};

  ordersSnap.forEach(d=>{
    const o=d.data();
    revenue += o.price || 0;

    if(o.createdAt){
      const date = new Date(o.createdAt.seconds*1000).toLocaleDateString();
      days[date]=(days[date]||0)+o.price;
    }
  });

  revenue.innerText = revenue;

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(chart,{
    type:"line",
    data:{
      labels:Object.keys(days),
      datasets:[{label:"Revenue",data:Object.values(days)}]
    }
  });
}

/* USERS */
window.loadUsers = async ()=>{
  const search = userSearch.value.toLowerCase();
  users.innerHTML="";

  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const u=d.data();
    if(!(u.email||"").toLowerCase().includes(search)) return;

    users.innerHTML+=`
    <div class="item">
      ${u.name}<br>${u.email}<br>₦${u.wallet||0}
      <div class="row">
        <button onclick="fund('${d.id}')">Fund</button>
        <button onclick="deleteUser('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
};

window.fund = async(uid)=>{
  const amount = Number(prompt("Amount"));
  if(!amount) return;
  await updateDoc(doc(db,"users",uid),{wallet:increment(amount)});
  loadUsers();
};

window.deleteUser = async(uid)=>{
  if(confirm("Delete user?")){
    await deleteDoc(doc(db,"users",uid));
    loadUsers();
  }
};

/* PRODUCTS */
window.loadProducts = async ()=>{
  const search = productSearch.value.toLowerCase();
  products.innerHTML="";

  const snap = await getDocs(collection(db,"products"));

  for(const d of snap.docs){
    const p=d.data();
    if(!p.name.toLowerCase().includes(search)) continue;

    const stockSnap = await getDoc(doc(db,"productStock",d.id));
    let left = 0;

    if(stockSnap.exists()){
      left = stockSnap.data().items.filter(i=>!i.sold).length;
    }

    products.innerHTML+=`
    <div class="item">
      ${p.name} - ₦${p.price} | Stock: ${left}
      <div class="row">
        <button onclick="deleteProduct('${d.id}')">Delete</button>
      </div>
    </div>`;
  }
};

/* ADD PRODUCT */
window.addProduct = async ()=>{
  const nameV = name.value.trim();
  const categoryV = category.value.trim().toLowerCase();
  const priceV = Number(price.value);
  const raw = stockData.value.trim();

  if(!nameV||!categoryV||!priceV||!raw){
    return alert("Fill all fields");
  }

  const ref = await addDoc(collection(db,"products"),{
    name:nameV, category:categoryV, price:priceV, status:"active"
  });

  const items = raw.split("\n").map(line=>{
    const [email,password] = line.split(":");
    return {email,password,sold:false};
  });

  await setDoc(doc(db,"productStock",ref.id),{items});

  alert("Product added ✅");

  name.value="";
  category.value="";
  price.value="";
  stockData.value="";

  loadProducts();
};

/* DELETE */
window.deleteProduct = async(id)=>{
  if(confirm("Delete product?")){
    await deleteDoc(doc(db,"products",id));
    await deleteDoc(doc(db,"productStock",id));
    loadProducts();
  }
};

/* ORDERS */
async function loadOrders(){
  orders.innerHTML="";
  const snap = await getDocs(collection(db,"orders"));

  snap.forEach(d=>{
    const o=d.data();
    orders.innerHTML+=`
    <div class="item">
      ${o.name}<br>₦${o.price}<br>User: ${o.userId}
    </div>`;
  });
}

/* LOGOUT */
window.logout=()=>signOut(auth).then(()=>location.href="auth.html");

/* NAV */
window.showPage=(p)=>{
  dashboard.style.display="none";
  usersPage.style.display="none";
  productsPage.style.display="none";
  ordersPage.style.display="none";

  b1.classList.remove("active");
  b2.classList.remove("active");
  b3.classList.remove("active");
  b4.classList.remove("active");

  if(p==="dashboard"){dashboard.style.display="block";b1.classList.add("active");}
  if(p==="users"){usersPage.style.display="block";b2.classList.add("active");}
  if(p==="products"){productsPage.style.display="block";b3.classList.add("active");}
  if(p==="orders"){ordersPage.style.display="block";b4.classList.add("active");}
};
</script>

</body>
</html>
