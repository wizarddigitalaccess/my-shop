<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
  display:none;
}

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #333;
  padding:10px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button {
  flex:1;
  background:none;
  color:gray;
}
.nav button.active {
  color:#1877f2;
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card page">
  <h3>Total Revenue</h3>
  ₦<span id="revenue"></span>
</div>

<!-- CATEGORIES -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName" placeholder="Category name">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>
</div>

<!-- PRODUCTS -->
<div id="productsPage" class="card page hidden">
  <h3>Main Products</h3>
  <input id="pName" placeholder="Name">
  <input id="pCategory" placeholder="Category">
  <input id="pPrice" type="number" placeholder="Price">
  <button onclick="addProduct()">Add</button>
  <div id="products"></div>
</div>

<!-- ORDERS -->
<div id="ordersPage" class="card page hidden">
  <h3>Main Orders</h3>
  <div id="orders"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- GIFTS -->
<div id="giftsPage" class="card page hidden">
  <h3>Gift Categories</h3>
  <input id="giftCatName" placeholder="Name">
  <button onclick="addGiftCategory()">Add</button>
  <div id="giftCategories"></div>

  <hr>

  <h3>Gift Products</h3>
  <input id="giftName" placeholder="Name">
  <input id="giftCategory" placeholder="Category">
  <input id="giftPrice" type="number" placeholder="Price">
  <button onclick="addGiftProduct()">Add</button>
  <div id="giftProducts"></div>

  <hr>

  <h3>Gift Orders</h3>
  <div id="giftOrders"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="dashboard" class="active">Home</button>
  <button data-page="categoriesPage">Categories</button>
  <button data-page="productsPage">Products</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="usersPage">Users</button>
  <button data-page="giftsPage">Gifts</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists() || snap.data().role !== "admin"){
    alert("Not admin");
    return location.href="index.html";
  }

  document.body.style.display="block";
  init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");

    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadRevenue();
  loadCategories();
  loadProducts();
  loadOrders();
  loadUsers();
  loadGiftCategories();
  loadGiftProducts();
  loadGiftOrders();
}

/* REVENUE */
async function loadRevenue(){
  let total=0;

  (await getDocs(collection(db,"orders"))).forEach(d=>{
    total+=Number(d.data().price||0);
  });

  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    total+=Number(d.data().price||0);
  });

  revenue.innerText=total;
}

/* CATEGORIES */
window.addCategory=async()=>{
  await addDoc(collection(db,"categories"),{name:catName.value});
  loadCategories();
};

async function loadCategories(){
  categories.innerHTML="";
  (await getDocs(collection(db,"categories"))).forEach(d=>{
    categories.innerHTML+=`
      <div class="item">
        ${d.data().name}
        <button onclick="deleteCategory('${d.id}')">Delete</button>
      </div>`;
  });
}

window.deleteCategory=async(id)=>{
  await deleteDoc(doc(db,"categories",id));
  loadCategories();
};

/* PRODUCTS */
window.addProduct=async()=>{
  await addDoc(collection(db,"products"),{
    name:pName.value,
    category:pCategory.value,
    price:Number(pPrice.value)
  });
  loadProducts();
};

async function loadProducts(){
  products.innerHTML="";
  (await getDocs(collection(db,"products"))).forEach(d=>{
    const p=d.data();
    products.innerHTML+=`
      <div class="item">
        ${p.name} - ₦${p.price}
        <button onclick="deleteProduct('${d.id}')">Delete</button>
      </div>`;
  });
}

window.deleteProduct=async(id)=>{
  await deleteDoc(doc(db,"products",id));
  loadProducts();
};

/* ORDERS */
async function loadOrders(){
  orders.innerHTML="";
  (await getDocs(collection(db,"orders"))).forEach(d=>{
    const o=d.data();
    orders.innerHTML+=`
      <div class="item">
        ₦${o.price}
        <button onclick="deleteOrder('${d.id}')">Delete</button>
      </div>`;
  });
}

window.deleteOrder=async(id)=>{
  await deleteDoc(doc(db,"orders",id));
  loadOrders();
};

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  (await getDocs(collection(db,"users"))).forEach(d=>{
    users.innerHTML+=`
      <div class="item">
        ${d.data().email || d.id}
      </div>`;
  });
}

/* GIFTS (kept working) */
window.addGiftCategory=async()=>{
  await addDoc(collection(db,"giftCategories"),{name:giftCatName.value});
  loadGiftCategories();
};

async function loadGiftCategories(){
  giftCategories.innerHTML="";
  (await getDocs(collection(db,"giftCategories"))).forEach(d=>{
    giftCategories.innerHTML+=`
      <div class="item">
        ${d.data().name}
        <button onclick="deleteGiftCategory('${d.id}')">Delete</button>
      </div>`;
  });
}

window.deleteGiftCategory=async(id)=>{
  await deleteDoc(doc(db,"giftCategories",id));
  loadGiftCategories();
};

window.addGiftProduct=async()=>{
  await addDoc(collection(db,"giftProducts"),{
    name:giftName.value,
    category:giftCategory.value,
    price:Number(giftPrice.value)
  });
  loadGiftProducts();
};

async function loadGiftProducts(){
  giftProducts.innerHTML="";
  (await getDocs(collection(db,"giftProducts"))).forEach(d=>{
    const g=d.data();
    giftProducts.innerHTML+=`
      <div class="item">
        ${g.name} - ₦${g.price}
        <button onclick="deleteGiftProduct('${d.id}')">Delete</button>
      </div>`;
  });
}

window.deleteGiftProduct=async(id)=>{
  await deleteDoc(doc(db,"giftProducts",id));
  loadGiftProducts();
};

async function loadGiftOrders(){
  giftOrders.innerHTML="";
  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    const g=d.data();
    giftOrders.innerHTML+=`
      <div class="item">
        ₦${g.price}
        <button onclick="deleteGiftOrder('${d.id}')">Delete</button>
      </div>`;
  });
}

window.deleteGiftOrder=async(id)=>{
  await deleteDoc(doc(db,"giftOrders",id));
  loadGiftOrders();
};

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
