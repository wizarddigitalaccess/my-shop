<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
  display:none;
}

.header {
  padding:15px;
  background:#1c1c2e;
  font-weight:bold;
}

.container { padding:15px; }

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

.item {
  padding:10px;
  border-bottom:1px solid #333;
}

.row {
  display:flex;
  gap:5px;
}

.row button { flex:1; font-size:12px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav button {
  flex:1;
  background:none;
  color:gray;
}

.nav button.active { color:purple; }
</style>
</head>

<body>

<div class="header">Admin Pro Dashboard</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
<div class="card">
<h3>Analytics</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
Total Users: <span id="usersCount"></span><br>
Total Products: <span id="productsCount"></span><br>
Inventory: <span id="inventory"></span>
</div>
</div>

<!-- USERS -->
<div id="usersPage" style="display:none">
<div class="card">
<input id="userSearch" placeholder="Search users..." oninput="loadUsers()">
<div id="users"></div>
</div>
</div>

<!-- PRODUCTS -->
<div id="productsPage" style="display:none">
<div class="card">
<input id="productSearch" placeholder="Search products..." oninput="loadProducts()">

<input id="name" placeholder="Name">
<input id="link" placeholder="Link">
<input id="category" placeholder="Category">
<input id="price" type="number" placeholder="Price">

<button onclick="addProduct()">Add Product</button>

<div id="products"></div>
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('dashboard')" class="active" id="b1">Dashboard</button>
<button onclick="show('users')" id="b2">Users</button>
<button onclick="show('products')" id="b3">Products</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore, collection, getDocs, doc,
updateDoc, deleteDoc, addDoc, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"wizard-shop-52a50.firebaseapp.com",
projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 ROLE BASED ADMIN
onAuthStateChanged(auth, async (user)=>{
if(!user) return location.href="auth.html";

const adminSnap = await getDocs(collection(db,"admins"));
let isAdmin = false;

adminSnap.forEach(d=>{
if(d.id === user.uid) isAdmin = true;
});

if(!isAdmin) return location.href="index.html";

document.body.style.display="block";

loadDashboard();
loadUsers();
loadProducts();
});

// 📊 DASHBOARD
async function loadDashboard(){
const users = await getDocs(collection(db,"users"));
const products = await getDocs(collection(db,"products"));
const tx = await getDocs(collection(db,"transactions"));

document.getElementById("usersCount").innerText = users.size;
document.getElementById("productsCount").innerText = products.size;

let inventory = 0;
let days = {};
tx.forEach(d=>{
let data=d.data();
if(data.status==="approved"){
inventory += data.amount;

let day = new Date(data.createdAt?.seconds*1000).toLocaleDateString();
days[day] = (days[day]||0)+data.amount;
}
});

document.getElementById("inventory").innerText = inventory;

// chart
new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:Object.keys(days),
datasets:[{label:"Revenue",data:Object.values(days)}]
}
});
}

// 👤 USERS
window.loadUsers = async function(){
const search = userSearch.value.toLowerCase();
const div = document.getElementById("users");
div.innerHTML="";

const snap = await getDocs(collection(db,"users"));

snap.forEach(d=>{
const data=d.data();
if(!data.email.toLowerCase().includes(search)) return;

div.innerHTML += `
<div class="item">
${data.name}<br>${data.email}<br>₦${data.wallet||0}

<div class="row">
<button onclick="fund('${d.id}')">Fund</button>
<button onclick="editUser('${d.id}')">Edit</button>
<button onclick="delUser('${d.id}')">Delete</button>
</div>
</div>`;
});
}

window.fund = async(uid)=>{
const amount = Number(prompt("Amount"));
await updateDoc(doc(db,"users",uid),{wallet:increment(amount)});
loadUsers();
}

window.editUser = async(uid)=>{
const name = prompt("New name");
await updateDoc(doc(db,"users",uid),{name});
loadUsers();
}

window.delUser = async(uid)=>{
if(confirm("Delete user?")){
await deleteDoc(doc(db,"users",uid));
loadUsers();
}
}

// 📦 PRODUCTS
window.loadProducts = async function(){
const search = productSearch.value.toLowerCase();
const div = document.getElementById("products");
div.innerHTML="";

const snap = await getDocs(collection(db,"products"));

snap.forEach(d=>{
const data=d.data();
if(!data.name.toLowerCase().includes(search)) return;

div.innerHTML += `
<div class="item">
${data.name} (${data.category}) - ₦${data.price}

<div class="row">
<button onclick="editProduct('${d.id}')">Edit</button>
<button onclick="deleteProduct('${d.id}')">Delete</button>
</div>
</div>`;
});
}

window.addProduct = async()=>{
await addDoc(collection(db,"products"),{
name:name.value,
link:link.value,
category:category.value,
price:Number(price.value),
status:"available"
});
loadProducts();
}

window.editProduct = async(id)=>{
const price = Number(prompt("New price"));
await updateDoc(doc(db,"products",id),{price});
loadProducts();
}

window.deleteProduct = async(id)=>{
if(confirm("Delete product?")){
await deleteDoc(doc(db,"products",id));
loadProducts();
}
}

// NAV
window.show = function(p){
dashboard.style.display="none";
usersPage.style.display="none";
productsPage.style.display="none";

b1.classList.remove("active");
b2.classList.remove("active");
b3.classList.remove("active");

if(p==="dashboard"){dashboard.style.display="block";b1.classList.add("active");}
if(p==="users"){usersPage.style.display="block";b2.classList.add("active");}
if(p==="products"){productsPage.style.display="block";b3.classList.add("active");}
}
</script>

</body>
</html>
