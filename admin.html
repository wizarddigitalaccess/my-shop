<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }
.header { padding:15px; background:#1c1c2e; display:flex; justify-content:space-between; }

.card { background:#1c1c2e; padding:15px; border-radius:12px; margin:15px; }
.hidden { display:none; }

input { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; background:#111; color:white; }

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

/* 🔥 STABLE ACTION BUTTONS */
.actions {
  display:flex;
  gap:6px;
}
.actions button{
  min-width:65px;
}

/* NAV IMPROVED */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button {
  flex:1;
  background:none;
  color:gray;
  padding:10px 0;
}
.nav button.active {
  color:#1877f2;
  border-top:2px solid #1877f2;
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">
  <h3>Dashboard</h3>
  <div id="analytics"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- MAIN CATEGORIES -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>
</div>

<!-- MAIN ORDERS -->
<div id="ordersPage" class="card page hidden">
  <h3>Main Orders</h3>
  <div id="orders"></div>
</div>

<!-- GIFT DASHBOARD -->
<div id="giftDashboard" class="card page hidden">

<h3>Gift Categories</h3>
<input id="gCatName">
<label><input type="checkbox" id="gRequireSize"> Require Size</label>
<button onclick="addGiftCategory()">Add</button>
<div id="gCategories"></div>

<hr>

<h3>Gift Products</h3>
<input id="gName" placeholder="Name">
<input id="gCategory" placeholder="Category">
<input id="gPrice" type="number" placeholder="Price">
<label><input type="checkbox" id="gProductSize"> Require Size</label>
<input type="file" id="gImageFile">
<button onclick="addGiftProduct()">Add</button>
<div id="gProducts"></div>

</div>

<!-- GIFT ORDERS -->
<div id="giftOrdersPage" class="card page hidden">
  <h3>Gift Orders</h3>
  <div id="giftOrders"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Categories</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="giftDashboard">Gifts</button>
  <button data-page="giftOrdersPage">Gift Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, addDoc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists() || (snap.data().role||"") !== "admin"){
    return location.href="index.html";
  }

  document.body.style.display="block";
  init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadUsers();
  loadCategories();
  loadGiftCategories();
  loadGiftProducts();
  loadGiftOrders();
}

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  (await getDocs(collection(db,"users"))).forEach(d=>{
    const u=d.data();
    users.innerHTML+=`
    <div class="item">
      ${u.email}
      <div class="actions">
        <button onclick="deleteUser('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

window.deleteUser=id=>deleteDoc(doc(db,"users",id)).then(loadUsers);

/* MAIN CATEGORIES */
window.addCategory=async()=>{
  if(!catName.value) return;
  await addDoc(collection(db,"categories"),{name:catName.value});
  catName.value="";
  loadCategories();
};

async function loadCategories(){
  categories.innerHTML="";
  (await getDocs(collection(db,"categories"))).forEach(d=>{
    categories.innerHTML+=`
    <div class="item">
      ${d.data().name}
      <div class="actions">
        <button onclick="deleteCategory('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

window.deleteCategory=id=>deleteDoc(doc(db,"categories",id)).then(loadCategories);

/* GIFT CATEGORY */
window.addGiftCategory=async()=>{
  await addDoc(collection(db,"giftCategories"),{
    name:gCatName.value,
    requiresSize:gRequireSize.checked
  });
  loadGiftCategories();
};

async function loadGiftCategories(){
  gCategories.innerHTML="";
  (await getDocs(collection(db,"giftCategories"))).forEach(d=>{
    const c=d.data();
    gCategories.innerHTML+=`
    <div class="item">
      ${c.name} ${c.requiresSize?"(Size)":""}
      <div class="actions">
        <button onclick="deleteGiftCategory('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

window.deleteGiftCategory=id=>deleteDoc(doc(db,"giftCategories",id)).then(loadGiftCategories);

/* GIFT PRODUCTS */
async function uploadImage(file){
  const r=ref(storage,"gifts/"+Date.now());
  await uploadBytes(r,file);
  return await getDownloadURL(r);
}

window.addGiftProduct=async()=>{
  if(!gImageFile.files[0]) return alert("Select image");

  const img=await uploadImage(gImageFile.files[0]);

  await addDoc(collection(db,"giftProducts"),{
    name:gName.value,
    category:gCategory.value,
    price:Number(gPrice.value),
    image:img,
    requiresSize:gProductSize.checked
  });

  loadGiftProducts();
};

async function loadGiftProducts(){
  gProducts.innerHTML="";
  (await getDocs(collection(db,"giftProducts"))).forEach(d=>{
    const p=d.data();
    gProducts.innerHTML+=`
    <div class="item">
      ${p.name} ₦${p.price}
      <div class="actions">
        <button onclick="deleteGiftProduct('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

window.deleteGiftProduct=id=>deleteDoc(doc(db,"giftProducts",id)).then(loadGiftProducts);

/* GIFT ORDERS + TRACKING */
async function loadGiftOrders(){
  giftOrders.innerHTML="";
  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    const o=d.data();

    giftOrders.innerHTML+=`
    <div class="item">
      ${o.userEmail} - ${o.type}
      <div class="actions">
        <button onclick="setStatus('${d.id}','placed')">Placed</button>
        <button onclick="setStatus('${d.id}','on_the_way')">Way</button>
        <button onclick="setStatus('${d.id}','delivered')">Done</button>
      </div>
    </div>`;
  });
}

window.setStatus=(id,status)=>{
  updateDoc(doc(db,"giftOrders",id),{status}).then(loadGiftOrders);
};

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth);
</script>

</body>
</html>
