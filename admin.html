<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;

  max-height:80vh;
  overflow-y:auto;
}

.page {
  padding-bottom: 80px;
}
.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* BUTTONS */
.btn-edit{background:#1877f2;color:white;}
.btn-del{background:#e74c3c;color:white;}
.btn-fund{background:#2ecc71;color:white;}
.btn-deduct{background:#f39c12;color:white;}
.btn-status{background:#9b59b6;color:white;}

.item {
  display:flex;
  flex-direction:column;
  gap:6px;
  border-bottom:1px solid #333;
  padding:10px;
}

.topRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.actions {
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  display:flex;
  background:#111;
  z-index:999;
}

.nav button {
  flex:1;
  padding:10px;
  background:#1c1c2e;
  color:gray;
}

.nav button.active {
  background:#1877f2;
  color:white;
}

/* STATUS */
.statusBox{
  padding:6px;
  border-radius:6px;
  font-size:12px;
}

.placed{background:#665c00;}
.processing{background:#5a2d82;}
.delivery{background:#003366;}
.delivered{background:#003300;}
</style>
</head>

<body>
<audio id="alertSound" preload="auto">
  <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>
<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
    <div class="card" id="cardUsers">Users: 0</div>
    <div class="card" id="cardSales">Sales: ₦0</div>
    <div class="card" id="cardDeposits">Deposits: ₦0</div>
    <div class="card" id="cardOrders">Orders: 0</div>
  </div>

  <h3>Tracking (Live)</h3>
  <div id="tracking"></div>

</div> <!-- ✅ VERY IMPORTANT -->

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <input id="userSearch" placeholder="Search by email...">
  <div id="users"></div>
</div>

<!-- MAIN -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName"><button onclick="addCategory()">Add</button>
  <div id="categories"></div>

  <h3>Main Products</h3>
  <input id="pName" placeholder="Product Name (e.g Facebook Account)">
  <input id="pCategory" placeholder="Category (must match exactly)">
  <input id="pPrice" placeholder="Price (e.g 5000)">
  <input id="pDetails" placeholder="Details (e.g Email:..., Password:...)">
  <button onclick="addProduct()">Add</button>
  <div id="products"></div>
</div>

<!-- GIFTS -->
<div id="giftDashboard" class="card page hidden">
  <h3>Gift Categories</h3>
  <input id="gCatName" placeholder="Category name">
  <input type="file" id="gCatImage" accept="image/*">
  <button onclick="addGiftCategory()">Add</button>
  <div id="gCategories"></div>

  <h3>Gift Products</h3>
  <input id="gName" placeholder="Product Name">
  <select id="gCategory"></select>
  <input id="gPrice" placeholder="Price (e.g. 5000)">
  <input type="file" id="gImage" accept="image/*">

  <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
    <span>Requires Size</span>

    <label style="position:relative; width:45px; height:22px;">
      <input type="checkbox" id="gRequiresSize" style="display:none;">

      <span id="toggleTrack" style="
        position:absolute;
        inset:0;
        background:#555;
        border-radius:20px;
        transition:.3s;
      "></span>

      <span id="toggleCircle" style="
        position:absolute;
        width:18px;
        height:18px;
        left:2px;
        top:2px;
        background:white;
        border-radius:50%;
        transition:.3s;
      "></span>
    </label>
  </div>

  <button onclick="addGiftProduct()">Add</button>
  <div id="gProducts"></div>
</div>

<div id="ordersPage" class="card page hidden">
  <h3>All Orders</h3>

  <select id="orderFilter" onchange="loadAllOrders()" style="margin-bottom:10px;">
    <option value="all">All</option>
    <option value="placed">Placed</option>
    <option value="processing">Processing</option>
    <option value="delivery">Delivery</option>
    <option value="delivered">Delivered</option>
    <option value="cancelled">Cancelled</option>
  </select>
  <div id="allOrders"></div>
</div>

<div id="paymentsPage" class="card page hidden">
  <h3>Wallet Payments</h3>
  <div id="payments"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Main</button>
  <button data-page="giftDashboard">Gifts</button>
  <button data-page="ordersPage">Orders</button>

function getAutoLogo(name){
  const logoMap = {
    "facebook": "https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg",
    "telegram": "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg",
    "whatsapp": "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg",
    "gmail": "https://upload.wikimedia.org/wikipedia/commons/4/4e/Gmail_Icon.png",
    "instagram": "https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png",
    "twitter": "https://upload.wikimedia.org/wikipedia/commons/6/6f/Logo_of_Twitter.svg",
    "netflix": "https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg",
    "amazon": "https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"
  };

  const n = (name || "").toLowerCase();

  // STEP 1: match known brands
  for(let key in logoMap){
    if(n.includes(key)){
      return logoMap[key];
    }
  }

  // STEP 2: fallback (auto brand)
  const first = n.split(" ")[0];
  return `https://logo.clearbit.com/${first}.com`;
}

async function uploadToCloudinary(file){
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "adqk5pxt"); // ✅ your preset
  formData.append("folder", "gift-products");

  const res = await fetch("https://api.cloudinary.com/v1_1/del024tsa/image/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  if(!data.secure_url){
    console.error(data);
    throw new Error("Upload failed");
  }

  return data.secure_url;
}

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  const snap=await getDocs(collection(db,"users"));

  const search = (document.getElementById("userSearch")?.value || "").toLowerCase();

  snap.forEach(d=>{
    const u=d.data();

    if(search && !u.email?.toLowerCase().includes(search)) return;

    users.innerHTML+=`
    <div class="item">
      <div class="topRow">
        ${u.email}
        ₦${u.wallet||0}
      </div>

      <div class="actions">
        <button class="btn-fund" onclick="fund('${d.id}')">+ Fund</button>
        <button class="btn-deduct" onclick="deduct('${d.id}')">- Deduct</button>
        <button class="btn-del" onclick="delUser('${d.id}')">Delete</button>
      </div>
    </div>`;
  });
}

window.fund=async(id)=>{
 let amt=prompt("Amount");
 if(!amt) return;
 let ref=doc(db,"users",id);
 let u=(await getDoc(ref)).data();
 await updateDoc(ref,{wallet:(u.wallet||0)+Number(amt)});
 loadUsers();
};

window.deduct=async(id)=>{
 let amt=prompt("Amount");
 if(!amt) return;
 let ref=doc(db,"users",id);
 let u=(await getDoc(ref)).data();
 await updateDoc(ref,{wallet:(u.wallet||0)-Number(amt)});
 loadUsers();
};

window.delUser=async(id)=>{

};

function loadAllOrders(){

  const unsub = onSnapshot(collection(db,"giftOrders"), async snap=>{

    const list = [...snap.docs].sort((a,b)=>
      (b.data().createdAt || 0) - (a.data().createdAt || 0)
    );

    let totalSales = 0;
    let totalOrders = list.length;
    let totalUsers = new Set();

    allOrders.innerHTML = "";

    for(const d of list){
      const o = d.data();

      const filter = document.getElementById("orderFilter")?.value || "all";
      if(filter !== "all" && o.status !== filter) continue;

      totalSales += o.price || 0;
      totalUsers.add(o.userId);

      let userEmail = "Unknown";

      try{
        const u = await getDoc(doc(db,"users",o.userId));
        if(u.exists()) userEmail = u.data().email;
      }catch(e){}

      allOrders.innerHTML += `
      <div class="item">
        <div class="topRow">
          ${o.productName || "Gift"} - ₦${o.price || 0}
        </div>

        <div>👤 ${userEmail}</div>
        <div>📅 ${o.createdAt?.toDate ? o.createdAt.toDate().toLocaleString() : "-"}</div>

        <div class="statusBox ${o.status || 'placed'}">
          ${o.status || 'placed'} 
          ${!o.status || o.status === "placed" ? "🆕 NEW" : ""}
        </div>

        <div>🧾 Sender: ${o.senders?.name || "-"}</div>

        ${o.senders?.location ? `<div>📍 From: ${o.senders.location}</div>` : ""}

        ${o.note ? `
          <div style="margin-top:6px;padding:6px;background:#111;border-radius:6px;font-size:12px;">
            📝 ${o.note}
          </div>
        ` : ""}

        ${o.image ? `<img src="${o.image}" style="width:60px;border-radius:8px;">` : ""}
      </div>`;
    }

    allOrders.innerHTML = `
      <div class="item">💰 Total Sales: ₦${totalSales}</div>
      <div class="item">📦 Total Orders: ${totalOrders}</div>
      <div class="item">👥 Total Users: ${totalUsers.size}</div>
    ` + allOrders.innerHTML;

  });

  // ✅ VERY IMPORTANT (prevents duplicate listeners)
  unsubscribers.push(unsub);
}

/* LIVE TRACKING */
function loadTracking(){ 
  let lastCount = 0;
  let firstLoad = true;

  const unsub = onSnapshot(collection(db,"giftOrders"), async snap => {

    // 🔇 Prevent sound on first load
    if(firstLoad){
      lastCount = snap.size;
      firstLoad = false;
    } else {
      // 🔔 Sound on new order
      if(snap.size > lastCount){
        const audio = document.getElementById("alertSound");

        try{
          audio.currentTime = 0;
          await audio.play();
        }catch(e){
          console.log("Autoplay blocked");
        }

        alert("🚨 New Order Received!");
      }

      lastCount = snap.size;
    }

    tracking.innerHTML="";

    const sorted = [...snap.docs].sort((a,b)=>{
      const A = a.data().createdAt?.toMillis ? a.data().createdAt.toMillis() : 0;
      const B = b.data().createdAt?.toMillis ? b.data().createdAt.toMillis() : 0;
      return B - A;
    });

    for(const d of sorted){
      const g = d.data();

      let userEmail = "Unknown";

      try{
        const userSnap = await getDoc(doc(db,"users",g.userId));
        if(userSnap.exists()){
          userEmail = userSnap.data().email || "No email";
        }
      }catch(e){}

      tracking.innerHTML+=`
      <div class="item">
        <div class="topRow">
          ${g.type || "Gift"} - ₦${g.price || 0}
          <span class="statusBox ${g.status||'placed'}">
            ${g.status||'placed'} ${!g.viewed ? "🆕 NEW" : ""}
          </span>
        </div>

        <div>👤 ${userEmail}</div>

        <div>🧾 Sender: ${g.senders?.name || "-"}</div>
        <div>📍 ${g.senders?.location || ""}</div>

        ${g.note ? `<div>💬 Note: ${g.note}</div>` : ""}

        <div>📦 Receiver: ${g.receiver?.name || "-"}</div>
        <div>📞 ${g.receiver?.phone || "-"}</div>
        <div>🏠 ${g.receiver?.house || ""} ${g.receiver?.street || ""}</div>
        <div>🌍 ${g.receiver?.city || ""}, ${g.receiver?.state || ""}, ${g.receiver?.country || ""}</div>

        ${g.receiver?.size ? `<div>📏 Size: ${g.receiver.size}</div>` : ""}

        <div class="actions">
          <button class="btn-status" onclick="updateStatus('${d.id}','placed')">Placed</button>
          <button class="btn-status" onclick="updateStatus('${d.id}','processing')">Processing</button>
          <button class="btn-status" onclick="updateStatus('${d.id}','delivery')">Delivery</button>
          <button class="btn-status" onclick="updateStatus('${d.id}','delivered')">Delivered</button>

          ${
            !g.viewed
            ? `<button class="btn-edit" onclick="markViewed('${d.id}')">👁️ Viewed</button>`
            : ""
          }

          <button class="btn-del" onclick="deleteOrder('${d.id}')">Delete</button>
          <button class="btn-del" onclick="cancelOrder('${d.id}')">Cancel</button>
        </div>
      </div>`;
    }
  });

  // ✅ FIX: store listener OUTSIDE callback
  unsubscribers.push(unsub);
}

function loadPayments(){

  const unsub = onSnapshot(collection(db,"transactions"), async snap=>{

    payments.innerHTML = "";

    const list = [...snap.docs].sort((a,b)=>{
      const A = a.data().createdAt?.toMillis ? a.data().createdAt.toMillis() : 0;
      const B = b.data().createdAt?.toMillis ? b.data().createdAt.toMillis() : 0;
      return B - A;
    });

    for(const d of list){
      const t = d.data();

      let userEmail = "Unknown";

      try{
        const u = await getDoc(doc(db,"users",t.uid));
        if(u.exists()) userEmail = u.data().email;
      }catch(e){}

      payments.innerHTML += `
      <div class="item">
        <div><b>${userEmail}</b></div>
        <div>Amount: ₦${t.amount}</div>
        <div>Status: ${t.status || "pending"}</div>

        ${t.proof ? `<img src="${t.proof}" style="width:100px;border-radius:8px;margin-top:5px;">` : ""}

        <div class="actions">
          ${
            t.status==="approved"
              ? `<div style="color:#2ecc71;">✔ Approved</div>`
              : t.status==="rejected"
              ? `<div style="color:#e74c3c;">✖ Rejected</div>`
              : `
                <button class="btn-fund" onclick="approvePayment('${d.id}','${t.uid}',${t.amount})">Approve</button>
                <button class="btn-del" onclick="rejectPayment('${d.id}')">Reject</button>
              `
          }
        </div>
      </div>`;
    }

  });

  unsubscribers.push(unsub);
}

window.rejectPayment = async(id)=>{
  try{
    await updateDoc(doc(db,"transactions",id),{
      status: "rejected"
    });
  }catch(err){
    alert(err.message);
  }
};

window.updateStatus=async(id,status)=>{
 await updateDoc(doc(db,"giftOrders",id),{status});
};

window.markViewed = async(id)=>{
  await updateDoc(doc(db,"giftOrders",id),{
    viewed: true
  });
};

/* 🔥 DELETE ORDER */
window.deleteOrder = async(id)=>{
  if(confirm("Delete this order?")){
    await deleteDoc(doc(db,"giftOrders",id));
  }
};

/* 🔥 CANCEL ORDER (LIVE FOR USER) */
window.cancelOrder = async(id)=>{
  await updateDoc(doc(db,"giftOrders",id),{
    status: "cancelled"
  });
};

window.approvePayment = async(id, uid, amount)=>{
  try{
    const userRef = doc(db,"users",uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()) return;

    const current = userSnap.data().wallet || 0;

    // add money
    await updateDoc(userRef,{
      wallet: current + Number(amount)
    });

    // update transaction
    await updateDoc(doc(db,"transactions",id),{
      status: "approved"
    });

  }catch(err){
    alert(err.message);
  }
};

const toggle = document.getElementById("gRequiresSize");
const track = document.getElementById("toggleTrack");
const circle = document.getElementById("toggleCircle");

if(toggle){
  toggle.addEventListener("change", ()=>{
    if(toggle.checked){
      track.style.background = "#1877f2";
      circle.style.transform = "translateX(22px)";
    } else {
      track.style.background = "#555";
      circle.style.transform = "translateX(0)";
    }
  });
}

function loadDashboardLive(){

  // USERS
  const unsubUsers = onSnapshot(collection(db,"users"), snap=>{
    cardUsers.innerText = "Users: " + snap.size;
  });

  // ORDERS + SALES
  const unsubOrders = onSnapshot(collection(db,"giftOrders"), snap=>{
    let sales = 0;

    snap.forEach(d=>{
      sales += d.data().price || 0;
    });

    cardSales.innerText = "Sales: ₦" + sales;
    cardOrders.innerText = "Orders: " + snap.size;
  });

  // DEPOSITS
  const unsubPayments = onSnapshot(collection(db,"transactions"), snap=>{
    let deposits = 0;

    snap.forEach(d=>{
      if(d.data().status === "approved"){
        deposits += d.data().amount || 0;
      }
    });

    cardDeposits.innerText = "Deposits: ₦" + deposits;
  });

  // ✅ store listeners (important)
  unsubscribers.push(unsubUsers, unsubOrders, unsubPayments);
}
