<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
}

.actions {
  display:flex;
  gap:6px;
}

.status-btn {
  font-size:11px;
  padding:4px 6px;
  border-radius:6px;
}

.pending { background:gray; }
.processing { background:orange; }
.transit { background:#2196f3; }
.delivered { background:green; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav button {
  flex:1;
  background:none;
  color:#777;
  font-size:12px;
  padding:10px;
  transition:0.2s;
}

.nav button.active {
  color:#1877f2;
  border-top:2px solid #1877f2;
  box-shadow:0 -2px 10px rgba(24,119,242,0.5);
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">
  <h3>Dashboard</h3>
  <div id="analytics"></div>

  <h4>📦 Gift Tracking</h4>
  <div id="tracking"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- MAIN CATEGORIES -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName" placeholder="Category name">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>
</div>

<!-- GIFT DASHBOARD -->
<div id="giftDashboard" class="card page hidden">
  <h3>Gift Products</h3>

  <input id="gName" placeholder="Product name">
  <input id="gCategory" placeholder="Category">
  <input id="gPrice" type="number" placeholder="Price">

  <label>
    <input type="checkbox" id="gProductSize"> Require Size
  </label>

  <input type="file" id="gImageFile">
  <button onclick="addGiftProduct()">Add</button>

  <div id="gProducts"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Categories</button>
  <button data-page="giftDashboard">Gifts</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, addDoc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* AUTH FIX */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";

  const snap = await getDoc(doc(db,"users",user.uid));

  let isAdmin = false;
  if(snap.exists()){
    if((snap.data().role || "").toLowerCase() === "admin"){
      isAdmin = true;
    }
  }

  if(user.email === "YOUR_EMAIL@gmail.com") isAdmin = true;

  if(!isAdmin){
    location.href="index.html";
    return;
  }

  document.body.style.display="block";
  init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");

    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadUsers();
  loadCategories();
  loadGiftProducts();
  loadTracking();
}

/* USERS */
async function loadUsers(){
  users.innerHTML="";
  (await getDocs(collection(db,"users"))).forEach(d=>{
    const u=d.data();
    users.innerHTML+=`
      <div class="item">
        ${u.email} ₦${u.balance||0}
        <div class="actions">
          <button onclick="fundUser('${d.id}')">+₦</button>
          <button onclick="deductUser('${d.id}')">-₦</button>
          <button onclick="deleteUser('${d.id}')">Delete</button>
        </div>
      </div>`;
  });
}

window.fundUser=async(id)=>{
  const amt=Number(prompt("Amount"));
  if(!amt) return;
  const refDoc = doc(db,"users",id);
  const snap = await getDoc(refDoc);
  await updateDoc(refDoc,{balance:(snap.data().balance||0)+amt});
  loadUsers();
};

window.deductUser=async(id)=>{
  const amt=Number(prompt("Amount"));
  if(!amt) return;
  const refDoc = doc(db,"users",id);
  const snap = await getDoc(refDoc);
  await updateDoc(refDoc,{balance:(snap.data().balance||0)-amt});
  loadUsers();
};

window.deleteUser=async(id)=>{
  await deleteDoc(doc(db,"users",id));
  loadUsers();
};

/* MAIN CATEGORY */
window.addCategory=async()=>{
  if(!catName.value) return alert("Enter category");
  await addDoc(collection(db,"categories"),{name:catName.value});
  catName.value="";
  loadCategories();
};

async function loadCategories(){
  categories.innerHTML="";
  (await getDocs(collection(db,"categories"))).forEach(d=>{
    categories.innerHTML+=`
      <div class="item">
        ${d.data().name}
        <div class="actions">
          <button onclick="deleteCategory('${d.id}')">Delete</button>
        </div>
      </div>`;
  });
}

window.deleteCategory=async(id)=>{
  await deleteDoc(doc(db,"categories",id));
  loadCategories();
};

/* IMAGE */
async function uploadImage(file){
  const r=ref(storage,"gifts/"+Date.now());
  await uploadBytes(r,file);
  return await getDownloadURL(r);
}

/* ADD PRODUCT FIXED */
window.addGiftProduct=async()=>{
  if(!gName.value || !gCategory.value || !gPrice.value){
    return alert("Fill all fields");
  }

  if(!gImageFile.files[0]){
    return alert("Select image");
  }

  const img=await uploadImage(gImageFile.files[0]);

  await addDoc(collection(db,"giftProducts"),{
    name:gName.value,
    category:gCategory.value,
    price:Number(gPrice.value),
    image:img,
    requiresSize:gProductSize.checked
  });

  alert("Product added");
  loadGiftProducts();
};

/* LOAD PRODUCTS */
async function loadGiftProducts(){
  gProducts.innerHTML="";
  (await getDocs(collection(db,"giftProducts"))).forEach(d=>{
    const p=d.data();
    gProducts.innerHTML+=`
      <div class="item">
        ${p.name} ₦${p.price}
        <div class="actions">
          <button onclick="deleteGiftProduct('${d.id}')">Delete</button>
        </div>
      </div>`;
  });
}

window.deleteGiftProduct=async(id)=>{
  await deleteDoc(doc(db,"giftProducts",id));
  loadGiftProducts();
};

/* TRACKING SYSTEM */
async function loadTracking(){
  tracking.innerHTML="";

  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    const o=d.data();

    tracking.innerHTML+=`
      <div class="item">
        ${o.userEmail} - ₦${o.price}
        <div class="actions">
          <button class="status-btn pending" onclick="setStatus('${d.id}','pending')">P</button>
          <button class="status-btn processing" onclick="setStatus('${d.id}','processing')">Pr</button>
          <button class="status-btn transit" onclick="setStatus('${d.id}','onway')">T</button>
          <button class="status-btn delivered" onclick="setStatus('${d.id}','delivered')">D</button>
        </div>
      </div>`;
  });
}

window.setStatus=async(id,status)=>{
  await updateDoc(doc(db,"giftOrders",id),{status});
  loadTracking();
};

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth);
</script>

</body>
</html>
