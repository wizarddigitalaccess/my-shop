<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0f0f1a; color:white; display:none; }
.header { padding:15px; background:#1c1c2e; display:flex; justify-content:space-between; }
.container { padding:15px; }
.card { background:#1c1c2e; padding:15px; border-radius:12px; margin-bottom:15px; }

input, textarea {
  width:100%; padding:10px; margin-top:8px;
  border:none; border-radius:8px; background:#111; color:white;
}

button {
  width:100%; padding:10px; margin-top:8px;
  border:none; border-radius:8px; background:purple; color:white;
}

.item { padding:10px; border-bottom:1px solid #333; }
.row { display:flex; gap:5px; }
.row button { flex:1; font-size:12px; }

.nav {
  position:fixed; bottom:0; width:100%;
  display:flex; background:#111;
}
.nav button { flex:1; background:none; color:gray; }
.nav button.active { color:purple; }
</style>
</head>

<body>

<div class="header">
  <span>Admin Dashboard</span>
  <button onclick="logout()" style="width:auto;background:red;">Logout</button>
</div>

<div class="container">

<div id="dashboard">
<div class="card">
<h3>Revenue Chart</h3>
<canvas id="chart"></canvas>
</div>

<div class="card">
Users: <span id="usersCount"></span><br>
Products: <span id="productsCount"></span><br>
Orders: <span id="ordersCount"></span><br>
Revenue: ₦<span id="revenue"></span>
</div>
</div>

<div id="usersPage" style="display:none">
<div class="card">
<input id="userSearch" placeholder="Search users..." oninput="loadUsers()">
<div id="users"></div>
</div>
</div>

<div id="productsPage" style="display:none">
<div class="card">

<input id="productSearch" placeholder="Search products..." oninput="loadProducts()">

<input id="name" placeholder="Product Name">
<input id="category" placeholder="Category">
<input id="price" type="number" placeholder="Price">

<textarea id="stockData" placeholder="email:password (one per line)"></textarea>

<button onclick="addProduct()">Add Product</button>

<div id="products"></div>
</div>
</div>

<div id="ordersPage" style="display:none">
<div class="card">
<h3>Orders</h3>
<div id="orders"></div>
</div>
</div>

</div>

<div class="nav">
<button onclick="showPage('dashboard')" class="active" id="b1">Dashboard</button>
<button onclick="showPage('users')" id="b2">Users</button>
<button onclick="showPage('products')" id="b3">Products</button>
<button onclick="showPage('orders')" id="b4">Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  updateDoc, deleteDoc, addDoc, increment,
  getDoc, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ CONFIG */
const app = initializeApp({
  apiKey:"AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let chartInstance;
let checked = false;

/* 🔐 STABLE ADMIN CHECK */
onAuthStateChanged(auth, async (user)=>{
  if (checked) return;

  if (!user) {
    setTimeout(()=>{
      if (!auth.currentUser) location.href="auth.html";
    }, 500);
    return;
  }

  checked = true;

  try{
    const snap = await getDoc(doc(db,"users",user.uid));

    if(!snap.exists() || snap.data().role !== "admin"){
      location.href="index.html";
      return;
    }

    document.body.style.display="block";

    loadDashboard();
    loadUsers();
    loadProducts();
    loadOrders();

  }catch(e){
    console.error(e);
    alert("Admin load error");
  }
});

/* DASHBOARD */
async function loadDashboard(){
  const usersSnap = await getDocs(collection(db,"users"));
  const productsSnap = await getDocs(collection(db,"products"));
  const ordersSnap = await getDocs(collection(db,"orders"));

  document.getElementById("usersCount").innerText = usersSnap.size;
  document.getElementById("productsCount").innerText = productsSnap.size;
  document.getElementById("ordersCount").innerText = ordersSnap.size;

  let revenue=0, days={};

  ordersSnap.forEach(d=>{
    const o=d.data();
    revenue += o.price || 0;

    if(o.createdAt){
      const date = new Date(o.createdAt.seconds*1000).toLocaleDateString();
      days[date]=(days[date]||0)+o.price;
    }
  });

  document.getElementById("revenue").innerText = revenue;

  if(chartInstance) chartInstance.destroy();

  chartInstance = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:Object.keys(days),
      datasets:[{label:"Revenue",data:Object.values(days)}]
    }
  });
}

/* PRODUCTS */
window.loadProducts = async ()=>{
  const search = document.getElementById("productSearch").value.toLowerCase();
  const div = document.getElementById("products");
  div.innerHTML="";

  const snap = await getDocs(collection(db,"products"));

  for (const d of snap.docs){
    const p = d.data();
    if(!p.name.toLowerCase().includes(search)) continue;

    const stockSnap = await getDoc(doc(db,"productStock",d.id));
    let left = 0;

    if(stockSnap.exists()){
      left = stockSnap.data().items.filter(i=>!i.sold).length;
    }

    div.innerHTML+=`
    <div class="item">
      ${p.name} - ₦${p.price} | Stock: ${left}
      <div class="row">
        <button onclick="deleteProduct('${d.id}')">Delete</button>
      </div>
    </div>`;
  }
};

/* ADD PRODUCT */
window.addProduct = async ()=>{
  const name = document.getElementById("name").value.trim();
  const category = document.getElementById("category").value.trim().toLowerCase();
  const price = Number(document.getElementById("price").value);
  const raw = document.getElementById("stockData").value.trim();

  if(!name||!category||!price||!raw){
    return alert("Fill all fields");
  }

  const ref = await addDoc(collection(db,"products"),{
    name, category, price, status:"active"
  });

  const items = raw.split("\n")
    .map(line=>line.trim())
    .filter(line=>line.includes(":"))
    .map(line=>{
      const [email,password] = line.split(":");
      return {email,password,sold:false};
    });

  await setDoc(doc(db,"productStock",ref.id),{items});

  alert("Product added ✅");

  document.getElementById("name").value="";
  document.getElementById("category").value="";
  document.getElementById("price").value="";
  document.getElementById("stockData").value="";

  loadProducts();
};

/* DELETE */
window.deleteProduct = async(id)=>{
  if(confirm("Delete product?")){
    await deleteDoc(doc(db,"products",id));
    await deleteDoc(doc(db,"productStock",id));
    loadProducts();
  }
};

/* LOGOUT */
window.logout=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
