<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

.hidden { display:none; }

input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
}

.actions { display:flex; gap:6px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  padding:5px;
}

.nav button {
  flex:1;
  margin:3px;
  padding:10px;
  border-radius:10px;
  background:#1c1c2e;
  color:gray;
  font-size:12px;
}

.nav button.active {
  background:#1877f2;
  color:white;
}

/* 🔥 MILITARY TRACKING */
.trackBox{
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #222;
}

.trackLine{
  display:flex;
  align-items:center;
  margin-top:12px;
}

.dot{
  width:18px;height:18px;
  border-radius:50%;
}

.line{
  flex:1;
  height:3px;
}

/* COLORS */
.gold{background:#ffd700;}
.blue{background:#1877f2;}
.green{background:#00ff88;}
.gray{background:#333;}

select{
  padding:6px;
  border-radius:6px;
  background:#111;
  color:white;
  border:none;
}

.toggle {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">
  <h3>Tracking System</h3>
  <div id="tracking"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- MAIN -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName" placeholder="Category name">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>

  <hr>

  <h3>Main Products</h3>
  <input id="pName" placeholder="Product name">
  <input id="pCategory" placeholder="Category">
  <input id="pPrice" type="number" placeholder="Price">
  <input id="pPreview" placeholder="Preview Link">
  <input id="pLogin" placeholder="Login (email:password:2fa)"> <!-- 🔥 NEW -->
  <button onclick="addProduct()">Add Product</button>
  <div id="products"></div>
</div>

<!-- ORDERS -->
<div id="ordersPage" class="card page hidden">
  <h3>Main Orders</h3>
  <div id="orders"></div>
</div>

<!-- GIFT -->
<div id="giftDashboard" class="card page hidden">
  <h3>Gift Products</h3>

  <input id="gName" placeholder="Product name">
  <input id="gCategory" placeholder="Category">
  <input id="gPrice" type="number" placeholder="Price">

  <div class="toggle">
    <label>Require Size</label>
    <input type="checkbox" id="gProductSize">
  </div>

  <button onclick="addGiftProduct()">Add</button>

  <div id="gProducts"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Main</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="giftDashboard">Gifts</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc, addDoc, getDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user) return location.href="auth.html";
  document.body.style.display="block";
  init();
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadUsers();
  loadCategories();
  loadProducts();
  loadGiftProducts();
  loadTracking();
}

/* 🔥 TRACKING FIXED + MILITARY */
async function loadTracking(){
  tracking.innerHTML="";

  const snap = await getDocs(collection(db,"giftOrders"));

  if(snap.empty){
    tracking.innerHTML="<p style='color:gray;text-align:center;'>No tracking data</p>";
    return;
  }

  snap.forEach(d=>{
    const g=d.data();
    const status = g.status || "placed";

    const s1 = true;
    const s2 = status==="on delivery" || status==="delivered";
    const s3 = status==="delivered";

    tracking.innerHTML+=`
    <div class="trackBox">

      <b>${g.type || "Gift"}</b><br>
      <small>${g.userEmail || ""}</small>

      <div class="trackLine">

        <div class="dot ${s1?'gold':'gray'}"></div>
        <div class="line ${s2?'blue':'gray'}"></div>

        <div class="dot ${s2?'blue':'gray'}"></div>
        <div class="line ${s3?'green':'gray'}"></div>

        <div class="dot ${s3?'green':'gray'}"></div>

      </div>

      <div style="margin-top:10px;">
        <select onchange="updateStatus('${d.id}',this.value)">
          <option ${status=="placed"?"selected":""}>placed</option>
          <option ${status=="on delivery"?"selected":""}>on delivery</option>
          <option ${status=="delivered"?"selected":""}>delivered</option>
        </select>
      </div>

    </div>`;
  });
}

window.updateStatus = async(id,val)=>{
  await updateDoc(doc(db,"giftOrders",id),{status:val});
  loadTracking();
};

/* 🔥 PRODUCT WITH LOGIN */
window.addProduct = async()=>{
  await addDoc(collection(db,"products"),{
    name:pName.value,
    category:pCategory.value,
    price:Number(pPrice.value),
    previewLink:pPreview.value,
    login:pLogin.value   // 🔥 NEW
  });

  pName.value=""; pCategory.value=""; pPrice.value="";
  pPreview.value=""; pLogin.value="";

  loadProducts();
};

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
