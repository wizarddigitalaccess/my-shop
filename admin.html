<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }
.header { padding:15px; background:#1c1c2e; display:flex; justify-content:space-between; }
.card { background:#1c1c2e; padding:15px; border-radius:12px; margin:15px; }
.hidden { display:none; }

input { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; background:#111; color:white; }
button { padding:6px 10px; border:none; border-radius:8px; background:#1877f2; color:white; cursor:pointer; }

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
}

.actions { display:flex; gap:8px; }
.actions button { min-width:60px; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button { flex:1; background:none; color:gray; font-size:12px; }
.nav button.active { color:#1877f2; }
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<div id="home" class="card page">
  <h3>Dashboard</h3>
  <div id="analytics"></div>
</div>

<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName" placeholder="Category name">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>
</div>

<div id="ordersPage" class="card page hidden">
  <h3>Main Orders</h3>
  <div id="orders"></div>
</div>

<div id="giftDashboard" class="card page hidden">
  <h3>Gift Categories</h3>

  <input id="gCatName" placeholder="Category name">
  <div class="toggle">
    <label>Require Size</label>
    <input type="checkbox" id="gRequireSize">
  </div>

  <button onclick="addGiftCategory()">Add</button>
  <div id="gCategories"></div>

  <hr>

  <h3>Gift Products</h3>
  <input id="gName" placeholder="Product name">
  <input id="gCategory" placeholder="Category">
  <input id="gPrice" type="number" placeholder="Price">

  <div class="toggle">
    <label>Require Size</label>
    <input type="checkbox" id="gProductSize">
  </div>

  <input type="file" id="gImageFile">
  <button onclick="addGiftProduct()">Add</button>
  <div id="gProducts"></div>
</div>

<div id="giftOrdersPage" class="card page hidden">
  <h3>Gift Orders</h3>
  <div id="giftOrders"></div>
</div>

<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Categories</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="giftDashboard">Gifts</button>
  <button data-page="giftOrdersPage">Gift Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, addDoc, getDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* ✅ FIXED AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user){
    location.href="auth.html";
    return;
  }

  try{
    const snap = await getDoc(doc(db,"users",user.uid));
    let isAdmin = false;

    if(snap.exists()){
      const role = (snap.data().role || "").toLowerCase();
      if(role === "admin") isAdmin = true;
    }

    // fallback (IMPORTANT)
    if(user.email === "YOUR_EMAIL@gmail.com"){
      isAdmin = true;
    }

    if(!isAdmin){
      alert("Access denied");
      location.href="index.html";
      return;
    }

    document.body.style.display="block";
    init();

  }catch(e){
    console.error(e);
    alert("Auth error");
  }
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");

    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadUsers();
}

/* USERS FIXED */
async function loadUsers(){
  users.innerHTML="";
  (await getDocs(collection(db,"users"))).forEach(d=>{
    const u=d.data();
    users.innerHTML += `
      <div class="item">
        ${u.email} ₦${u.balance||0}
        <div class="actions">
          <button onclick="fundUser('${d.id}')">+₦</button>
          <button onclick="deductUser('${d.id}')">-₦</button>
          <button onclick="deleteUser('${d.id}')">Delete</button>
        </div>
      </div>`;
  });
}

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
