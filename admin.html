<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: none;
}

.container { padding: 20px; }

.card {
  background: #1c1c2e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: purple;
  color: white;
  cursor: pointer;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #333;
}

.row-btn {
  margin-top: 5px;
  display: flex;
  gap: 5px;
}

.row-btn button {
  flex: 1;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Admin Dashboard</h2>
</div>

<!-- ADD PRODUCT -->
<div class="card">
<h3>Add Product</h3>
<input id="name" placeholder="Account Name">
<input id="link" placeholder="Profile Link">
<input id="category" placeholder="Category (e.g instagram, usa)">
<input id="price" type="number" placeholder="Price">
<button onclick="addProduct()">Add Product</button>
</div>

<!-- USERS -->
<div class="card">
<h3>Manage Users</h3>
<div id="users">Loading...</div>
</div>

<!-- PAYMENTS -->
<div class="card">
<h3>Pending Payments</h3>
<div id="transactions">Loading...</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  updateDoc,
  deleteDoc,
  increment,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_EMAIL = "etee77366@gmail.com";

// 🔐 ADMIN AUTH (NO LOOP)
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  if (user.email !== ADMIN_EMAIL) {
    window.location.href = "index.html";
    return;
  }

  document.body.style.display = "block";

  loadUsers();
  loadTransactions();
});

// ➕ ADD PRODUCT (FIXED)
window.addProduct = async function () {
  const name = document.getElementById("name").value;
  const link = document.getElementById("link").value;
  const category = document.getElementById("category").value.toLowerCase();
  const price = Number(document.getElementById("price").value);

  if (!name || !link || !category || !price) {
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "products"), {
    name,
    link,
    category,
    price,
    status: "available"
  });

  alert("Product added ✅");

  // clear inputs
  document.getElementById("name").value = "";
  document.getElementById("link").value = "";
  document.getElementById("category").value = "";
  document.getElementById("price").value = "";
};

// 👤 LOAD USERS
async function loadUsers() {
  const div = document.getElementById("users");
  div.innerHTML = "";

  const snap = await getDocs(collection(db, "users"));

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        <b>${data.name || "No Name"}</b><br>
        ${data.email}<br>
        Wallet: ₦${data.wallet || 0}

        <div class="row-btn">
          <button onclick="fundUser('${docItem.id}')">+Fund</button>
          <button onclick="deductUser('${docItem.id}')">-Deduct</button>
          <button onclick="editName('${docItem.id}')">Edit</button>
          <button onclick="deleteUser('${docItem.id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

// 💰 FUND USER
window.fundUser = async function (uid) {
  const amount = Number(prompt("Enter amount to ADD"));

  if (!amount || amount <= 0) return;

  await updateDoc(doc(db, "users", uid), {
    wallet: increment(amount)
  });

  alert("Wallet funded");
  loadUsers();
};

// 💸 DEDUCT USER
window.deductUser = async function (uid) {
  const amount = Number(prompt("Enter amount to REMOVE"));

  if (!amount || amount <= 0) return;

  await updateDoc(doc(db, "users", uid), {
    wallet: increment(-amount)
  });

  alert("Wallet deducted");
  loadUsers();
};

// ✏️ EDIT NAME
window.editName = async function (uid) {
  const name = prompt("Enter new name");

  if (!name) return;

  await updateDoc(doc(db, "users", uid), {
    name
  });

  alert("Name updated");
  loadUsers();
};

// ❌ DELETE USER
window.deleteUser = async function (uid) {
  if (!confirm("Delete this user?")) return;

  await deleteDoc(doc(db, "users", uid));

  alert("User deleted");
  loadUsers();
};

// 💳 LOAD TRANSACTIONS
async function loadTransactions() {
  const div = document.getElementById("transactions");
  div.innerHTML = "";

  const q = query(
    collection(db, "transactions"),
    where("status", "==", "pending")
  );

  const snap = await getDocs(q);

  if (snap.empty) {
    div.innerHTML = "No pending payments";
    return;
  }

  snap.forEach(docItem => {
    const data = docItem.data();

    div.innerHTML += `
      <div class="item">
        ₦${data.amount}<br>
        UID: ${data.uid}
        <button onclick="approve('${docItem.id}', '${data.uid}', ${data.amount})">
          Approve
        </button>
      </div>
    `;
  });
}

// ✅ APPROVE PAYMENT
window.approve = async function (txId, uid, amount) {
  await updateDoc(doc(db, "users", uid), {
    wallet: increment(amount)
  });

  await updateDoc(doc(db, "transactions", txId), {
    status: "approved"
  });

  alert("Payment approved ✅");
  loadTransactions();
};
</script>

</body>
</html>
