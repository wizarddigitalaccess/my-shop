<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f1a;
  color:white;
  display:none;
}

.header {
  padding:15px;
  background:#1c1c2e;
  display:flex;
  justify-content:space-between;
}

.card {
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  margin:15px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

.item {
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #333;
  padding:10px;
  gap:10px;
}

.logo {
  width:40px;
  height:40px;
  object-fit:contain;
  border-radius:6px;
  background:#111;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}
.nav button {
  flex:1;
  background:none;
  color:gray;
}
.nav button.active {
  color:#1877f2;
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card">
  <h3>Revenue</h3>
  ₦<span id="revenue"></span>

  <hr>

  <!-- 🎁 GIFT CATEGORIES -->
  <h3>Gift Categories</h3>
  <input id="giftCatName" placeholder="Category name">
  <input id="giftCatImage" placeholder="Image URL">
  <label><input type="checkbox" id="giftCatSize"> Requires Size</label>
  <button onclick="addGiftCategory()">Add Category</button>
  <div id="giftCategories"></div>

  <hr>

  <!-- 🎁 GIFT PRODUCTS -->
  <h3>Gift Products</h3>
  <input id="giftName" placeholder="Gift name">
  <input id="giftCategory" placeholder="Category">
  <input id="giftPrice" type="number" placeholder="Price">
  <input id="giftImage" placeholder="Image URL">
  <button onclick="addGiftProduct()">Add Gift</button>
  <div id="giftProducts"></div>

</div>

<div id="usersPage" class="card" style="display:none">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div id="categoriesPage" class="card" style="display:none">
  <h3>Categories</h3>
  <input id="newCategory" placeholder="Category name">
  <button id="addCategoryBtn">Add</button>
  <div id="categories"></div>
</div>

<div id="productsPage" class="card" style="display:none">
  <h3>Add Product</h3>

  <input id="nameInput" placeholder="Name">
  <input id="categoryInput" placeholder="Category">
  <input id="priceInput" type="number" placeholder="Price">
  <input id="domain" placeholder="Website (e.g facebook.com)">
  <input id="logoInput" placeholder="Custom Logo URL">
  <input id="previewLink" placeholder="Preview Link">
  <textarea id="description" placeholder="Product Description"></textarea>
  <textarea id="stockData" placeholder="email:password"></textarea>

  <button id="addProductBtn">Add Product</button>

  <hr>

  <h3>Products</h3>
  <div id="products"></div>
</div>

<div id="ordersPage" class="card" style="display:none">
  <h3>Orders</h3>
  <div id="orders"></div>
</div>

<div class="nav">
  <button data-page="dashboard" class="active">Dashboard</button>
  <button data-page="users">Users</button>
  <button data-page="categories">Categories</button>
  <button data-page="products">Products</button>
  <button data-page="orders">Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, setDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.replace("auth.html");

  const snap = await getDoc(doc(db,"users",user.uid));
  if(!snap.exists() || snap.data().role !== "admin"){
    return location.replace("index.html");
  }

  document.body.style.display="block";
  init();
});

/* INIT */
async function init(){
  loadDashboard();
  loadGiftCategories();
  loadGiftProducts();
}

/* DASHBOARD */
async function loadDashboard(){
  const snap = await getDocs(collection(db,"orders"));
  let total = 0;
  snap.forEach(d=> total += Number(d.data().price||0));
  revenue.innerText = total;
}

/* 🎁 ADD GIFT CATEGORY */
window.addGiftCategory = async ()=>{
  const name = giftCatName.value;
  const image = giftCatImage.value;
  const requiresSize = giftCatSize.checked;

  await addDoc(collection(db,"giftCategories"),{
    name,
    image,
    requiresSize
  });

  giftCatName.value="";
  giftCatImage.value="";
  giftCatSize.checked=false;

  loadGiftCategories();
};

/* 🎁 LOAD GIFT CATEGORIES */
async function loadGiftCategories(){
  giftCategories.innerHTML="";
  const snap = await getDocs(collection(db,"giftCategories"));

  snap.forEach(d=>{
    const c = d.data();
    giftCategories.innerHTML += `
      <div class="item">
        ${c.name}
        <div>
          <button onclick="deleteGiftCategory('${d.id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

window.deleteGiftCategory = async (id)=>{
  await deleteDoc(doc(db,"giftCategories",id));
  loadGiftCategories();
};

/* 🎁 ADD GIFT PRODUCT */
window.addGiftProduct = async ()=>{
  await addDoc(collection(db,"giftProducts"),{
    name: giftName.value,
    category: giftCategory.value,
    price: Number(giftPrice.value),
    image: giftImage.value
  });

  giftName.value="";
  giftCategory.value="";
  giftPrice.value="";
  giftImage.value="";

  loadGiftProducts();
};

/* 🎁 LOAD GIFT PRODUCTS */
async function loadGiftProducts(){
  giftProducts.innerHTML="";
  const snap = await getDocs(collection(db,"giftProducts"));

  snap.forEach(d=>{
    const g = d.data();
    giftProducts.innerHTML += `
      <div class="item">
        ${g.name} - ₦${g.price}
        <div>
          <button onclick="deleteGiftProduct('${d.id}')">Delete</button>
        </div>
      </div>
    `;
  });
}

window.deleteGiftProduct = async (id)=>{
  await deleteDoc(doc(db,"giftProducts",id));
  loadGiftProducts();
};

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    ["dashboard","usersPage","categoriesPage","productsPage","ordersPage"]
    .forEach(id=> document.getElementById(id).style.display="none");

    document.getElementById(btn.dataset.page+(btn.dataset.page==="dashboard"?"":"Page")).style.display="block";
  };
});

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
