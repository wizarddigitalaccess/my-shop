<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f1a; color:white; display:none; }
.header { padding:15px; background:#1c1c2e; display:flex; justify-content:space-between; }

.card { background:#1c1c2e; padding:15px; border-radius:12px; margin:15px; }
.hidden { display:none; }

input { width:100%; padding:10px; margin-top:8px; border:none; border-radius:8px; background:#111; color:white; }

button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover { opacity:0.8; }

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #333;
  padding:10px;
}

.actions {
  display:flex;
  gap:6px;
}
.actions button {
  width:70px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
  border-top:1px solid #333;
}
.nav button {
  flex:1;
  background:none;
  color:gray;
  font-size:12px;
  padding:10px;
}
.nav button.active {
  color:#1877f2;
  border-top:2px solid #1877f2;
}

img { width:40px; height:40px; object-fit:cover; border-radius:6px; }

.toggle {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <b>💎 Admin Panel</b>
  <button id="logoutBtn" style="background:red;">Logout</button>
</div>

<!-- HOME -->
<div id="home" class="card page">
  <h3>Dashboard</h3>
  <div id="analytics"></div>
</div>

<!-- USERS -->
<div id="usersPage" class="card page hidden">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<!-- MAIN CATEGORIES -->
<div id="categoriesPage" class="card page hidden">
  <h3>Main Categories</h3>
  <input id="catName" placeholder="Category name">
  <button onclick="addCategory()">Add</button>
  <div id="categories"></div>
</div>

<!-- MAIN ORDERS -->
<div id="ordersPage" class="card page hidden">
  <h3>Main Orders</h3>
  <div id="orders"></div>
</div>

<!-- GIFT DASHBOARD -->
<div id="giftDashboard" class="card page hidden">

  <h3>Gift Categories</h3>

  <input id="gCatName" placeholder="Category name">
  <div class="toggle">
    <label>Require Size</label>
    <input type="checkbox" id="gRequireSize">
  </div>

  <button onclick="addGiftCategory()">Add</button>
  <div id="gCategories"></div>

  <hr>

  <h3>Gift Products</h3>

  <input id="gName" placeholder="Product name">
  <input id="gCategory" placeholder="Category">
  <input id="gPrice" type="number" placeholder="Price">

  <div class="toggle">
    <label>Require Size</label>
    <input type="checkbox" id="gProductSize">
  </div>

  <input type="file" id="gImageFile">

  <button onclick="addGiftProduct()">Add</button>

  <div id="gProducts"></div>
</div>

<!-- GIFT ORDERS -->
<div id="giftOrdersPage" class="card page hidden">
  <h3>Gift Orders</h3>
  <div id="giftOrders"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button data-page="home" class="active">Home</button>
  <button data-page="usersPage">Users</button>
  <button data-page="categoriesPage">Categories</button>
  <button data-page="ordersPage">Orders</button>
  <button data-page="giftDashboard">Gifts</button>
  <button data-page="giftOrdersPage">Gift Orders</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, doc,
  addDoc, getDoc, deleteDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
  apiKey: "AIzaSy...",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* ✅ FIXED AUTH (NO MORE LOCKOUT) */
onAuthStateChanged(auth, async user=>{
  if(!user){
    location.href="auth.html";
    return;
  }

  try{
    const snap = await getDoc(doc(db,"users",user.uid));

    // allow access if role missing but email matches admin
    const role = snap.exists() ? (snap.data().role || "").toLowerCase() : "";

    if(role !== "admin"){
      alert("Access denied (not admin)");
      location.href="index.html";
      return;
    }

    document.body.style.display="block";
    init();

  }catch(err){
    console.error(err);
    alert("Auth error");
  }
});

/* NAV */
document.querySelectorAll(".nav button").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
    document.getElementById(btn.dataset.page).classList.remove("hidden");

    document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  }
});

/* INIT */
function init(){
  loadAnalytics();
  loadUsers();
  loadCategories();
  loadOrders();
  loadGiftCategories();
  loadGiftProducts();
  loadGiftOrders();
}

/* IMAGE UPLOAD FIX */
async function uploadImage(file){
  if(!file) throw "No image selected";
  const r=ref(storage,"gifts/"+Date.now());
  await uploadBytes(r,file);
  return await getDownloadURL(r);
}

/* ADD PRODUCT FIX */
window.addGiftProduct=async()=>{
  try{
    if(!gName.value || !gCategory.value || !gPrice.value){
      return alert("Fill all fields");
    }

    const file = gImageFile.files[0];
    if(!file) return alert("Select image");

    const img = await uploadImage(file);

    await addDoc(collection(db,"giftProducts"),{
      name:gName.value,
      category:gCategory.value,
      price:Number(gPrice.value),
      image:img,
      requiresSize:gProductSize.checked
    });

    alert("Product added ✅");

    gName.value="";
    gCategory.value="";
    gPrice.value="";
    gImageFile.value="";
    gProductSize.checked=false;

    loadGiftProducts();

  }catch(err){
    console.error(err);
    alert("Failed to add product");
  }
};

/* TRACKING SYSTEM */
window.updateGiftOrder=async(id,status)=>{
  await updateDoc(doc(db,"giftOrders",id),{status});
  loadGiftOrders();
};

/* LOAD GIFT ORDERS */
async function loadGiftOrders(){
  giftOrders.innerHTML="";
  (await getDocs(collection(db,"giftOrders"))).forEach(d=>{
    const o=d.data();

    giftOrders.innerHTML+=`
      <div class="item">
        ${o.userEmail} - ${o.receiver?.name} - ₦${o.price}
        <div class="actions">
          <button onclick="updateGiftOrder('${d.id}','pending')">Pending</button>
          <button onclick="updateGiftOrder('${d.id}','processing')">On Way</button>
          <button onclick="updateGiftOrder('${d.id}','delivered')">Done</button>
        </div>
      </div>`;
  });
}

/* LOGOUT */
logoutBtn.onclick=()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
