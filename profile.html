<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<script src="https://unpkg.com/feather-icons"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a2b;
  color: white;
}

/* CENTER */
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding-bottom: 80px;
}

.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 15px;
  width: 320px;
}

h2 {
  text-align: center;
}

.info {
  margin: 10px 0;
  padding: 10px;
  background: #0f172a;
  border-radius: 8px;
}

input {
  width: 100%;
  margin-top: 5px;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
}

.nav a {
  color: gray;
}

.nav a.active {
  color: purple;
}

.nav a svg {
  width: 22px;
  height: 22px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

  <h2>My Profile</h2>

  <div class="info">
    Name:
    <input id="name" placeholder="Enter your name">
  </div>

  <div class="info">
    Email:
    <input id="email" disabled>
  </div>

  <div class="info">
    Wallet: ₦<span id="wallet">0</span>
  </div>

  <div class="info">
    New Password:
    <input id="newPassword" type="password" placeholder="Change password">
  </div>

  <button onclick="saveProfile()">Save Changes</button>
  <button onclick="logout()">Logout</button>

</div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html"><i data-feather="home"></i></a>
  <a href="profile.html" class="active"><i data-feather="user"></i></a>
  <a href="wallet.html"><i data-feather="credit-card"></i></a>
  <a href="#"><i data-feather="phone"></i></a>
</div>

<script>
feather.replace();
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut, 
  updatePassword 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  onSnapshot, 
  updateDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

// 🔐 AUTH CHECK + LIVE PROFILE SYNC
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  currentUser = user;

  document.getElementById("email").value = user.email;

  onSnapshot(doc(db, "users", user.uid), (snap) => {
    if (snap.exists()) {
      const data = snap.data();

      document.getElementById("name").value = data.name || "";
      document.getElementById("wallet").innerText = data.wallet ?? 0;
    }
  });
});

// 💾 SAVE PROFILE
window.saveProfile = async function () {
  const name = document.getElementById("name").value;
  const newPassword = document.getElementById("newPassword").value;

  try {
    await updateDoc(doc(db, "users", currentUser.uid), {
      name: name
    });

    if (newPassword && newPassword.length >= 6) {
      await updatePassword(currentUser, newPassword);
    }

    alert("Profile updated ✔️");

  } catch (err) {
    alert(err.message);
  }
};

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "auth.html";
  });
};
</script>

</body>
</html>
