<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container { padding:20px; }

.card {
  background:#1c1c2e;
  padding:20px;
  border-radius:15px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#111;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
}

button.secondary { background:#333; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="loader" id="loader">Loading profile...</div>

<div id="app" style="display:none;">
  <div class="container">
    <div class="card">
      <h2>My Profile</h2>

      <input id="name">
      <input id="email" disabled>
      <input id="password" type="password" placeholder="New Password">

      <button onclick="save()">Save Changes</button>
      <button class="secondary" onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html" class="active">Profile</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, updatePassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"wizard-shop-52a50.firebaseapp.com",
  projectId:"wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth, async (user)=>{
  if(!user) return location.href="auth.html";

  currentUser = user;

  const ref = doc(db,"users",user.uid);
  let snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{
      name:user.email.split("@")[0],
      email:user.email,
      wallet:0
    });
    snap = await getDoc(ref);
  }

  const data = snap.data();

  name.value = data.name;
  email.value = data.email;

  loader.style.display="none";
  app.style.display="block";
});

window.save = async ()=>{
  await updateDoc(doc(db,"users",currentUser.uid),{
    name:name.value
  });

  if(password.value){
    await updatePassword(currentUser,password.value);
  }

  alert("Saved");
};

window.logout = ()=>signOut(auth).then(()=>location.href="auth.html");
</script>

</body>
</html>
