<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
}

.container {
  padding: 20px;
  padding-bottom: 80px;
}

.card {
  background: #1c1c2e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.item {
  padding: 10px;
  border-bottom: 1px solid #333;
  font-size: 14px;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>My Profile</h2>

<input id="name" placeholder="Full Name">
<input id="email" disabled>

<p>Wallet: ₦<span id="wallet">0</span></p>

<input id="newPassword" type="password" placeholder="New Password">

<button onclick="saveProfile()">Save Changes</button>
<button onclick="logout()">Logout</button>
</div>

<div class="card">
<h3>Purchased Accounts</h3>
<div id="purchases"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  signOut, 
  updatePassword 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  onSnapshot,
  updateDoc,
  collection,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  currentUser = user;

  document.getElementById("email").value = user.email;

  // Profile + wallet
  onSnapshot(doc(db, "users", user.uid), (snap) => {
    if (snap.exists()) {
      const data = snap.data();
      document.getElementById("name").value = data.name || "";
      document.getElementById("wallet").innerText = data.wallet ?? 0;
    }
  });

  // Purchases
  const q = query(
    collection(db, "purchases"),
    where("uid", "==", user.uid)
  );

  onSnapshot(q, (snapshot) => {
    const container = document.getElementById("purchases");
    container.innerHTML = "";

    snapshot.forEach(doc => {
      const item = doc.data();

      container.innerHTML += `
        <div class="item">
          ${item.name}<br>
          <a href="${item.link}" target="_blank" style="color:violet;">
            View Profile
          </a>
        </div>
      `;
    });

    if (snapshot.empty) {
      container.innerHTML = "<p class='small'>No purchases yet</p>";
    }
  });
});

window.saveProfile = async function () {
  const name = document.getElementById("name").value;
  const newPassword = document.getElementById("newPassword").value;

  try {
    await updateDoc(doc(db, "users", currentUser.uid), {
      name: name
    });

    if (newPassword && newPassword.length >= 6) {
      await updatePassword(currentUser, newPassword);
    }

    alert("Updated successfully");

  } catch (err) {
    alert(err.message);
  }
};

window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "auth.html";
  });
};
</script>

</body>
</html>
