<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1a2b;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: #1e293b;
  padding: 25px;
  border-radius: 15px;
  width: 320px;
}

h2 {
  text-align: center;
}

.info {
  margin: 10px 0;
  padding: 10px;
  background: #0f172a;
  border-radius: 8px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>My Profile</h2>

  <div class="info">Name: <span id="name">Loading...</span></div>
  <div class="info">Email: <span id="email">Loading...</span></div>
  <div class="info">Wallet: ₦<span id="wallet">0</span></div>
  <div class="info">User ID: <span id="uid">Loading...</span></div>

  <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔐 Check login
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  document.getElementById("email").innerText = user.email;
  document.getElementById("uid").innerText = user.uid;

  // get user data from Firestore
  const docRef = doc(db, "users", user.uid);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();

    document.getElementById("name").innerText = data.name || "No name";
    document.getElementById("wallet").innerText = data.wallet || 0;
  } else {
    document.getElementById("name").innerText = "No profile found";
  }
});

// logout
window.logout = function () {
  signOut(auth).then(() => {
    window.location.href = "auth.html";
  });
};
</script>

</body>
</html>
