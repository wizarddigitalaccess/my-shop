<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<script src="https://unpkg.com/feather-icons"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
}

.container {
  padding: 20px;
}

.card {
  background: #1c1c2e;
  padding: 20px;
  border-radius: 15px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: purple;
  color: white;
  cursor: pointer;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
}

.nav a { color: gray; }
.nav a.active { color: purple; }
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>My Profile</h2>

    <input id="name" placeholder="Full Name">
    <input id="email" disabled>

    <input id="password" type="password" placeholder="New Password (optional)">

    <button onclick="save()">Save Changes</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="nav">
  <a href="index.html"><i data-feather="home"></i></a>
  <a href="profile.html" class="active"><i data-feather="user"></i></a>
  <a href="wallet.html"><i data-feather="credit-card"></i></a>
</div>

<script>
feather.replace();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged, 
  updatePassword, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc, 
  updateDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

// 🔐 LOAD PROFILE
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  currentUser = user;

  const ref = doc(db, "users", user.uid);
  let snap = await getDoc(ref);

  // auto-fix missing user
  if (!snap.exists()) {
    await setDoc(ref, {
      name: user.email.split("@")[0],
      email: user.email,
      wallet: 0
    });
    snap = await getDoc(ref);
  }

  const data = snap.data();

  document.getElementById("name").value = data.name || "";
  document.getElementById("email").value = data.email || "";
});

// 💾 SAVE
window.save = async function () {
  const name = document.getElementById("name").value;
  const password = document.getElementById("password").value;

  try {
    await updateDoc(doc(db, "users", currentUser.uid), {
      name
    });

    if (password && password.length >= 6) {
      await updatePassword(currentUser, password);
    }

    alert("Profile updated ✅");

  } catch (err) {
    alert(err.message);
  }
};

// 🚪 LOGOUT
window.logout = function () {
  signOut(auth).then(() => window.location.href = "auth.html");
};
</script>

</body>
</html>
