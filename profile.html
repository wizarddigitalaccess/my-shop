<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
.loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

/* APP */
#app { display:none; }

.container { padding:20px; }

.card {
  background:#1c1c2e;
  padding:20px;
  border-radius:15px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#111;
  color:white;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

button.secondary { background:#333; }

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<!-- LOADER -->
<div class="loader" id="loader">Loading profile...</div>

<!-- APP -->
<div id="app">
  <div class="container">
    <div class="card">
      <h2>My Profile</h2>

      <input id="name">
      <input id="email" disabled>
      <input id="password" type="password" placeholder="New Password">

      <button onclick="save()">Save Changes</button>
      <button class="secondary" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="nav">
    <a href="index.html">Home</a>
    <a href="wallet.html">Wallet</a>
    <a href="orders.html">Orders</a>
    <a href="profile.html" class="active">Profile</a>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  updatePassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ SAME CONFIG EVERYWHERE */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");

let currentUser;

/* 🔐 AUTH */
onAuthStateChanged(auth, async (user) => {
  try {
    if (!user) {
      location.replace("auth.html");
      return;
    }

    currentUser = user;

    const ref = doc(db, "users", user.uid);
    let snap = await getDoc(ref);

    /* AUTO CREATE USER */
    if (!snap.exists()) {
      await setDoc(ref, {
        name: user.email.split("@")[0],
        email: user.email,
        wallet: 0
      });
      snap = await getDoc(ref);
    }

    const data = snap.data();

    document.getElementById("name").value = data.name || "";
    document.getElementById("email").value = data.email || "";

    /* SHOW APP */
    loader.style.display = "none";
    appDiv.style.display = "block";

  } catch (err) {
    console.error(err);
    loader.innerText = "Error loading profile";
  }
});

/* SAVE */
window.save = async () => {
  try {
    await updateDoc(doc(db, "users", currentUser.uid), {
      name: document.getElementById("name").value
    });

    const newPass = document.getElementById("password").value;

    if (newPass) {
      await updatePassword(currentUser, newPass);
    }

    alert("Profile updated ✅");

  } catch (err) {
    alert(err.message);
  }
};

/* LOGOUT */
window.logout = () => {
  signOut(auth).then(() => {
    location.replace("auth.html");
  });
};
</script>

</body>
</html>
