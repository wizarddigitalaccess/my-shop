<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
.loader {
  position:fixed;
  inset:0;
  background:#0f0f1a;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* APP */
#app { display:none; }

.container { padding:15px; }

/* CARD */
.card {
  background:#1c1c2e;
  padding:20px;
  border-radius:15px;
}

/* PROFILE HEADER */
.profile-header {
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}

.avatar {
  width:60px;
  height:60px;
  border-radius:50%;
  background:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}

/* INPUTS */
input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:white;
}

/* LABEL */
.label {
  margin-top:15px;
  font-size:13px;
  color:#aaa;
}

/* BUTTONS */
button {
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:purple;
  color:white;
  cursor:pointer;
}

button.secondary {
  background:#333;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="loader" id="loader">Loading profile...</div>

<div id="app">

<div class="container">

  <div class="card">

    <!-- PROFILE TOP -->
    <div class="profile-header">
      <div class="avatar" id="avatar">👤</div>
      <div>
        <b id="displayName">User</b><br>
        <small id="displayEmail"></small>
      </div>
    </div>

    <!-- PERSONAL DETAILS -->
    <h3>Personal Details</h3>

    <div class="label">Full Name</div>
    <input id="name">

    <div class="label">Email (cannot change)</div>
    <input id="email" disabled>

    <div class="label">New Password</div>
    <input id="password" type="password" placeholder="Leave empty if not changing">

    <button onclick="save()">Save Profile</button>
    <button class="secondary" onclick="logout()">Logout</button>

  </div>

</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="wallet.html">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html" class="active">Profile</a>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  onAuthStateChanged,
  updatePassword,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBt09iUFQdxWHxqLYtMKy_YJ91fK67eMMs",
  authDomain: "wizarddigitalaccess.firebaseapp.com",
  projectId: "wizarddigitalaccess",
  storageBucket: "wizarddigitalaccess.firebasestorage.com",
  messagingSenderId: "836340307615",
  appId: "1:836340307615:web:13a8f1eff9360d5c7e34aa",
  measurementId: "G-MR76QMKXKM"
};

const auth = getAuth(app);
const db = getFirestore(app);

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");

let currentUser;

/* AUTH */
onAuthStateChanged(auth, async (user) => {
  try {
    if (!user) return location.replace("auth.html");

    currentUser = user;

    const ref = doc(db, "users", user.uid);
    let snap = await getDoc(ref);

    /* AUTO CREATE */
    if (!snap.exists()) {
      await setDoc(ref, {
        name: user.email.split("@")[0],
        email: user.email,
        wallet: 0
      });
      snap = await getDoc(ref);
    }

    const data = snap.data();

    /* SET DATA */
    document.getElementById("name").value = data.name || "";
    document.getElementById("email").value = data.email || "";

    document.getElementById("displayName").innerText = data.name || "User";
    document.getElementById("displayEmail").innerText = data.email || "";

    /* AVATAR INITIAL */
    document.getElementById("avatar").innerText =
      (data.name || "U")[0].toUpperCase();

    loader.style.display = "none";
    appDiv.style.display = "block";

  } catch (err) {
    console.error(err);
    loader.innerText = "Error loading profile";
  }
});

/* SAVE */
window.save = async () => {
  try {
    const newName = document.getElementById("name").value;

    await updateDoc(doc(db, "users", currentUser.uid), {
      name: newName
    });

    const newPass = document.getElementById("password").value;

    if (newPass) {
      await updatePassword(currentUser, newPass);
    }

    alert("Profile updated ✅");
    location.reload();

  } catch (err) {
    alert(err.message);
  }
};

/* LOGOUT */
window.logout = () => {
  signOut(auth).then(() => {
    location.replace("auth.html");
  });
};
</script>

</body>
</html>
