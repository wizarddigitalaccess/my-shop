<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Gift Details</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.header{
  padding:15px;
  background:#1c1c2e;
  display:flex;
  align-items:center;
  gap:10px;
}

.container{
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#1877f2;
  color:white;
  font-size:15px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="history.back()">←</div>
  <b>Send Gift</b>
</div>

<div class="container">

  <h3 id="productName"></h3>
  <div id="price"></div>

  <!-- RECEIVER -->
  <h4>Receiver Details</h4>

  <input id="rName" placeholder="Full Name">
  <input id="rPhone" placeholder="Phone (optional)">
  <input id="rHouse" placeholder="House / Apt Number">
  <input id="rStreet" placeholder="Street Address">
  <input id="rCity" placeholder="City / Province">
  <input id="rState" placeholder="State">
  <input id="rZip" placeholder="Zip / Postal Code">
  <input id="rCountry" placeholder="Country">

  <!-- SIZE -->
  <div id="sizeBox" style="display:none;">
    <h4>Size</h4>
    <input id="rSize" placeholder="Enter Size (e.g 42, XL, 7)">
  </div>

  <!-- SENDER -->
<h4>Sender</h4>
<input id="sName" placeholder="Your Name">
<input id="sLocation" placeholder="Your Location (City, Country)">

<!-- NOTE / DESCRIPTION -->
<h4>Note (Optional)</h4>
<textarea id="note" placeholder="Write a message (₦10,000 extra if added)" 
style="width:100%;padding:10px;margin-top:10px;border:none;border-radius:8px;background:#111;color:white;height:80px;"></textarea>

<small style="color:gray;">
  Adding a note will cost an extra ₦10,000
</small>

  <button id="sendBtn">Send Gift 🎁</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection, serverTimestamp, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBt09iUFQdxWHxqLYtMKy_YJ91fK67eMMs",
  authDomain: "wizarddigitalaccess.firebaseapp.com",
  projectId: "wizarddigitalaccess",
  storageBucket: "wizarddigitalaccess.appspot.com",
  messagingSenderId: "836340307615",
  appId: "1:836340307615:web:13a8f1eff9360d5c7e34aa",
  measurementId: "G-MR76QMKXKM"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* GET PRODUCT */
const gift = JSON.parse(localStorage.getItem("selectedGift") || "{}");

// 🔥 FORCE SAFE DEFAULTS
gift.name = gift.name || "Gift";
gift.price = gift.price || 0;
gift.image = gift.image || "";
gift.requiresSize = gift.requiresSize || false;
console.log("SELECTED GIFT:", gift);

document.getElementById("productName").innerText = gift.name || "Gift";
const priceEl = document.getElementById("price");
let extraFee = 0;

function updatePrice(){
  const noteValue = document.getElementById("note").value.trim();

  extraFee = noteValue ? 10000 : 0;

  priceEl.innerText = "₦" + ((gift.price || 0) + extraFee);
}

updatePrice();

document.getElementById("note").addEventListener("input", updatePrice);

/* SIZE */
if(gift.requiresSize){
  document.getElementById("sizeBox").style.display = "block";
}

/* 🔥 UPDATED FUNCTION ONLY */
async function placeOrder(){
  try{

    const rName = document.getElementById("rName");
    const rPhone = document.getElementById("rPhone");
    const rHouse = document.getElementById("rHouse");
    const rStreet = document.getElementById("rStreet");
    const rCity = document.getElementById("rCity");
    const rState = document.getElementById("rState");
    const rZip = document.getElementById("rZip");
    const rCountry = document.getElementById("rCountry");
    const rSize = document.getElementById("rSize");

    const sName = document.getElementById("sName");
    const sLocation = document.getElementById("sLocation");

    const user = auth.currentUser;
    if(!user) return alert("Login required");

    const userRef = doc(db,"users",user.uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()){
      return alert("User not found");
    }

    const userData = userSnap.data();
    const wallet = userData.wallet || 0;

    const noteValue = document.getElementById("note").value.trim();
    const extraFee = noteValue ? 10000 : 0;
    const totalPrice = (gift.price || 0) + extraFee;

    if(wallet < totalPrice){
      return alert("Insufficient balance ❌");
    }

    const data = {
  userId: user.uid,

  // ✅ FIXED FIELDS
  productName: gift.name,
  productImage: gift.image && gift.image !== "" 
  ? gift.image 
  : "https://via.placeholder.com/55?text=🎁",
  
  price: totalPrice,

  note: noteValue || "",

  receiver:{
    name: rName.value,
    phone: rPhone.value,
    house: rHouse.value,
    street: rStreet.value,
    city: rCity.value,
    state: rState.value,
    zip: rZip.value,
    country: rCountry.value,
    size: gift.requiresSize ? rSize.value : null
  },

  senders:{
    name: sName.value,
    location: sLocation.value || ""
  },

  status: "placed",
  viewed: false,
  createdAt: serverTimestamp()
};

    if(!data.receiver.name || !data.receiver.street || !data.receiver.city || !data.receiver.country){
      return alert("Fill all required fields");
    }

    await updateDoc(userRef,{
      wallet: wallet - totalPrice
    });

    await addDoc(collection(db,"giftOrders"), data);

    alert("Gift sent successfully 🎁");
    location.href = "orders.html";

  }catch(e){
    console.error(e);

    if((e+"").includes("permission-denied")){
      alert("Service temporarily unavailable");
    }else{
      alert("Something went wrong");
    }
  }
}

document.getElementById("sendBtn").addEventListener("click", placeOrder);
</script>

</body>
</html>
