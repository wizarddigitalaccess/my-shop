<!DOCTYPE html>
<html>
<head>
<title>Verify Email</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1c1c2e;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.msg {
  margin-top: 10px;
  font-size: 13px;
  color: orange;
}
</style>
</head>

<body>

<div class="box">
  <h2>Verify Your Email</h2>
  <p>We sent a verification link to your email.</p>

  <button onclick="check()">I Have Verified</button>
  <button onclick="resend()">Resend Email</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.check = async function () {
  const user = auth.currentUser;

  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  await user.reload(); // 🔥 important

  if (user.emailVerified) {
    alert("Email verified successfully ✔️");
    window.location.href = "index.html";
  } else {
    document.getElementById("msg").innerText = "Still not verified. Check your email.";
  }
};

window.resend = async function () {
  const user = auth.currentUser;

  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  await sendEmailVerification(user);
  document.getElementById("msg").innerText = "Verification email sent again!";
};
</script>

</body>
</html>
