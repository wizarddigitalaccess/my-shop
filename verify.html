<!DOCTYPE html>

<html>
<head>
<title>Verify Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1c1c2e;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.msg {
  margin-top: 10px;
  font-size: 13px;
  color: orange;
}
</style>

</head>

<body>

<div class="box">
  <h2>Verify Your Email</h2>
  <p>Click the link sent to your email, then click below</p>

<button onclick="checkVerification()">I Have Verified</button> <button onclick="resend()">Resend Email</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  sendEmailVerification
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ✅ CHECK VERIFICATION
window.checkVerification = async function () {
  const user = auth.currentUser;
  const msg = document.getElementById("msg");

  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  await user.reload();

  if (user.emailVerified) {
    // ✅ UPDATE FIRESTORE
    await updateDoc(doc(db, "users", user.uid), {
      verified: true
    });

    alert("Account verified successfully ✔️");
    window.location.href = "index.html";
  } else {
    msg.innerText = "Still not verified. Check your email.";
  }
};

// 🔁 RESEND EMAIL
window.resend = async function () {
  const user = auth.currentUser;

  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  await sendEmailVerification(user);
  document.getElementById("msg").innerText = "Verification email sent again!";
};
</script>

</body>
</html>
