<!DOCTYPE html>
<html>
<head>
<title>Verify Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  background: #1c1c2e;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.msg {
  margin-top: 10px;
  font-size: 13px;
  color: orange;
}
</style>
</head>

<body>

<div class="box">
  <h2>Enter Verification Code</h2>
  <p>Check your email for the 6-digit code</p>

  <input id="code" placeholder="Enter code">

  <button onclick="verify()">Verify</button>

  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.verify = async function () {
  const user = auth.currentUser;
  const code = document.getElementById("code").value.trim();
  const msg = document.getElementById("msg");

  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  if (!code) {
    msg.innerText = "Enter your code";
    return;
  }

  try {
    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      msg.innerText = "User not found";
      return;
    }

    const data = snap.data();

    if (code === data.otp) {
      await updateDoc(ref, {
        verified: true,
        otp: ""
      });

      alert("Account verified ✔️");
      window.location.href = "index.html";
    } else {
      msg.innerText = "Invalid code";
    }

  } catch (err) {
    msg.innerText = err.message;
  }
};
</script>

</body>
</html>
