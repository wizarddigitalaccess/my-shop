<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
.loader {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
  z-index:9999;
}

/* CONTENT */
.container { padding:20px; }

.card {
  background:#1c1c2e;
  padding:20px;
  border-radius:12px;
  margin-bottom:12px;
}

input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  margin-top:10px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div id="app" style="display:none">
<div class="container">

<div class="card">
<h2>Balance</h2>
₦<span id="balance">0</span>
</div>

<div class="card">
<h3>Fund Wallet</h3>

<button onclick="startFunding()">Fund Wallet</button>

<div id="fundFlow" style="display:none; margin-top:10px;">

  <!-- STEP 1 -->
  <div id="step1">
    <input id="amount" type="number" placeholder="Enter amount">
    <button onclick="toStep2()">Continue</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none;">
    <p><b>Send to:</b></p>
    <p>Bank: Monie Point MFB</p>
    <p>Name: Abraham Samuel</p>
    <p>Account: 6048761014</p>

    <button onclick="toStep3()">I've Sent It</button>
  </div>

  <!-- STEP 3 -->
  <div id="step3" style="display:none;">
    <input type="file" id="proof" accept="image/*">
    <button id="submitBtn" onclick="submitPayment()" disabled>Submit Payment</button>
  </div>

</div>

</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="wallet.html" class="active">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html">Profile</a>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  addDoc,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ CORRECT CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBt09iUFQdxWHxqLYtMKy_YJ91fK67eMMs",
  authDomain: "wizarddigitalaccess.firebaseapp.com",
  projectId: "wizarddigitalaccess",
  storageBucket: "wizarddigitalaccess.appspot.com",
  messagingSenderId: "836340307615",
  appId: "1:836340307615:web:13a8f1eff9360d5c7e34aa",
  measurementId: "G-MR76QMKXKM"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");
const balanceEl = document.getElementById("balance");

/* 🔐 AUTH (FIXED STABLE) */
onAuthStateChanged(auth, (user)=>{
  if(!user){
    loader.innerText = "Redirecting...";
    setTimeout(()=>location.href="auth.html",500);
    return;
  }

  const ref = doc(db,"users",user.uid);

  /* 💰 LIVE BALANCE */
  onSnapshot(ref,(snap)=>{
    if(snap.exists()){
      balanceEl.innerText = snap.data().wallet || 0;
    }
  });

  loader.style.display="none";
  appDiv.style.display="block";
});

/* 💳 SUBMIT PAYMENT */
let proofBase64 = "";

/* STEP CONTROL */
window.startFunding = ()=>{
  document.getElementById("fundFlow").style.display = "block";
};

window.toStep2 = ()=>{
  const amt = Number(document.getElementById("amount").value);

  if(!amt || amt <= 0){
    alert("Enter valid amount");
    return;
  }

  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
};

window.toStep3 = ()=>{
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
};

/* PROOF UPLOAD */
document.addEventListener("DOMContentLoaded", ()=>{
  const proofInput = document.getElementById("proof");
  const btn = document.getElementById("submitBtn");

  proofInput.addEventListener("change", ()=>{
    const file = proofInput.files[0];

    if(!file) return;

    const reader = new FileReader();
    reader.onload = ()=>{
      proofBase64 = reader.result;
      btn.disabled = false; // enable only after upload
    };
    reader.readAsDataURL(file);
  });
});

/* FINAL SUBMIT */
window.submitPayment = async ()=>{
  const user = auth.currentUser;
  const amt = Number(document.getElementById("amount").value);

  if(!proofBase64){
    alert("Upload payment proof");
    return;
  }

  try{
    await addDoc(collection(db,"transactions"),{
      uid: user.uid,
      amount: amt,
      proof: proofBase64,
      status: "pending",
      createdAt: new Date()
    });

    // reset UI
    document.getElementById("fundFlow").style.display = "none";
    document.getElementById("step1").style.display = "block";
    document.getElementById("step2").style.display = "none";
    document.getElementById("step3").style.display = "none";
    document.getElementById("amount").value = "";
    document.getElementById("proof").value = "";
    document.getElementById("submitBtn").disabled = true;
    proofBase64 = "";

    alert("Payment submitted ✔️ Waiting for admin approval");

  }catch(err){
    alert(err.message);
  }
};
</script>

</body>
</html>
