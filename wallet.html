<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

/* LOADER */
.loader {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
  z-index:9999;
}

/* CONTENT */
.container { padding:20px; }

.card {
  background:#1c1c2e;
  padding:20px;
  border-radius:12px;
  margin-bottom:12px;
}

input {
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  margin-top:10px;
}

button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:purple;
  color:white;
  cursor:pointer;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:12px;
  color:gray;
  text-decoration:none;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div id="app" style="display:none">
<div class="container">

<div class="card">
<h2>Balance</h2>
₦<span id="balance">0</span>
</div>

<div class="card">
<h3>Fund Wallet</h3>
<input id="amount" placeholder="Enter amount">
<button onclick="submitPayment()">Submit</button>
</div>

</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="wallet.html" class="active">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html">Profile</a>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  addDoc,
  collection
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ CORRECT CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

const loader = document.getElementById("loader");
const appDiv = document.getElementById("app");
const balanceEl = document.getElementById("balance");

/* 🔐 AUTH (FIXED STABLE) */
onAuthStateChanged(auth, (user)=>{
  if(!user){
    loader.innerText = "Redirecting...";
    setTimeout(()=>location.href="auth.html",500);
    return;
  }

  const ref = doc(db,"users",user.uid);

  /* 💰 LIVE BALANCE */
  onSnapshot(ref,(snap)=>{
    if(snap.exists()){
      balanceEl.innerText = snap.data().wallet || 0;
    }
  });

  loader.style.display="none";
  appDiv.style.display="block";
});

/* 💳 SUBMIT PAYMENT */
window.submitPayment = async ()=>{
  const user = auth.currentUser;
  const amt = Number(document.getElementById("amount").value);

  if(!amt || amt <= 0) return alert("Enter valid amount");

  try{
    await addDoc(collection(db,"transactions"),{
      uid: user.uid,
      amount: amt,
      status: "pending",
      createdAt: new Date()
    });

    document.getElementById("amount").value = "";

    alert("Payment submitted ✔️ Waiting for admin approval");
  }catch(err){
    alert(err.message);
  }
};
</script>

</body>
</html>
