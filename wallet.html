<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.loader {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f1a;
}

.container { padding:20px; }

.card {
  background:#1c1c2e;
  padding:20px;
  border-radius:12px;
  margin-bottom:12px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.nav a {
  flex:1;
  text-align:center;
  padding:10px;
  color:gray;
}

.nav a.active { color:purple; }
</style>
</head>

<body>

<div class="loader" id="loader">Loading...</div>

<div id="app" style="display:none">
<div class="container">

<div class="card">
<h2>Balance</h2>
₦<span id="balance">0</span>
</div>

<div class="card">
<input id="amount" placeholder="Amount">
<button onclick="submitPayment()">Submit</button>
</div>

</div>

<div class="nav">
  <a href="index.html">Home</a>
  <a href="wallet.html" class="active">Wallet</a>
  <a href="orders.html">Orders</a>
  <a href="profile.html">Profile</a>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, onSnapshot, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({ apiKey:"AIzaSy...", authDomain:"wizard-shop-52a50.firebaseapp.com", projectId:"wizard-shop-52a50" });
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="auth.html";

  const ref = doc(db,"users",user.uid);

  onSnapshot(ref,(s)=>{
    balance.innerText = s.data()?.wallet || 0;
  });

  loader.style.display="none";
  app.style.display="block";
});

window.submitPayment = async ()=>{
  const amt = Number(document.getElementById("amount").value);
  if(!amt) return alert("Enter amount");

  await addDoc(collection(db,"transactions"),{
    amount:amt,
    status:"pending"
  });

  alert("Submitted");
};
</script>

</body>
</html>
