<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
}

.container {
  padding: 20px;
  padding-bottom: 80px;
}

.card {
  background: #1c1c2e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.balance {
  font-size: 30px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  cursor: pointer;
}

.tx {
  padding: 10px;
  border-bottom: 1px solid #333;
  font-size: 14px;
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>Wallet Balance</h2>
<div class="balance">₦<span id="balance">0</span></div>
<p class="small">Updates instantly</p>
</div>

<div class="card">
<h3>Fund Wallet</h3>

<input id="amount" type="number" placeholder="Enter amount">

<button onclick="submitPayment()">Submit Payment</button>

<p class="small">⚠️ Will be automated later (Paystack)</p>
</div>

<div class="card">
<h3>Transaction History</h3>
<div id="history"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  doc,
  onSnapshot,
  collection,
  addDoc,
  query,
  where,
  onSnapshot as onSnapshotCol
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "auth.html";
    return;
  }

  // Wallet balance
  onSnapshot(doc(db, "users", user.uid), (snap) => {
    if (snap.exists()) {
      document.getElementById("balance").innerText = snap.data().wallet || 0;
    }
  });

  // Transaction history
  const q = query(
    collection(db, "transactions"),
    where("uid", "==", user.uid)
  );

  onSnapshotCol(q, (snapshot) => {
    const history = document.getElementById("history");
    history.innerHTML = "";

    snapshot.forEach(doc => {
      const tx = doc.data();
      history.innerHTML += `
        <div class="tx">
          ₦${tx.amount} - ${tx.status}
        </div>
      `;
    });
  });
});

window.submitPayment = async function () {
  const user = auth.currentUser;
  const amount = Number(document.getElementById("amount").value);

  if (!amount || amount <= 0) {
    alert("Enter valid amount");
    return;
  }

  await addDoc(collection(db, "transactions"), {
    uid: user.uid,
    amount: amount,
    status: "pending",
    createdAt: new Date()
  });

  alert("Payment submitted");
};
</script>

</body>
</html>
