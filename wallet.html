<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet</title>

<script src="https://unpkg.com/feather-icons"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f1a;
  color: white;
  display: none;
}

/* 🔥 LOADER (FIX WHITE FLASH) */
.loader {
  position: fixed;
  inset: 0;
  background:#0f0f1a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  font-size:14px;
  opacity:0.7;
}

.container {
  padding: 20px;
  padding-bottom: 80px;
}

/* CARD */
.card {
  background: #1c1c2e;
  padding: 20px;
  border-radius: 15px;
  margin-bottom: 15px;
}

/* BALANCE */
.balance {
  font-size: 32px;
  font-weight: bold;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: purple;
  color: white;
  border: none;
  border-radius: 8px;
  margin-top: 10px;
  cursor: pointer;
}

/* TX */
.tx {
  padding: 10px;
  border-bottom: 1px solid #333;
  font-size: 14px;
  display:flex;
  justify-content:space-between;
}

/* STATUS COLORS */
.status-pending { color: orange; }
.status-approved { color: lightgreen; }
.status-rejected { color: red; }

.small {
  font-size: 12px;
  opacity: 0.7;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
}

.nav a { color: gray; }
.nav a.active { color: purple; }
</style>
</head>

<body>

<!-- 🔥 LOADING SCREEN -->
<div class="loader" id="loader">Loading wallet...</div>

<div class="container">

<div class="card">
<h2>Wallet Balance</h2>
<div class="balance">₦<span id="balance">0</span></div>
<p class="small">Updates instantly</p>
</div>

<div class="card">
<h3>Fund Wallet</h3>

<input id="amount" type="number" placeholder="Enter amount">

<button onclick="submitPayment()">Submit Payment</button>

<p class="small">⚠️ Manual approval (admin). Paystack coming later.</p>
</div>

<div class="card">
<h3>Transaction History</h3>
<div id="history">Loading...</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <a href="index.html"><i data-feather="home"></i></a>
  <a href="profile.html"><i data-feather="user"></i></a>
  <a href="wallet.html" class="active"><i data-feather="credit-card"></i></a>
</div>

<script>
setTimeout(() => feather.replace(), 300);
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  onSnapshot,
  collection,
  addDoc,
  query,
  where,
  onSnapshot as onSnapshotCol,
  getDoc,
  setDoc,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const ADMIN_EMAIL = "etee77366@gmail.com";

const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* AUTH */
onAuthStateChanged(auth, async (user) => {

  if (!user) return location.href="auth.html";

  // 🔥 ADMIN FIX (NO BREAK)
  if (user.email === ADMIN_EMAIL) {
    location.href="admin.html";
    return;
  }

  const userRef = doc(db, "users", user.uid);
  let snap = await getDoc(userRef);

  // AUTO CREATE USER
  if (!snap.exists()) {
    await setDoc(userRef,{
      name:user.email.split("@")[0],
      email:user.email,
      wallet:0
    });
  }

  /* 💰 LIVE BALANCE */
  onSnapshot(userRef,(snap)=>{
    if(snap.exists()){
      balance.innerText = snap.data().wallet || 0;
    }
  });

  /* 📜 TRANSACTIONS (SORTED + STABLE) */
  const q = query(
    collection(db,"transactions"),
    where("uid","==",user.uid),
    orderBy("createdAt","desc")
  );

  onSnapshotCol(q,(snapshot)=>{
    history.innerHTML="";

    if(snapshot.empty){
      history.innerHTML="No transactions yet";
      return;
    }

    snapshot.forEach(doc=>{
      const tx = doc.data();

      history.innerHTML += `
        <div class="tx">
          <span>₦${tx.amount}</span>
          <span class="status-${tx.status}">
            ${tx.status}
          </span>
        </div>
      `;
    });
  });

  /* 🔥 SHOW UI SMOOTHLY */
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.body.style.display="block";
  },300);
});

/* PAYMENT */
window.submitPayment = async ()=>{
  const user = auth.currentUser;
  const amount = Number(amountInput.value);

  if(!amount || amount <= 0){
    alert("Enter valid amount");
    return;
  }

  await addDoc(collection(db,"transactions"),{
    uid:user.uid,
    amount,
    status:"pending",
    createdAt:new Date()
  });

  amountInput.value="";

  alert("Submitted ✔️ Waiting for admin");
};
</script>

</body>
</html>
