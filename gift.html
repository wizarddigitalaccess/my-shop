<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Gift</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.header{
  padding:15px;
  background:#1c1c2e;
  display:flex;
  align-items:center;
  gap:10px;
}

.back{
  cursor:pointer;
  font-size:18px;
}

.container{
  padding:20px;
}

.title{
  font-size:18px;
  margin-bottom:20px;
}

/* GIFT BUTTONS */
.gift-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.gift-card{
  background:#1c1c2e;
  padding:20px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.gift-card:hover{
  transform:scale(1.05);
}

/* UNIQUE STYLES */
.ring{
  border:2px solid gold;
}

.flower{
  border:2px solid #1877f2;
}

.gift-card img{
  width:60px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="history.back()">←</div>
  <b>Send Gift</b>
</div>

<div class="container">
  <div class="title">Choose a gift type</div>

  <div class="gift-grid">

    <!-- RING -->
    <div class="gift-card ring"
      onclick="selectGift('ring')">
      <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
      <div>Send Ring</div>
    </div>

    <!-- FLOWERS -->
    <div class="gift-card flower"
      onclick="selectGift('flowers')">
      <img src="https://cdn-icons-png.flaticon.com/512/616/616490.png">
      <div>Send Flowers</div>
    </div>

  </div>
</div>

<script>
function selectGift(type){
  localStorage.setItem("giftType", type);
  location.href="gift-details.html";
}
</script>

</body>
</html>
