<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Gift</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.header{
  padding:15px;
  background:#1c1c2e;
  display:flex;
  align-items:center;
  gap:10px;
}

.back{
  cursor:pointer;
  font-size:18px;
}

.container{
  padding:20px;
}

.title{
  font-size:18px;
  margin-bottom:20px;
}

.gift-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.gift-card{
  background:#1c1c2e;
  padding:20px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.gift-card:hover{
  transform:scale(1.05);
}

.gift-card img{
  width:60px;
  height:60px;
  object-fit:contain;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="history.back()">←</div>
  <b>Send Gift</b>
</div>

<div class="container">
  <div class="title">Choose a gift type</div>
  <div class="gift-grid" id="giftGrid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const db = getFirestore(app);
const grid = document.getElementById("giftGrid");

/* LOAD GIFT TYPES */
async function loadGifts(){
  grid.innerHTML = "Loading...";

  try{
    const snap = await getDocs(collection(db,"giftCategories"));

    grid.innerHTML = "";

    if(snap.empty){
      grid.innerHTML = "No gift categories found";
      return;
    }

    snap.forEach(docSnap=>{
      const g = docSnap.data();

      const div = document.createElement("div");
      div.className = "gift-card";

      div.innerHTML = `
        <img src="${g.image || 'fallback.png'}"
        onerror="this.src='fallback.png'">
        <div>${g.name}</div>
      `;

      div.onclick = ()=>{
        /* ✅ STORE FULL STRUCTURE FOR NEXT PAGE */
        const giftData = {
          id: docSnap.id,
          name: g.name,
          image: g.image || "",
          requiresSize: g.requiresSize || false
        };

        localStorage.setItem("selectedGift", JSON.stringify(giftData));

        location.href = "gift-details.html";
      };

      grid.appendChild(div);
    });

  }catch(err){
    console.error(err);
    grid.innerHTML = "Failed to load gifts";
  }
}

loadGifts();
</script>

</body>
</html>
