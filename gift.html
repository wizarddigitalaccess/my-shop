<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Gift</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.header{
  padding:15px;
  background:#1c1c2e;
  display:flex;
  align-items:center;
  gap:10px;
}

.back{
  cursor:pointer;
  font-size:18px;
}

.container{
  padding:20px;
}

.title{
  font-size:18px;
  margin-bottom:20px;
}

.gift-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.gift-card{
  background:#1c1c2e;
  padding:20px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}

.gift-card:hover{
  transform:scale(1.05);
}

.gift-card img{
  width:60px;
  height:60px;
  object-fit:contain;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="back" onclick="goBack()">←</div>
  <b id="pageTitle">Send Gift</b>
</div>

<div class="container">
  <div class="title" id="subTitle">Choose a gift category</div>
  <div class="gift-grid" id="giftGrid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBt09iUFQdxWHxqLYtMKy_YJ91fK67eMMs",
  authDomain: "wizarddigitalaccess.firebaseapp.com",
  projectId: "wizarddigitalaccess",
  storageBucket: "wizarddigitalaccess.appspot.com",
  messagingSenderId: "836340307615",
  appId: "1:836340307615:web:13a8f1eff9360d5c7e34aa",
  measurementId: "G-MR76QMKXKM"
};

/* 🔥 THIS LINE WAS MISSING */
const app = initializeApp(firebaseConfig);

/* THEN these */
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app); // only needed in admin/gift upload pages

let currentCategory = null;

/* BACK BUTTON */
window.goBack = function(){
  if(currentCategory){
    loadCategories();
  }else{
    history.back();
  }
};

/* IMAGE SAFE FUNCTION */
function safeImage(src){
  return src && src.trim() !== "" ? src : "fallback.png";
}

/* LOAD CATEGORIES */
async function loadCategories(){
  currentCategory = null;
  document.getElementById("pageTitle").innerText = "Send Gift";
  document.getElementById("subTitle").innerText = "Choose a gift category";

  grid.innerHTML = "Loading...";

  try{
    const snap = await getDocs(collection(db,"giftCategories"));

    grid.innerHTML = "";

    if(snap.empty){
      grid.innerHTML = "No categories available";
      return;
    }

    snap.forEach(docSnap=>{
      const g = docSnap.data();

      if(!g.name) return;

      const div = document.createElement("div");
      div.className = "gift-card";

      div.innerHTML = `
        <img src="${safeImage(g.image)}"
        onerror="this.src='fallback.png'">
        <div>${g.name}</div>
      `;

      div.onclick = ()=>{
        loadProducts(g.name);
      };

      grid.appendChild(div);
    });

  }catch(err){
    console.error(err);
    grid.innerHTML = "Failed to load categories";
  }
}

/* LOAD PRODUCTS */
async function loadProducts(categoryName){
  currentCategory = categoryName;

  document.getElementById("pageTitle").innerText = categoryName;
  document.getElementById("subTitle").innerText = "Choose a product";

  grid.innerHTML = "Loading...";

  try{
    const snap = await getDocs(collection(db,"giftProducts"));

    grid.innerHTML = "";

    let found = false;

    snap.forEach(docSnap=>{
      const p = docSnap.data();

      if(!p.name) return;

      if((p.category || "").toLowerCase() === categoryName.toLowerCase()){

        found = true;

        const div = document.createElement("div");
        div.className = "gift-card";

        div.innerHTML = `
          <img src="${safeImage(p.image)}"
          onerror="this.src='fallback.png'">
          <div>${p.name}</div>
          <small>₦${p.price}</small>
        `;

        div.onclick = ()=>{
          const productData = {
            id: docSnap.id,
            name: p.name,
            price: p.price,
            image: p.image || "",
            category: p.category,
            requiresSize: p.requiresSize || false
          };

          localStorage.setItem("selectedGift", JSON.stringify(productData));
          location.href = "send-gift.html";
        };

        grid.appendChild(div);
      }
    });

    if(!found){
      grid.innerHTML = "No products in this category";
    }

  }catch(err){
    console.error(err);
    grid.innerHTML = "Failed to load products";
  }
}

/* INIT */
loadCategories();
</script>

</body>
</html>
