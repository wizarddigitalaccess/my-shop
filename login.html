<!DOCTYPE html>
<html>
<head>
  <title>Login</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1a2b;
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      background: purple;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Login to Continue</h2>

<input type="email" id="email" placeholder="Enter your email"><br>
<input type="password" id="password" placeholder="Enter password"><br>

<button onclick="login()">Enter Site</button>

<!-- ✅ SIGNUP LINK (CORRECT PLACE) -->
<p style="margin-top:15px;">
  Don’t have an account?
  <a href="signup.html" style="color:lightblue;">Sign up here</a>
</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50",
  storageBucket: "wizard-shop-52a50.firebasestorage.app",
  messagingSenderId: "339533161156",
  appId: "1:339533161156:web:74aa251c11f9ff87d91f91",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// If already logged in → go to shop
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "index.html";
  }
});

// LOGIN FUNCTION
window.login = function () {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>

</body>
</html>
