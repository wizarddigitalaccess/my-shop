<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiver Details</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.header{
  padding:15px;
  background:#1c1c2e;
  display:flex;
  align-items:center;
  gap:10px;
}

.container{
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="history.back()">←</div>
  <b id="title">Enter Receiver Details</b>
</div>

<div class="container">

  <h3 id="giftTitle">Enter receiver’s details</h3>

  <input id="house" placeholder="House number / Apt number">
  <input id="street" placeholder="Street address">
  <input id="city" placeholder="City / Province">
  <input id="state" placeholder="State">
  <input id="zip" placeholder="Zip / Postal code">
  <input id="country" placeholder="Country">

  <input id="phone" placeholder="Receiver Phone Number">
  <input id="sender" placeholder="Sender's Name">

  <input id="size" placeholder="Enter Size (e.g M, L, 42)" style="display:none;">

  <button onclick="submitGift()">Send Gift</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, doc, getDoc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* GET SELECTED GIFT */
const selectedGift = JSON.parse(localStorage.getItem("selectedGift") || "{}");

/* TITLE */
if(selectedGift.name){
  document.getElementById("giftTitle").innerText =
    "Enter receiver’s details for " + selectedGift.name;
}

/* SIZE */
let requiresSize = selectedGift.requiresSize || false;
if(requiresSize){
  document.getElementById("size").style.display = "block";
}

/* SUBMIT */
window.submitGift = async function(){

  const user = auth.currentUser;
  if(!user) return alert("Please login");

  const receiver = {
    name: sender.value.trim(),
    phone: phone.value.trim(),
    city: city.value.trim(),
    country: country.value.trim(),
    note: street.value.trim() + ", " + state.value.trim(),
    address: {
      house: house.value.trim(),
      street: street.value.trim(),
      state: state.value.trim(),
      zip: zip.value.trim()
    },
    size: requiresSize ? size.value.trim() : null
  };

  if(!receiver.name || !receiver.phone || !receiver.city || !receiver.country){
    return alert("Please fill all required fields");
  }

  if(requiresSize && !receiver.size){
    return alert("Please enter size");
  }

  try{
    const userRef = doc(db,"users",user.uid);
    const userSnap = await getDoc(userRef);
    const userData = userSnap.data();

    const price = 5000; // later dynamic

    const balance = userData.balance ?? userData.wallet ?? 0;

    if(balance < price){
      return alert("Insufficient balance");
    }

    /* DEDUCT */
    await updateDoc(userRef,{
      balance: balance - price
    });

    /* SAVE ORDER (FIXED STRUCTURE) */
    await addDoc(collection(db,"giftOrders"),{
      userId: user.uid,
      userEmail: user.email,
      type: selectedGift.name,
      price: price,

      receiver: receiver,

      status: "pending",
      createdAt: Date.now()
    });

    alert("🎁 Gift sent successfully!");

    location.href = "orders.html";

  }catch(err){
    console.error(err);
    alert("Payment failed");
  }
};
</script>

</body>
</html>
