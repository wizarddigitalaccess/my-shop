<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiver Details</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.header{
  padding:15px;
  background:#1c1c2e;
  display:flex;
  align-items:center;
  gap:10px;
}

.container{
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="history.back()">←</div>
  <b id="title">Enter Receiver Details</b>
</div>

<div class="container">

  <h3 id="giftTitle">Enter receiver’s details</h3>

  <input id="house" placeholder="House number / Apt number">
  <input id="street" placeholder="Street address">
  <input id="city" placeholder="City / Province">
  <input id="state" placeholder="State">
  <input id="zip" placeholder="Zip / Postal code">
  <input id="country" placeholder="Country">

  <!-- ✅ NEW PHONE FIELD -->
  <input id="phone" placeholder="Receiver Phone Number">

  <input id="sender" placeholder="Sender's Name">

  <!-- 🔥 SIZE FIELD (AUTO CONTROLLED) -->
  <input id="size" placeholder="Enter Size (e.g M, L, 42)" style="display:none;">

  <button onclick="submitGift()">Continue</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const db = getFirestore(app);

/* GET GIFT TYPE */
const giftType = localStorage.getItem("giftType");

/* SHOW TITLE */
if(giftType){
  document.getElementById("giftTitle").innerText =
    "Enter receiver’s details for " + giftType;
}

/* 🔥 REAL SIZE CHECK FROM FIRESTORE */
let requiresSize = false;

async function checkSize(){
  const snap = await getDocs(collection(db,"giftCategories"));

  snap.forEach(d=>{
    const c = d.data();

    if(c.name.toLowerCase() === giftType?.toLowerCase()){
      if(c.requiresSize){
        requiresSize = true;
        document.getElementById("size").style.display = "block";
      }
    }
  });
}

checkSize();

/* SUBMIT */
window.submitGift = function(){

  const data = {
    type: giftType,
    house: document.getElementById("house").value.trim(),
    street: document.getElementById("street").value.trim(),
    city: document.getElementById("city").value.trim(),
    state: document.getElementById("state").value.trim(),
    zip: document.getElementById("zip").value.trim(),
    country: document.getElementById("country").value.trim(),
    phone: document.getElementById("phone").value.trim(), // ✅ NEW
    sender: document.getElementById("sender").value.trim(),
    size: requiresSize ? document.getElementById("size").value.trim() : null
  };

  /* VALIDATION */
  if(!data.house || !data.street || !data.city || !data.country || !data.sender || !data.phone){
    return alert("Please fill all required fields");
  }

  if(requiresSize && !data.size){
    return alert("Please enter size");
  }

  /* SAVE */
  localStorage.setItem("giftData", JSON.stringify(data));

  alert("Proceeding to payment...");

  // 👉 NEXT STEP
  // location.href = "gift-payment.html";
};
</script>

</body>
</html>
