<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiver Details</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.header{
  padding:15px;
  background:#1c1c2e;
  display:flex;
  align-items:center;
  gap:10px;
}

.container{
  padding:20px;
}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#1877f2;
  color:white;
  cursor:pointer;
}

button:disabled{
  background:gray;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="history.back()">←</div>
  <b>Enter Receiver Details</b>
</div>

<div class="container">

  <h3 id="giftTitle">Loading...</h3>

  <input id="house" placeholder="House number / Apt number">
  <input id="street" placeholder="Street address">
  <input id="city" placeholder="City / Province">
  <input id="state" placeholder="State">
  <input id="zip" placeholder="Zip / Postal code">
  <input id="country" placeholder="Country">

  <input id="phone" placeholder="Receiver Phone Number">
  <input id="sender" placeholder="Sender's Name">

  <input id="size" placeholder="Enter Size (e.g M, L, 42)" style="display:none;">

  <button id="sendBtn" onclick="submitGift()" disabled>Send Gift</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
  getFirestore, collection, getDocs, doc, getDoc, updateDoc, addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
  apiKey: "AIzaSyCkby_UR3E1d60RiNwzMUs3syzUqnOF2ow",
  authDomain: "wizard-shop-52a50.firebaseapp.com",
  projectId: "wizard-shop-52a50"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* SELECTED PRODUCT */
let selectedGift = JSON.parse(localStorage.getItem("selectedGift") || "{}");

let productData = null;
let requiresSize = false;

/* LOAD PRODUCT (STRONG MATCH) */
async function loadProduct(){

  try{
    /* ✅ BEST CASE: FULL OBJECT PASSED */
    if(selectedGift && selectedGift.id && selectedGift.price){
      productData = selectedGift;
    }

    /* 🔄 FALLBACK: MATCH BY ID FIRST */
    if(!productData && selectedGift.id){
      const docSnap = await getDoc(doc(db,"giftProducts", selectedGift.id));
      if(docSnap.exists()){
        productData = docSnap.data();
      }
    }

    /* 🔄 LAST FALLBACK: NAME MATCH */
    if(!productData && selectedGift.name){
      const snap = await getDocs(collection(db,"giftProducts"));
      snap.forEach(d=>{
        const p = d.data();
        if(p.name === selectedGift.name){
          productData = p;
        }
      });
    }

    /* ❌ NOT FOUND (CLEAN UI) */
    if(!productData){
      document.getElementById("giftTitle").innerText = "❌ This gift is not available";
      document.getElementById("sendBtn").style.display = "none";
      return;
    }

    /* ✅ UI UPDATE */
    document.getElementById("giftTitle").innerText =
      "Send: " + productData.name + " (₦" + productData.price + ")";

    /* ✅ SIZE FROM ADMIN */
    requiresSize = productData.requiresSize === true;

    if(requiresSize){
      document.getElementById("size").style.display = "block";
    }

    document.getElementById("sendBtn").disabled = false;

  }catch(err){
    console.error(err);
    document.getElementById("giftTitle").innerText = "⚠️ Failed to load gift";
  }
}

loadProduct();

/* SUBMIT */
window.submitGift = async function(){

  const btn = document.getElementById("sendBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  const user = auth.currentUser;

  if(!user){
    alert("Please login");
    resetBtn();
    return;
  }

  if(!productData){
    resetBtn();
    return;
  }

  const receiver = {
    name: sender.value.trim(),
    phone: phone.value.trim(),
    city: city.value.trim(),
    country: country.value.trim(),
    note: street.value.trim() + ", " + state.value.trim(),
    address: {
      house: house.value.trim(),
      street: street.value.trim(),
      state: state.value.trim(),
      zip: zip.value.trim()
    },
    size: requiresSize ? size.value.trim() : null
  };

  if(!receiver.name || !receiver.phone || !receiver.city || !receiver.country){
    alert("Please fill all required fields");
    resetBtn();
    return;
  }

  if(requiresSize && !receiver.size){
    alert("Please enter size");
    resetBtn();
    return;
  }

  try{
    const userRef = doc(db,"users",user.uid);
    const userSnap = await getDoc(userRef);
    const userData = userSnap.data();

    const price = Number(productData.price || 0);
    const balance = userData.balance ?? userData.wallet ?? 0;

    if(balance < price){
      alert("Insufficient balance");
      resetBtn();
      return;
    }

    /* DEDUCT */
    await updateDoc(userRef,{
      balance: balance - price
    });

    /* SAVE ORDER WITH TRACKING */
    await addDoc(collection(db,"giftOrders"),{
      userId: user.uid,
      userEmail: user.email,
      productId: selectedGift.id || null,
      type: productData.name,
      price: price,

      receiver: receiver,

      status: "placed", /* 🔥 tracking start */
      createdAt: Date.now()
    });

    alert("🎁 Gift sent successfully!");
    location.href = "orders.html";

  }catch(err){
    console.error(err);
    alert("Payment failed");
    resetBtn();
  }
};

/* RESET BUTTON */
function resetBtn(){
  const btn = document.getElementById("sendBtn");
  btn.disabled = false;
  btn.innerText = "Send Gift";
}
</script>

</body>
</html>
