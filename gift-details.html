<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Gift</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
}

.header{
  padding:15px;
  background:#1c1c2e;
  display:flex;
  align-items:center;
  gap:10px;
}

.container{
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card{
  background:#1c1c2e;
  padding:15px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:200px;
}

.card img{
  width:60px;
  height:60px;
  object-fit:contain;
}

.card h4{
  font-size:14px;
  height:36px;
  overflow:hidden;
}

.price{
  font-weight:bold;
  margin-top:5px;
}

/* 🔥 SIZE TAG */
.tag{
  background:#1877f2;
  padding:3px 6px;
  border-radius:6px;
  font-size:10px;
  display:inline-block;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="header">
  <div onclick="history.back()">←</div>
  <b>Select Gift</b>
</div>

<div class="container">
  <h3 id="title">Loading...</h3>
  <div class="grid" id="grid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBt09iUFQdxWHxqLYtMKy_YJ91fK67eMMs",
  authDomain: "wizarddigitalaccess.firebaseapp.com",
  projectId: "wizarddigitalaccess",
  storageBucket: "wizarddigitalaccess.firebasestorage.com",
  messagingSenderId: "836340307615",
  appId: "1:836340307615:web:13a8f1eff9360d5c7e34aa",
  measurementId: "G-MR76QMKXKM"
};

const db = getFirestore(app);

/* GET SELECTED CATEGORY */
const selectedGift = JSON.parse(localStorage.getItem("selectedGift") || "{}");

const grid = document.getElementById("grid");
const title = document.getElementById("title");

/* LOAD PRODUCTS */
async function loadProducts(){

  if(!selectedGift.name){
    title.innerText = "❌ No category selected";
    return;
  }

  title.innerText = selectedGift.name;

  try{
    const snap = await getDocs(collection(db,"giftProducts"));

    grid.innerHTML = "";

    let found = false;

    snap.forEach(docSnap=>{
      const p = docSnap.data();

      /* ✅ STRICT CATEGORY MATCH */
      if((p.category || "").toLowerCase() !== selectedGift.name.toLowerCase()) return;

      found = true;

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${p.image || 'fallback.png'}" onerror="this.src='fallback.png'">
        <h4>${p.name}</h4>
        <div class="price">₦${p.price}</div>
        ${p.requiresSize ? `<div class="tag">Size Required</div>` : ""}
      `;

      div.onclick = ()=>{

        /* ✅ SAVE FULL PRODUCT CLEANLY */
        const productData = {
          id: docSnap.id,
          name: p.name,
          price: p.price,
          image: p.image || "",
          category: p.category,
          requiresSize: p.requiresSize || false
        };

        localStorage.setItem("selectedGift", JSON.stringify(productData));

        location.href = "send-gift-details.html";
      };

      grid.appendChild(div);
    });

    if(!found){
      grid.innerHTML = "No products available in this category";
    }

  }catch(err){
    console.error(err);
    grid.innerHTML = "Failed to load products";
  }
}

loadProducts();
</script>

</body>
</html>
